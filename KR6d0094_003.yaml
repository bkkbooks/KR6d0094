body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯西蜀沙門佛間勗𠁼大師立科門人智一雪墩拾遺第二如來與記二初述成二與記今初藥草喻品第五論云三者求大乘人一向決定增上慢心起如是意無別聲聞緣覺佛乘如是顛取對治此故説雲雨譬喻應知又云第三人者令知種種乘諸佛如來平等説法隨諸衆生善根種子而生芽故等藥草者古云去疾神功名藥秉潤之形曰草喻行藥草秉教修生則能秉之五蘊為草依蘊之定慧名藥品中詮此雖別為當機其實地為成就卉木而生雨為成就卉木而潤則若卉若木皆正所為者各有領受如云而各滋茂今約當機如中藥草故以總從別為説藥草喻文二初長文二頌文初四初嘆許所説二廣所不及三正與述成四結嘆能知今初爾時世尊告摩訶迦葉至真實功德誠如所言連贊善哉者一述其於前法喻善領權實一能藉喻曲盡怖大及慈濟之狀其所説者悉是如來真實功德故以誠如印之二廣所不及如來復有無量無邊至無量億劫説不能盡四子追述僅得化儀一門之義此外復有無量攝取衆生之善巧豈四子所能窺據此則世尊一代化儀須憑本宗十門庶無所遺倘止用由小之大一門之義而判殆恐攝義未盡縱加通別五時亦難該刮三正與述成二初略舉智教二廣舉喻法初三初標設教不虗二以智教互顯三約智釋不虗今初迦葉當知如來是諸法之王若有所説皆不虗也如來是諸法之王於諸法門竪説橫説俱得自在此恐不信説不能盡之語故舉法王正以告之而顯誠諦意謂人王之言尚且不二況法王耶二以智教互顯於一切法以智方便至皆悉到於一切智地一切法即頓漸偏圓權實等法門皆從妙智流出此以智顯教也其所説下以教顯智謂所説法門雖有小大種種之別究而言之即世諦語言必徹所自亦不使滯於權淺故曰皆到智地一切智地即一切種智由能以諸佛一切道法發起衆生一切善種故喻之以地三約智釋不虗二初知法知機分釋二能了能示合釋今初如來觀知一切諸法至深心所行通達無礙初明能知諸法門所有之力用然近之歸趣雖有種種若遠之歸趣則同到智地此知法也亦知下知機也深心即所行之習因所行即現前之業行其數雖逾塵沙悉皆通達以能雙鑒無礙故令所説皆悉不虗二能了能知合釋又於諸法究盡明了示諸衆生一切智慧諸法即五蘊十界詮義之境各有本末世尊以即實之權智究而了之即是實相故以平等佛慧示諸衆生雖諸衆生現住種種習因習果畢竟終歸一切智地上科以藥病相當釋所説不虗此科以妙智能徹法淵底轉釋其所以亦即含平等説法意故下説雲雨無私喻二廣陳喻法二初喻明二法合初二初無差而差二縱奪結成初二初約能生所生論無差而差二約能潤所潤論無差而差今初迦葉譬如三千大千世界至種類若干名色各異大千界是總相乃合山川溪谷土地之別相所成者今止通取平等能生義如正因佛性是總相乃合五蘊之別相所成者亦通取平等能生義次明所生之卉木同有治病之功而卉叢中別有一種力強能治病者得名藥草然皆各有種子流類各有名字色相今於所生內但通取此彼不同義也如依平等正因而有三乘五性習因習果之別二節合顯無差而差義山者宣也謂能宣通陰陽之氣而發生萬物也川穿也凡通水處俱名為川山洞虗空有水處名溪不貯水者名谷卉草之都名木樹之總稱二約能潤所潤論無差而差密雲彌布遍覆三千至而得生長華果敷實先明能潤無差雲如佛身充滿法界澤如教法依平等一音而演大千卉木如所化之機以此雲雨普潤令小中大之種子各得增長根莖枝葉如平等智地被潤所有小中大之習因種子而得增長小中大之信戒定慧諸樹下明所潤有差謂上能潤之雲雨雖等奈領受中之樹有小大草有上中下各有所受多少之不同究能覆之雲是一能潤之雨亦復是一而却各各稱其種性增長此彼不同如佛以一音説法衆生隨類各解所解既別則依解所起之行依行所得之果俱迥異矣二節合顯能潤所潤無差而差二縱奪結成雖一地所生一雨所潤而諸草木各有差別一切衆生雖等有能生智地等被法雨所潤唯其隨分受潤故有三二之別又若不蒙緣了二因為之發起即差別之相亦不可得二法合二初教以機異而似有差二教以智一而實無差初二初略合前無差而差二結示所説差即無差初二初即無差二似有差今初迦葉當知如來亦復如是至皆應到此為聽法故現身如大雲普覆以大音聲號召一切令知有佛降神十號皆約修因所成之果德而以名身也未度者下明降神所以也其未度苦者誓令得度未解業縛者誓令解縛未安立於道品誓令其安未證得涅槃誓令證得至現未等事我具三明能如實知之又我具五眼四智是能知能見者一心朗鑒是知道者六根不隔是開道者八音無滯是説道者汝等下明號召所以也此上總顯如來以平等三業普被一切全無差別也二似有差爾時無數千萬億種衆生至具足蒙潤各得生長應召所來之衆同依正因智地而生而有九界之差者即依習所成之種子所發之現行也如來於時下先觀機也前卉木有大小根莖枝葉之別今衆生亦有諸根利鈍之異隨其下即以一音平等之旨稱種種機説種種法如一雨普潤也是諸下明聞法漸入道者先各得五果之別於現世得安隱者即增上果後生善處即異熟果以道受樂即士用果亦得聞法即等流果離諸障礙即離繫果於諸下結示任力所能以見差別如彼下牒喻合明也二結示所説即無差如來説法一相一味至究竟至於一切種智一相是法一味是喻喻上所説之法隨機增長似有不同實皆同飲甘露了無異味也所謂下約斷三障證三德顯一相之旨能令聞者同圓種智也解脫業縛具八自在即解脫相離二死苦即法身德相滅煩惱惑即般若德相若能究竟即歸三德圓融祕藏一切種智亦即三一圓融之般若以所説之法雖有多種然皆從般若妙智流出故仍成一相一味平等之法門也二教以智一而實無差三初明衆生不知二明如來能知三正明教隨智一今初其有衆生聞如來法至所得功德不自覺知衆生根信不同聞法起解亦異而不自知所得皆是佛因二明如來能知所以者何唯有如來至而不自知上中下性初約十界境明佛能知由隨熏染故成九界種類非具一切種智者奚能知此衆多種類即是一種一相一體一性念何下且約三慧該五類人以明所知不謬三事字指三慧所緣之境體言念思修三字即指能緣之當體言而皆以云何二字貫之者乃審境起用也如云此是云何之境方起云何之念等以何下合上能所而言即依所緣之境而起三慧三法字即上三事字不必約聞法以聞法在未起三慧之前故以何下明隨因所感之果以何法為能得之因便得何等之果衆生現住種種習染之地唯有如來如實見此種種差別悉皆歸於平等智地明了無礙如彼牒喻合明也三正明教隨智一如來知是一相一味之法至不即為説一切種智會玄云一相者無異相故無相相故又般若云皆同一相所謂無相無量義云一相者無相一味者一無漏味殊勝資益無別體故何者是一相無相之體所謂下出其體也文有五句前四四德後一一性解脫相是我德脫二障縛得自在故離相樂德離變易苦故滅相淨德性絶妄染故常寂滅相常德四相不遷故終歸於空者四德是不空藏同歸空藏為體是一相一性也又究竟涅槃者是方便淨從因方便而修得故常寂滅相即性淨涅槃本性淨故終歸於空顯一相無相也佛知下釋疑云佛昔雖知始末皆一最初不為説一者由先觀衆生之心欲於根未熟時則將之護之恐生誹謗故不即為説一以顯差即無差也四結嘆能知汝等迦葉甚為希有至隨宜説法難解難知世尊為此漸機以四十餘年皆説三乘唯至今日乃説一乘為破三之始歸一之初四子能悟已往之隨宜探從今之祕要故致世尊之嘆述前品四子雖於十種化儀中窺見攝末歸本一門之義固為難得世尊復恐彼以為盡能究竟故上於述成中即就彼所知以廣所不及初約雲雨以喻能被之化法非即如汝所謂先小後大漸引之意應知本是一相一味平等法門次即以雲雨所被中亦非即如汝一草之增長此外更有三草二木各得增長等義皆非汝之所知也若以大鈔與今經合論此一儀內應共攝取七類機宜謂三草二木及先稟小人今雖聞大猶未回心者可作未來得度因緣故及今直聞大法之人在昔雖未稟小而知先時曾説小法此如龍女等二頌文二初標智教不虗二述成廣示今初爾時世尊欲重宣此義而説偈言破有法王出現世間至以種種緣令得正見有者因果不亡為有如來以二十五王三昧破二十五有為法中之王所言自屬誠諦本無先三後一之差但隨衆生性欲將之護之而似有異耳二正與述成二初喻明二法合初二初頌無差而差二頌差即無差今初迦葉當知譬如大雲至乾地普洽藥木並茂大雲遍覆無差大雨普澍亦無差大地發生亦復無差而諸藥木雖曰並茂其實增長各別二差即無差其雲所出一味之水至所潤是一而各滋茂被潤之草木雖各增長有差其實能潤之雨本來一味平等二法合二初教隨機似異二教隨智實一初三初法雨平等二稟受不同三成實似異今初佛亦如是出現於世至等雨法雨而無懈倦頌中具含三業平等意初一頌約喻標起身業平等次明現身利物之益皆以大慈平等普觀且勸其來以佛世難值故為大衆下頌口業平等我觀下雖明意業平等亦即釋成説平等法之故不因機分彼此而起愛憎之心亦不因深愛法者而生貪著不肯盡與亦不緣狹劣所礙而生放捨之心恆為一切平等説法如為一人殷勤而説即為衆多莫不皆然唯知演説曾無他事亦不生厭如雨普潤縱機有不同而我法雨等注了無懈倦二稟受不同一切衆生聞我法者至如彼草木所稟各異初頌總標受潤次別示三草二木以補長文人天戒善雖不能斷惑亦能暫伏貪等病苦治令不起故亦名藥知無下以緣覺攝聲聞合頌中藥草此二人同有定慧藥力能斷能證名為中草求世下權人求佛二利治病故名上草獨言精進者以能遍䇿諸事度故又諸下此菩薩雖知心佛衆生三無差別而不妨於無所求中而求故云專心佛道於諸煩惱自在能斷留故不斷以便潤生涉有望下為優具蔭庇力故得名樹雖列三賢未能證聖故以小名安住下由此菩薩得聞法空以二種觀道能斷第六識俱生我執種子並分別法執種子及第六俱生法執種子一分第七俱生我執現行受變易身安住神通以不退輪度無量億初登聖位望前三賢為高為廣故如大樹此經被機各品開合數有多寡如序品中止言三乘則前合人及天乘於小乘內復合一乘於大乘矣法説及喻説則從大乘開出一乘故有三車一車之喻是為四矣若今品喻中乘雖列五而人實有七以初從小乘開出人天二合聲聞於緣覺三從大乘開出一乘四從一乘開出三賢名為小樹故乘五而人七也此皆是由小之大之機悉為攝末歸本一儀所收又此漸機內有自小漸入三乘者有自小直入一乘者今經多是自小直入一乘者以是由小之大淺深常定之機故不屬隨機不定所收然據流通分露出菩提場一事則此説經儀亦應分屬本末無礙門以諸聲聞為眼耳所障故從根本一乘流出密意三乘及顯了三乘皆為所破是故此經名為破異一乘也佛平下帖顯也三成實似異三初再廣不及二總顯法喻三別示增長今初佛以此喻方便開示至於佛智慧如海一滴能潤佛智廣大如海今雖以種種言辭取喻雲雨演説一法而於大智海中亦但僅如取一滴以潤之令其各得增長殊非溟渤全體此正指華嚴海空為此滴之所歸故彼經十力中明世尊以常遍力演大那羅延幢勇健法以上所説校之誠如彼之一滴二總顯法喻我雨法雨充滿世間至漸次修行皆得道果充滿世間者如海幢比丘頂出諸佛雨三十二種法雨也隨力而修亦各得增長也如彼下且舉現喻貼顯見所被不止如上七類之增長而更能充滿三世間也三別示增長二初正示增長二結成成實今初聲聞緣覺處於山林至是名大樹而得增長此下別取上文貼顯所被以一味雨充滿一切世間普得增長義亦如上聲聞緣覺及大小二樹之增長説者須細玩於佛智慧如海一滴充滿世間等句神情庶得再廣所不及意矣合觀一品應有二種增長意謂於法華有以一味雨令具三草二木之種子者增長根莖等此增長習因種子也今聞法華後復令草木各得增長此因本有正因種子受一雨潤最後令諸草木同得一乘之增長也説者不可不知問若如來必先以三乘法度三種根最後方説一乘者何得為一相一味答昔於一乘分別説三今復攝三仍歸於一寧非始終平等了無異味二結成成實如是迦葉佛所説法至潤於人華各得成實二教隨智實一迦葉當知以諸因緣至漸漸修學悉當成佛初二頌約教結成廢立以顯一乘也謂在昔種種差別之開示盡是方便乃可廢之假名今之所説方為無差之實教即立一乘實教也以隨智演故諸聲下二句並廢其果以但離虗妄名為解脫其實未得一切解脫故汝等下二句會果成因也謂二乘所有智斷功德即是菩薩克極果之因行故云汝等所行等漸漸下立一乘果也此則權教權果皆屬可廢唯立一實之因果矣二與記二初記迦葉次記三人今初授記品第六授記多義具如舊説文二初長文二頌文初二初記因二記果今初爾時世尊説是偈已至廣宣諸佛無量大法二記果於最後身得成為佛至雖有魔及魔民皆護佛法二頌文爾時世尊欲重宣此義而説偈言告諸比丘我以佛眼至光明世尊其事如是次記三人二初求記二與記初二初長文二頌文今初爾時大目犍連須菩提至即共同聲而説偈言二頌文大雄猛世尊至願賜我等記如飢須教食如飢遇食仍求而後食正寫中根之劣弱不似身子一聞當得作佛便踴躍歡喜更悔昔之不待也二與記三初別記三人二總記五百三許説因緣初三初記須菩提二記迦旃延三記目犍連今初爾時世尊知諸大弟子至欲重宣此義而説偈言諸比丘衆今告汝等至像法亦住二十小劫長文共五節初記因二記果三記劫國四記壽命五記正像常處空説法者或由四衆往昔聞説空法受化宿緣所追今得與佛同集法會故佛處空説法蓋藉外緣令悟第一義空於當下也又可令知事空皆真空隨緣所現之假法也頌文初一誡聽餘頌上五節如文八解脫亦名八背捨背謂違背捨即棄捨即背此潔淨五欲捨此著心也若修此觀則發無漏智慧斷界內惑證羅漢果即轉名八解脫也淨潔五欲者以欲界色聲香味觸即名為粗弊不淨若上二界五塵即名潔淨無漏慧者二乘人以此智慧斷除惑業不漏落於生死也惑有二種若意根對法塵所起之惑名分別起屬見所斷若眼等五根對色等五塵所起之惑名俱生起屬修所斷二記迦旃延爾時世尊復告諸比丘衆至欲重宣此義而説偈言諸比丘衆皆一心聽至無量無數莊嚴其國三記目犍連爾時世尊復告大衆至欲重宣此義而説偈言我此弟子大目犍連至四十小劫像法亦爾多摩羅跋是多阿摩羅跋羅之略此云性無垢賢旃檀此方所無故存梵不翻或義翻為與藥以色有赤白之異能除寒熱二病故由此香體賢潔爇則幽遠潛通五內俱爽塗則除病與樂四大爭強如此佛稱本淨妙性寂而能照能使法界衆生聞名見形者皆得六根清淨無礙二總記五百我諸弟子威德具足至於未來世咸得成佛三許説因緣我及汝等宿世因緣吾今當説汝等善聽三因緣授記化城喻品第七論云實無而有謂有增上慢心以有世間三昧三摩跋提實無涅槃生涅槃想如是倒取對治此故為説化城譬喻應知又云第四人者方便令入涅槃城故涅槃城者所謂諸禪三昧過彼城已然後令入大般涅槃城故拾云神力所為無而倐有名之曰化防非禦敵稱之為城如來以巧方便無而説有即以能詮之教説名為化依理所修之行外能防分別起之非內能禦俱生起之敵名之曰城其所證無為之樂亦名曰城菩薩始自發心終至果位須經過三界二乘五百險道如來為疲勞者乃於中途巧設此城令暫止息小始二人入此城已生安隱想始教頓往雖知有城而不取證且留種子潤生設化終教菩薩知法如幻權實雙融出入自在或取為攝生方便頓人無入無不入圓人能立能廢入與不入悉皆平等熾然生死即是涅槃若順若逆總名方便文二初説因緣二與授記初二初長文二頌文初三初往昔因緣二今説法華三法喻釋成初二初結緣之由二正明結緣初二初大通成道二受請説法初二初明滅度久遠二明樹下成道今初佛告諸比丘乃往過去至欲重宣此義而説偈言我念過去世至無漏無所礙通達無量劫欲明結緣之由先示結緣之主號曰大通智勝者以此佛能通之大智超勝九界於體力性相等法莫不究盡明了故國名好城者由彼國衆生能以戒法外防七支之非內具定慧之樂中表皆嚴故劫名大相者由彼時內有出世大人現相故譬如下約喻明過去之久遠也地即是種以有能生之德故點與不點盡抹為塵者以最初被點之一界為首至最後墨盡所點之一界止其中間所有世界有已經行過被點者亦有雖經行過未曾被點者今盡取來抹以為塵而作籌馬以算彼佛過去久遠之劫以一塵為一劫可為至多而實彼佛滅度已來所經劫數復過於此故前云甚大久遠我以下約見昔如今以顯佛智之微妙以三世往來之相皆不離如來妙智一念洞鑒之外故二明樹下成道佛告諸比丘至成阿耨多羅三藐三菩提大經云如來得菩提實不係於日今於十劫坐待者蓋有因見坐待之儀而得大益者示現也菩提樹高一由旬者佛壽既長應形自大故座甚高即彼時衆生所有身命自與今五濁不侔矣佛於下乃忉利天敷座已復於座前祝曰佛當於我所敷座上得成菩提之辭也適坐一句即彼佛順所請也時諸下略敘諸天始終興供之不怠也諸比丘下正明成道所證理圓故曰現前能證智徹故成三菩提二受請説法二初受請二説法初二初受十六王子請二受諸梵天王請初二初同衆詣佛二偈贊請法今初其佛未出家時至頭面禮足繞佛畢已捨所珍詣佛句內含王子以三種不堅易三堅法意由王子悟知世間財物體非堅固聚散無常是故捨之貿易出世安樂涅槃堅固法財往詣句即含知身假合不可久存知命無常不可久保故捨世間深重恩愛而詣佛所修菩薩行貿易金剛不壞之身並常住不朽之慧命諸母未了恩愛如夢如幻故泣涕送之偈贊請法二初偈贊二請法今初一心合掌瞻仰世尊以偈頌曰大威德世尊至是故咸稽首歸命無上尊佛不出世人無智眼世無慧日五道皆暗雖有升沉總屬盲瞑故云從冥入於冥以世出世間一切善法靡不皆從見聞三寶而得有故二請法爾時十六王子偈讚佛已至重説偈言世雄無等倫至世尊悉知已當轉無上輪王子請轉大法世尊出定諸人唯聞諦緣故王子下文復請云是諸大德聲聞皆已成就亦當為我等説阿耨菩提之法問若據今經豈智勝竟不説華嚴耶答今且約即法之化身被隨宜之根而言若據彼佛法報則智勝至今猶未滅度正説華嚴此屬德相門無得與今相混詳之二受諸梵天王請二初動地放光感召諸界二衆梵尋光見佛請法今初佛告諸比丘大通智勝佛至遍滿世界勝諸天光十方各五百萬億國皆智勝所化之境是故正報見光作念依報地震光流也光能照所不照處始見佛光無幽不燭之妙非日月燈所可比也二衆梵尋光見佛請法三初三方二六方三上方初三初東方二東南三南方初四初見光驚駭二問決尋光三見佛請法四如來默許今初爾時東方五百萬億至以何因緣而現此相二問決尋光是時諸梵天王至共詣西方推尋是相三見佛請法見大通智勝如來至以大慈悲力度苦惱衆生雨華如山乃甚言其多以見誠敬不必泥也轉法輪開涅槃道言意頗寬未必定是請半字教也然敘智勝成道受請説法不過述結緣之由何必強以五時配合況出定後亦止先説諦緣絶無説華嚴之事後説法華亦由王子重請乃説若曰如一類二乘所見先小後大之化儀其庶乎四如來默許爾時大通智勝如來默然許之二東南方四初見光驚駭二問決尋光三見佛請法四如來默許今初又諸比丘東南方至歡喜踴躍生希有心二問決尋光即各相詣共議此事至共詣西北方推尋是相多是佛出者由此天於百八劫前曾見佛光無礙善燭幽微自與諸天福光有異故擬多是佛出所致三見佛請法見大通智勝如來至諸惡道減少忍善者增益如來六十四種梵音內其第三十七云如迦陵頻伽聲如來音聲之美妙似之諸經中多舉此以贊佛者乃舉中以攝初後之六十三也又校量如來相好中從足下千輻輪相始倍倍增高乃至眉間毫相功德不及無見頂相止而無見頂功德又不及聲輪所有功德故多舉此以贊之問此天云過百八十劫次天云百千次云百三十劫次云無量既同為天何見佛時之不齊也答十方諸佛所有法身無處無時不互遍法界但以能感之機宜遲宜速宜從何佛得度則見彼佛現身無緣者雖有佛出亦不能見又復應知此五百萬億國中能感者固不止此梵天一類而能應者亦不止智勝一佛大鈔依無著立功德名明於法身中所依意樂作事無差別功德謂由諸佛所依智同益生意樂同報化作用同至廣列諸佛皆互相遍四如來默許爾時大通智勝如來默然許之三南方四初見光驚駭三問決尋光三見佛請法四如來默許今初又諸比丘南方五百至歡喜踊躍生希有心二問決尋光即各相詣共議此事至共詣北方推尋是相三見佛請法見大通智勝如來至我等咸歸請當演深遠音此中之大法鼓法螺法雨雖不必與經初之大法鼓等論同論異然亦不必論對論滿矣四如來默許爾時大通智勝如來默然許之二六方西南方乃至下方亦復如是三上方三初見光驚駭二問決尋光三見佛請法今初爾時上方五百萬億國土至歡喜曜踊生希有心二問決尋光即各相詣共議此事至共詣下方推尋是相三見佛請法見大通智勝如來至哀愍而敷演無量劫習法二説法二初説諦緣權法二説一乘實法初二初説法二獲益今初爾時大通智勝如來至則老死憂悲苦惱滅上科明結緣遠由此下明近由緣佛受請説法大衆中有生疑者故王子始得覆講結緣三轉者謂示勸證三以四諦法三番説故世間車輪有摧碾之用佛説之法能摧衆生一切惑業故名轉法輪初示轉者謂此是苦乃至此是道二勸轉者謂苦應知集應斷滅應證道應修三證轉者謂苦我已知不復更知乃至道我已修不復更修是為三十二行者先泛明次尅定初中先約四諦教二約十六行教十二者即示勸證三轉也行十二者三轉皆生眼智明覺又教十二為能轉行十二為所轉故行隨教俱有十二也二約十六行者謂教行相循共能摧惑俱得名輪但眼智等無有別體還指忍等名教名行故開此四心則成十六謂苦法忍為眼苦法智為智比忍為明比智為覺餘三諦亦爾故成十六心三根人各得十六心則成四十八行次刻論者謂能轉教輪者唯是一權智所轉者方有十二教若行法輪則能轉之教有十二所轉之行亦有十二或通三人或約一人今就上中下三根三轉法輪各於初見諦時合言有十二若沙下沙門不聞佛説尚不能知何況能轉餘縱聞名必不解理故皆不能轉謂是下先約四諦總示世出世間二種因果初二句先示世間因果苦以逼惱為義謂行者不知三苦八苦等是逼惱法能令有為身心速歸於盡故指示曰此是苦又以不知過去惑業合集是招苦之因故示之曰是苦集次二句示出世因果滅者以滅無為義謂惑業若滅則無生死等苦故云是苦滅體即有餘無餘二種涅槃道以能通為義即以定慧力伏滅惑業通至涅槃故示云是苦滅道然能通之道有二謂以盡智滅障無生智證滅障所顯之理也及廣下廣四諦為十二因緣也自無明緣行至生緣老死等示生起相廣苦集也自無明滅至憂悲苦惱滅示修斷相廣滅道也前略陳粗相為下根今細觀四諦為中根也言因緣者以展轉感果為因互相由藉為緣也初無明者體即是癡迷暗為性無所明了故曰無明即該過去世一切煩惱行者即過去世身口七支所造之業以業由惑起故曰無明緣行此二乃過去世二支因也識即意識由上業行成就牽生三界投托母胎故云行緣識既在胎中便有壽暖識三七日一轉而成名色名即心等四蘊色即四大故云識緣名色六入者以自托胎後至第五箇七日六根開張便有入塵之用故云名色緣六入觸謂出胎已後至三四歲六根便與六塵觸對但不能生苦樂想故云六入緣觸受者領納意從五六歲至十二三因根塵相觸對故即能領納苦樂等境而未起貪愛之心故云觸緣受此五乃現在果也愛者從十五六至十八九貪於種種勝妙資具色欲等境然猶未能廣遍追求由領納故即起貪愛故云受緣愛取者從二十後貪欲轉盛於五塵境四方馳求故云愛緣取此之愛取又為未來生死之因體即煩惱與過去無明同有者既著前境即起善惡等業積集牽引當生三界故云取緣有亦為未來生死之因體即是業與過去行同合上愛取乃現在三支因也生者謂六道中受生也以業熟故還感後世之生故云有緣生老死者因受生之蘊熟曰老蘊壞名死故云生緣老死此生及老死二支乃未來之果復贅以憂悲苦惱者皆緣老死而有也無明下廣滅道二諦而説還滅也逆順觀察並由無明為本故無明滅則行滅乃至生老等皆滅矣雜含明四十四智謂老死老死集老死滅老死滅道迹智乃至行亦如是又云七十七智謂生緣老死智非餘生緣老死智過去生緣老死智非餘過去生緣老死智未來生緣老死智非餘未來生緣老死智及法住智無常有為心所緣生盡法變易法離欲法滅法斷此二皆約還滅門明智也二獲益佛於天人大衆之中至無量無邊不可稱數不受一切法者無漏慧起如大火聚一切物不能到到則自銷故一切漏染黑暗智明體中求不可得心得解脫顯己少分破能障定之所知故二説一乘實法六初王子出家二請説妙法三衆求出家四正為説法五信否不一六説已入定今初爾時大六王子至求阿耨多羅三藐三菩提沙彌云息慈謂息惡行而慈濟衆生也六根淨而互用之功顯故曰通利二障寂而四智徹故曰明了深入佛慧矣二請説妙法俱白佛言世尊至深心所念佛自證知諸佛為攝漸機説法必自淺之深俾階不躐等以免駭疑是故智勝先説諦緣法門誘接酬其權請令得成就茲緣界內障除大機將發又緣王子欲滿本願故重請説大第有言彼佛初説圓頓等法恐明文不若是三衆求出家爾時轉輪聖王至亦求出家王即聽許四正為説法爾時彼佛受沙彌請至皆共受持諷誦通利若據少彌智慧明了自應即請即説復過二萬劫者待三乘機熟也有云此二萬劫中不容默然必説方等般若引偈為證然即勘此偈結云説是法華經如恆河沙偈明指前説皆係法華何必硬插此説又諸佛出世雖曰佛佛道同亦不過言其梗槩即如智勝説法華與今佛放光現瑞因聲聞之請而後説已自不同至所化中固通被三乘然三周之説皆以聲聞而為當機乃以教菩薩法而教聲聞也昔智勝説法華王子以菩薩根性而為當機所被者雖亦通三乘却是以教菩薩法而教菩薩也況又未有光瑞等之發起何必配合五信否不一説是經時十六菩薩沙彌至於八千劫未曾休廢沙彌能信聲聞中言亦有信者則不能解者與其餘生疑者皆應聽覆説而與之結緣者也又聲聞中能信者已回小向大餘不生疑者已廢權入實同階不退此中共有四類人矣説時經八千劫之久與七載説者自有廣略不同六説已入定説是經已即入靜室住於禪定八萬四千劫此正結緣之近由由佛在定諸未信及生疑者無所請決故諸沙彌得以覆講結緣亦由彼佛洞徹三際知得度之緣機在王子是故入定令其自詢能信能解者二正明結緣四初知佛入定二覆講法華三出定印贊四生世相值今初是時十六菩薩沙彌知佛入室寂然禪定二覆講法華各升法座至令發阿耨多羅三藐三菩提心正明結緣也多劫覆講則能化之緣深度令發心則所結之緣成此結了因之緣者也若析佛種從緣起義則有二一謂發心雖是自力而由王子之剖決方斷疑生信為能起佛種之緣如以寶珠繫人衣裏故南山云繫珠明理性之常在理性言繫者以理即事故一謂一乘了因雖是珠勝增上而佛性種子須待自發故經云一切智顯猶在不失此約理智一如言也此中發心有四種人謂聲聞緣覺回小向大者是二類三即權教大乘廢權入實者四即博地凡夫因聞一乘直發大心者前二乃上聲聞中未生信者後二即上其餘生疑人也三出定印贊大通智勝佛過八萬四千劫已至如來之慧問智勝但贊王子之因深宛似不知其遠本者何耶答若為開發遠本則不見此經被機能令速至菩提之殊益是故權指果後之因令生渴仰四生世相值二初正示相值二結會古今今初佛告諸比丘是十六菩薩至諸佛世尊於今不盡此明在昔聞覆説發大心之四種人雖經塵劫至於今日猶有盡與未盡之別若更細論者謂有於智勝所始聞説三雖發三乘菩提之心尚在凡夫地中因聞覆説乃回小向大次由怖畏佛道長遠復生退屈王子中間知其先心所好還以小接欲使小根先熟然後教以大智此即三周之當機是已盡者亦有於未來方成熟者即未盡人也復有聞三已見諦已得涅槃次聞覆説發起大心者無論中間退與不退根最鈍人八萬劫外三昧酒醒俱已前至寶所此雖已盡者而亦有影響來今輔佛揚化者有權現三乘引接同類而被發迹來者有聞命從地湧出者有臨聞退席作顯發衆來者有因變淨被移作結緣衆來者此上七類並是由小之大之機也又以此經能兼被頓圓機故復有凡夫於智勝所止聞一乘及聞覆説乃得開解始發大心復有二類一是戒乘俱急者已能早登不退前影響等類中諒亦不少此輩一是自發心來雖未退屈尚在沉淪乘急戒緩者然亦緣本覺內熏增長如來纍劫之冥加雖在三途而仗因緣成熟力故是以一聞妙法即能頓超聖位速至道場者必不止龍女一人已也要之此上且約纍劫師弟相值始終皆是釋尊一佛所化之機以論盡與不盡復有一類發心雖從我佛及中生退轉後而為四萬諸佛之所引攝者於此人中復可論盡與不盡是故此中應有兩重人論盡與不盡經中結緣意乃約曾發大心後生退轉者言與但遇小之説無涉古注似未深詳又須知此土結緣乃本師於智勝一佛前因覆説所度之衆已自不可思議況自凡夫地發大心來迄至於今無問道前道後其間有重重無盡因結緣所化者自充滿於法界矣評曰如上所釋庶使三周得記者俱有交割及諸雲集皆非無因而突來者二結會師弟古今二初會師之古今二會資之古今今初諸比丘我今語汝至成阿耨多羅三藐三菩提十六王子準大鈔應作二義分別一約佛平等德顯三同義則諸佛各別有體二就佛平等中顯此諸佛皆即遮那之身以華藏剎海尚是遮那之化境況此近者且如最中央一剎即有十三佛剎微塵數世界圍繞阿閦無量壽等既未出一佛剎塵界外豈非本師耶又復應知十六之説本屬方便以釋尊成道尚在五百萬億塵點之前詎智勝三千塵點所能校者舊有以八卦約義就名貼釋八方者然作引接儒者意自無不可若後學即推為凖繩則不可矣二會資之古今諸比丘我等為沙彌時至除諸如來方便説法初節總明能發大心者此諸下料簡也於今有退大尚住聲聞者行文貴省即影出上發大心人中有必不退已住一乘者雖亦有在聲聞地者而我尋常還以大乘教化以是漸根故應先教以諦緣法門令其漸入佛道所以下釋退大意爾時下正結會即昔四退之餘也我滅下釋無佛無聞永入滅度疑也謂未來弟子出無佛世因不聞此經便不知不覺即聲聞行是菩薩行生滿足想捨身取滅以入二涅槃便當入大涅槃彼變易身必生餘淨土國中於因緣成熟時必求佛慧唯以佛乘得度除諸下約設權以斷疑也二明今説法華二初正為説實二釋廢立意今初諸比丘若如來至唯一佛乘得滅度耳涅槃時到言應火將盡也衆又下明感薪亦將盡也又清淨言五濁障除也堅固言善根成就聞大不驚也進可了達二空更能深入禪定故集衆為説無二乘無二乘滅度廢權教權果也唯一等立一乘之教與果也二釋廢立意比丘當知如來方便至是人若聞則便信受如來能深知習染之性怖大樂小且又深著弊欲奚可卒為言大故先以治障趨寂法教之令其易信三喻法釋成問此經三周一法二喻皆約開顯廢立説寧有差別否答世尊説法不離教理行果但三周內雖隨便取之而於用義則各不同如法説初云世尊法久後要當説真實至廣顯則曰唯有一乘法除佛方便説等既皆用一説字立言豈非約教法以顯廢立耶其後之二周雖同用果法但果有能所證智理之別是故喻説中諸子出宅不見有三車者廢三果也唯賜以大白者立一乘智果也以一乘妙智能如車輪催碾惑業運載行人直至道場故此下化城則以二乘所證之涅槃以喻化城之可滅廢三果也以佛所證涅槃之理果喻同寶所立一乘也故廢立等言雖同而取義則別智者審之分二初喻説二法説初三初喻往昔因緣二喻中間相值三喻今説法華今初譬如五百由旬至將導衆人欲過此難生公云三界路阻二乘道險乃菩薩五百由旬之惡道也珍寶處即寶所也然有二若約究竟言則以極果為寶所乃唯佛與佛能究盡者約分證言即以終實之初住為寶所經云無上寶聚不求自得又云得佛法分如佛子所應得者皆以得之是也多衆欲過即前已決疑發大心者導師即第十六王子也聰慧下釋得名為導師之義以具權實妙智能諳通之與塞謂於險道中能斷能伏唯進無退名通若自力怯弱二障猛利名塞又於險道中發菩提心即是通相生退屈者即是塞相將衆過難者如於昔結緣者雖未得度而本緣未失還為所將也二喻中間相值所將人衆中路懈退至生已度想生安隱想中路者但以結緣發心時為始至成佛為終被將者於此兩楹之間凡生懈怠者俱名中路欲退仁王云十信菩薩於十千劫內善根微弱猶彼鵝毛隨風東西不定聚攝白導下譬冥感也生佛法性本互相遍況本有不一不異義又況本有所結之緣是故諸佛心內衆生若一念發心則生滅心滅菩提心生固成能感若一念退則生滅心生亦能感者由諸如來咸以大悲而為其體獨於所退猶屬關切即此冥感如白導師疲極約自力言怖畏約前境言導師下因退而設方便也作是下依無現有化作一城且令暫息如出三界説有涅槃令其權證告衆下正以小接也先示相而復勸修也是時下入城如見諦已度想如證涅槃生安隱想則忘失先心矣三喻今説法華爾時導師知此人衆至我所化作為止息耳知無疲倦如大機當發也即滅化城如廢權果寶處在近顯一乘實理也二法合三初往昔結緣二中間相值三今説法華今初諸比丘如來亦復如是至險難長遠應去應度初句合所將及能將知諸句合知通塞應去是通相應度是塞相合昔結緣後中間或用權或用實將導之意又此險道須出二種生死斷二種煩惱方能出離故曰長遠二中間相值若衆生但聞一佛乘者至為止息故説二涅槃先明生退及接小之所以佛知下正明接小説二也中道説二者以於二障二死之間説有二乘涅槃故三今説法華若衆生住於二地至此城非實我化作耳二地即上二涅槃令其自審所得則廢立之旨逾宛切矣二頌文四初結緣由二正結緣三説法華四法喻釋成今初爾時世尊欲重宣此義而説偈言大通智勝佛至一心一處坐八萬四千劫釋意見長文駁方等等注中二正結緣三初明覆説二明相值三會古今今初是諸沙彌等至有六百萬億恆河沙等衆二明相值彼佛滅度後是諸聞法者在在諸佛土常與師俱生三會古今是十六沙彌至是故以方便引汝趣佛慧三説法華以是本因緣今説法華經令汝入佛道慎勿懷驚懼四法喻釋成二初喻釋二法合初三初頌所將二頌中退三頌滅化今初譬如險惡道至明了心決定在險濟衆難古謂水澄渟表定草差別表慧即菩提資糧也二頌中退衆人皆疲倦至皆生安隱想自謂已得度舍宅乃止之所盡智所止煩惱皆息園林是遊觀之處無生智契理遊觀渠流漸次開通內外無滯如無疑解脫了內外名也浴池專注不散澡雪其身如滅定不外流溢為怡神之鄉重門由空觀更入無相無願也樓閣如超越三昧皆涅槃城中所具之德也三頌滅化導師知息已至汝今勤精進當共至寶所二法合三初合結緣二合開權三合説實今初我亦復如是為一切導師二合開權見諸求道者至言汝等苦滅所作皆已辦三合説實既知到涅槃至既知是息已引入於佛慧
