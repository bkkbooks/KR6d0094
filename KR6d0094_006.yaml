body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯西蜀沙門佛間勗𠁼大師立科門人智一雪墩拾遺五廣説功德二初隨喜功德二法師功德今初隨喜功德品第十八上分別品中止約現世親聞如來壽量者之益以顯其勝其於如來滅後在此經中有能發一念隨喜者之德尚未廣説故前品之末校量五種人所得之益時但以校過後四人之德其最初隨喜者所有之福雖已略説若不藉喻廣為申明則人多忽略故此品來言隨喜者謂如來滅後於説法處偶有人來一聞法句一念攝心大生歡喜能隨説者之意無有違逆故名隨喜問下所校者乃第五十人一念之善何以便勝普度凡品皆證聖果之福答華嚴云此經不落餘衆生手應知此能得見聞人已於千萬佛所種諸善根方於此經能生實信乃至一念今經何獨不然況此一念從真流故還契於真雖名曰一而已得同海之一滴便有不竭之德具百川之味矣故所得福齊佛所知文二初彌勒問二如來答今初爾時彌勒菩薩摩訶薩至若能隨喜者為得幾所福此隨喜之微因正可忽略而勞慈氏罔問四依返以此事啓問者正見此經功德叵測末世於此法中即起隨喜心者之福尚非等覺人不能問如來不能答不能盡知則四依之德愈不可窺矣二如來答二初長文二頌文初三初正答二兼示三結況初二初舉第五十人二逆況第一人初二初轉教至五十人二校量最後劣者今初爾時佛告彌勒菩薩至如是展轉至第五十經將最初親在法會隨喜人所有之福且置勿論但將展轉隨喜至第五十人所得之福返拈出校量者正見至微鮮善尚不可測而況於他二校量最後劣者二初舉人誡聽二示大施主今初阿逸多其第五十至我今説之汝當善聽恐視一念隨喜之福為可忽訝度凡登聖之功為最大倘聞此一校轉勝於彼豈弗驚疑故先誡之二示大施主三初廣施財法二結問功大三實對甚多今初若四百萬億阿僧祇世界至皆得自在具八解脫以四百萬界為所化之境以十二類趣生為求福之田卵生者魚鳥龜蛇胎生者人畜龍仙濕生者含蠢蠕動化生者轉蛻飛行有形者休咎精明無形者空散銷沉有想者神鬼精靈無想者精神化為土木金石非有想者如蒲盧非無想者如土梟等有人求福人即大施主求福即施者之願也隨其下先以財施之行滿願也人人皆得滿閻浮之七寶明施之大復滿八十年明施之久已是難能之行而作下復以法施也先念云我固已娛其生烏能保其身後倘不急以佛法拯接縱有財施亦非所謂大施主也爰為示教利喜且於一時皆令得出世果證二結問功大於汝意云何是大施主所得功德寧為多不三實對甚多彌勒白佛言世尊至算數譬喻所不能知古謂先與世樂拔果苦後與涅槃樂拔生死苦此是略舉梵福而為校量若更廣説滿閻浮提人福不及西瞿耶尼一人滿西瞿人福不及東弗婆提一人滿三天下人不及北單越一人福滿四天下人不及一四天王福四天王不及一帝釋乃至第六天不及一梵天福等此後應倍倍上而校之今更模榻其意滿界內人福不及小教一聖福或以滿大千小聖不及始教一初信人福而始又不及於終之破異一乘教內有隨喜一偈者之福以世不及出世故又權淺法門悉從一實之所流故二逆況最初一人阿逸多如是第五十人至阿僧祗不可得比此第五十人乃五種人中初隨喜者之初心恩未及人而所獲之福如來巧以喻説令知迥超前之大施末於校量令人深敬處乃正況出第一從法會聞而隨喜者之福以見難思命意題品正在於此二兼示三初往聽二分座三勸他今初又阿逸多若人為是經故至珍寶輦輿及乘天宮轉身即生報也妙象且約由往詣得聞之等流果言也二分座若復有人於講法處坐至若轉輪聖王所坐之處勸坐分座先令彼身安後得心安乃可誠聽不出法會便具二益故於異熟果中得享自益益他等流之報三勸他阿逸多若復有人至見佛聞法信受教誨初是自往次是分座益人然所益者乃是彼之自來今則彼本無心而求聞之心全因我之勸發則總持之益全在於我故轉身得與總持聖人共生一處由以般若勸人故得利根智慧之報又此勸音必由口出故口用之具皆得清淨要之三業六根皆不外於一身故總示曰人相具足等此得六根清淨之前相然皆約生報言若法師品則約現報矣三結況阿逸多汝且觀是至為人分別如説修行二頌文五初隨喜二勸聽三故詣四令坐五結況今初爾時世尊欲重宣此義而説偈言若人於法會至何況於法會初聞隨喜者世尚如水沫之起滅無從況住世者若阿含經則曰世界初成時由先注大雨水沫久積結成世界則水沫即世界矣二勸聽若有勸一人至優鉢華之香常從其口出三故詣若故詣僧坊至珍寶之輦輿及乘天宮殿四令坐若於講法處勸人坐聽經是福因緣得釋梵轉輪座五結況何況一心聽解説其義趣如説而修行其福不可限前四科皆約極淺劣者言植厚德至此科始況出正意二法師功德二初正明二引證今初法師功德品第十九分別品末明五種人於佛滅後依經獲益隨喜中別二種功德先直顯隨喜者之福大次兼示中明所感之異熟可為入信之前相今由前雖校量而未顯持經者之功甚疾甚速能轉現報令六根不須捨父母所生之身即得清淨便入信位又此持者若望隨喜人彼屬散心故得生報此是專誠故得現報須知持者尚得現報況解説者又況兼正行六度者故此品來問前明五種人依經獲益今何獨約後四人稱法師耶答特由隨喜者初不以法自師又不以法師人即前四九雖有轉教之功亦屬偶遇後之四人則不如是故此四品得稱法師文二初舉根總標二依次別釋今初爾時佛告常精進菩薩至莊嚴六根皆令清淨告常精進者顯持經人欲有所得須先具一片恆心以為其本屏絶外緣惟此一實縱遇違緣了法如幻不被所撓惟進無退其庶幾乎故呼常精進以告之令受持者有所取則六根皆約數顯者如楞嚴云流變三疊一十百千夫一者何即一心也流變者謂由此一念心隨緣而成六根便落三世四方時處數內故得約數增至千二及八百也若豎論者即以三世為首次對四方由三世中各有四方故成十二若橫論者則以四方為首由四方中亦各有三世其數亦止十二故彼經云三四四三宛轉十二此是以一念心初疊成十二也第二更以四方中各具之三世為首如將東方之三世以一變十便有三十餘方亦如之成百二矣第三復用百二亦各以一變十故得千二之數此下名數雖同彼經須知顯義全別以彼就染位中性具之用名為功德故然約性具則各各圓滿一千二百由對境發用有具有闕故其言數則有多寡今以持經之功過於強勝故得現轉父母所生之六根便得少分同於淨用則指此名為功德自屬修生此一不同也又舉雖數同染位及其顯用則諸根互用此又不同也二依次別釋六初眼根二耳根三鼻根四舌根五身根六意根今初是善男子善女人至欲重宣此義而説偈言若於大衆中至雖未得天眼肉眼力如是阿鼻云無間又云無救彌樓云光明即七金山父母所生六根乃九種不淨所攝而言清淨者一憑當教言由世相皆常故二因持經力勝不俟修發之法性生身方有五眼即就現身便轉現報故得即染即淨一眼之內便具五眼之用如見大千內外應名天眼然校所見復過於彼且如梵王報得天眼止見己界大千之外則為風輪所障即不能見若在他界亦不能見非所統故非同分故若三乘人所有天眼則隨其所在俱能得見風輪自他俱不能礙但由道力淺深不等故其所見亦有近遠又見業因緣法眼也其目甚清淨慧眼了知空也至一念中頓了色心性相此佛眼少分之用也若論一根具五根之用乃八自在我中一分相似之德也二耳根復次常精進若善男子至欲重宣此義而説偈言父母所生耳至但用所生耳功德已如是耳根亦具五耳之用聞六道聲是肉天二耳聞二乘是慧耳聞菩薩是法耳聞佛是佛耳一時互聞似佛之圓耳矣不壞即不謬也其諸梵下私謂鼻舌二識二地已居況諸上梵今言聞者殆約入禪出禪之心聲也或圓光成音也以初禪中無段食故二禪已上分別依不起故三鼻根復次常精進若善男子至欲重宣此義而説偈言是人鼻清淨至而是持經者先得此鼻相香與臭皆氣分之通稱而世則以可意者名香其不可意者為臭矣今經則通取之如聞野牛水牛等是也以肉鼻聞大千內外天鼻也不染不著是慧鼻分別不錯是法鼻一時互聞佛鼻也顯互用則知物所在眼用也聞讀經説法耳用也知花果實舌用也知出禪入禪身用也知染欲癡恚心意用也又辨懷妊之成就不成就則前有宿命明後有天眼明矣知男女所念更有他心智矣知如法修行則近漏盡矣未得無漏法生鼻者顯雖未登聖而因持經勝力即有妙用正見其不思議處須曼那云善攝意其色黃兼白極香樹高三四丈下垂如蓋須曼女生於中闍提云金錢花末利云鬘花堪作鬘故波羅羅云重生花多摩羅跋云性無垢多伽羅云根香即木香樹也波利質多羅云圓生樹生於忉利天中高百由旬根入地五由旬其香逆風薰五十由旬順風百由旬拘陀羅云大遊戲地樹香也四舌根復次常精進若善男子至欲重宣此義而説偈言是人舌根淨至常念而守護或時為現身舌根合中取境亦具千二百功德者楞嚴云如舌宣揚盡世間出世間智言有方分理無窮盡故不止八百也以深淨妙一頌乃四辨之一謂此法師能以諸法名字義理隨順殊方異語令各得解生喜即辭無礙也故五舌之用備於一辭矣五身根復次常精進若善男子至欲重宣此義而説偈言若持法華者至以清淨常體一切於中現舊注謂世界所有於身中現肉身用也竊謂人間之身始名肉身論此身之用止能合中取境非聖人德相之身不能自然照境現影其有神力人雖亦能照現而是業用凡夫肉身何有現用餘之四身皆不過以所現者名能現也今以分段即同無漏者正顯經功之匹測也幸思之六意根復次常精進若善男子至欲重宣此義而説偈言是人意清淨至分別而説法持法華經故聞一下即華嚴一法門中無量門無量千劫如是説二句之義因持經力故能由約而博也若説下問佛因舍利弗降伏撥無後世外道聽比丘於一日中分三時以初中二時讀佛書晚分讀外書但不許依其見解故祇桓中有書院此則由學方能了達今持經人何以不學便能知外且令所説不違實相耶答以所持文字即是實相實相般若是大總持門世出世法莫不由此流出故令橫説竪説得如五地聖人二諦融通雅合佛經安住希有地者前云此經於無量國中乃至名字不可得聞何況得見受持讀誦正顯此法之希有故能持此經者雖未得無漏意根便得聖人之用此則因持希有法得住希有地耳二引證常不輕菩薩品第二十品來者由前文纍言弘經之報如曰轉身得與陀羅尼菩薩共生一處則生報也又曰世世所生見佛聞法則後報也二事皆屬未來信在可否不須引證獨法師功德品所説六根清淨之報俱就現世而言奈何得見現報者甚覺寥寥自是難信是故世尊即引自身因地曾得現報作證以見希有而啓流通者敬慕之心故此品來品名不輕者即世尊因中於未曾具聞法華前內心止悟佛性平等之理外見平等不可輕之境故以身口便修不輕平等之行所以逢人便拜沖口便與授記以未聞無智人中莫説此經之誡及未得將之護之之方便故令增上慢人因所修之行而為立名嘲之曰常不輕文二初長文二頌文初三初承前標起二引古為證三結益勸持今初爾時佛告得大勢菩薩至眼耳鼻舌身意清淨前説指法師品中以一惡言毀呰持經人其過尤重於一劫罵佛之罪向説指法師功德也準此則知此品專為引證現報而來非泛為三報言也二引古為證二初引略聞法華未得大益二明具聞全經得大饒益初二初總敘諸威音王正法像法二別敘常不輕由行得名今初得大勢乃往古昔至有二萬億佛皆同一號有大神通力曰威有樂説辨力曰音有大善寂力曰王由此三業皆悉不護故稱曰佛二別敘常不輕由行立名最初威音王如來至號之為常不輕前説信者毀者之功過然未指示其事今故點出最初下點時爾時下點人我深敬下點行也古謂我深敬下二十四字具述因果等得正説之宏宗流通之妙益是則是矣但因常作是語以致四衆生嗔墮苦固是大振塗毒為下智種若以此後數處經文勘之未免意有縱奪言含抑揚如云但行禮拜則惟攻事行矣又曰不專讀誦則鮮諳弘通法式矣由因久行苦行最後得具聞獲報校之得安樂行持經者之報亦甚勞矣故下章具聞科中不見更有説禮拜事處詎非在前之行咸由略聞梗槩罔識權宜即向無智人中便説此經故令兩家同遭無妄寧不可慨惟冀高明細玩經文慎勿是古非今幸甚幸甚或謂此説恐抑世尊之因行而不思前文云面佛罵佛一劫不如以一惡言毀呰讀誦者之罪更重寧不抑果德耶故今以略聞具聞分判二科以釋之二具聞法華得大饒益二初聞法得益二結會古今今初是比丘臨欲終時至功德成就當得作佛佛意正引此文為上六根清淨之證雖云值燈明得生報值二千億佛得後報然據結文正意似特為證現報而引耳又若以具聞後但云廣為人説與前但行禮拜處二文參看其善行菩薩道與不善行之意自見二結會古今二初會不輕二會四衆今初得大勢於意云何至疾得阿耨多羅三藐三菩提二會四衆得大勢彼時四衆至三菩提不退轉者是地藏經佛囑地藏菩薩云無令是諸衆生墮惡趣中一日一夜何況更落五無間地獄動經千萬億劫等可以參看善行與不善行之旨矣三結益勸持得大勢當知是法華經至讀誦解説書寫是經結辭中但勸行受持讀誦即能速至菩提並不勸學逢人便拜與記足知強以佛記聒人耳者不足貴也二頌文二初引古為證二舉己勸持今初爾時世尊欲重宣此義而説偈言過去有佛號威音王至今於我前聽法者是著法者不達諸法即是實相橫計有無是故才一鼓唇即名牙後轉成謗法罪畢者不輕宿世惡業將熟應得之報今由粗知禮拜持經之力準以重罪輕受故致四衆輕賤捶打令先世應墮惡道之業則為消滅也二舉己勸持我於前世勸是諸人至世世值佛疾成佛道六發願傳持五初神力勸持二神力付囑三大衆領受四事畢唱散五時衆歡喜今初如來神力品第二十一此因本衆未涌之前他方雲集菩薩發願在此娑婆弘經世尊制止曰我娑婆自有六萬恆沙菩薩於我滅後在此弘經故諸大士聞佛聲召自下發來續因釋大衆不知諸大士來處之疑乃為開近顯遠洞彰果德勸持顯益引證既竟故諸大士發願弘經蓋遵召命也今始為現希有神力以固弘通者之敬慕令無別好神力者九界莫測之謂神無能制伏之謂力然非過量大人則不能具故曰如來神力品文二初長文二頌文初二初神力表異二舉要付囑初二初受命弘持二神力叵思今初爾時千世界微塵等至解説書寫而供養之世尊自入塔即唱滅求人付囑今得諸大士奉命益他並自滿本願則出世之能事畢矣此段應另作一大科特以文字甚少故不別開二神力叵思爾時世尊於文殊師利等至通達無礙如一佛土所現神力共有十種今與舊説略有開合出廣長至梵世第一神力也現此相者證上所説皆從誠諦所流世間福德人多生不作妄語尚得舌可至鼻況具此難思之相者則其所説彌可信矣一切毛孔下第二神力也毛孔皆光者顯前乃通身吐露之説即一字一句悉與實相無違故得遍照諸佛亦現者見道同也下亦準此釋迦下至百千歲第三神力也據常論時説法華及涅槃傳計八載今一現神時便謂百千使非神力所為何能延促無礙故今開出然後還至十方界第四第五二神力也初明謦咳有二義一是通暢之相若約近言則是世尊四十年前未吐之懷約遠而言則是塵點劫前為欲調攝一類漸機之方便總未點破今皆全吐毫無底蘊乃得有此通暢遍界之聲彈指聲亦遍者乃第五神力也彈指是隨喜之儀由諸大士現前得此真淨大法能得將來二利大果是故彈指而為隨喜地動神力第六地係厚重無明無始結業種子所發現行最難搖撼今由破障人所發二聲互擊故令震動其中衆生至得未曾有第七神力者衆生洞視不過分寸今承神力得遠瞻見又此普見中應有會初退席及三變被移者由神力加被伏無緣慈同得遠見生喜作未來得度緣此亦初揀後收意也即時下神力第八諸天遠處他土苟非神力攝持渠且受樂不暇安能向空唱聲勸人彼諸下第九神力也彼即地居衆生因聞空聲方合掌稱名縱未得覲亦種未來得度之因所興之供變成寶帳覆諸佛上者不獨示將來有由因趣果之兆且示現前身雖遠心却能近之敬古以此段開為二種今合為一於時下第十神力也三世四方各有分限今由神力所加一切藩籬撤令無礙如一佛土此即六根清淨得證圓融寶覺依正一如之兆也已上神力即地持經七種無上中第六神力無上也二舉要付囑爾時佛告上行等至諸佛於此而般涅槃等字合該持品之衆而不言者以久被化而該近益者也初明以希有神力不能説盡以要下正舉要也一切法即佛所有理行果法自在神力即化物神通祕要之藏即久而後説甚深之事惟佛佛始知皆是此經宣顯是故下勸修也所在下勸供也凡所在處命起塔供養者以法身從此生故又法身觀照文字三種般若即三即一故故令文字外求少法不可得況果性全不離乎因性佛出世惟生處得道處轉法輪般涅槃四處起塔皆約生身故但有四今約法身故令所在皆應起塔供養二頌文二初頌神力二頌勸持今初爾時世尊欲重宣此義而説偈言諸佛救世者至周聞十方國地皆六種動二頌勸持三初總標二別顯三結勸今初以佛滅度後至如十方虗空不可得邊際人以法重故蒙諸佛歎美二別顯能持是經者至教無量菩薩畢竟住一乘初頌半以經卷是力持身攝由一即一切故持之於心念是則為已見本尊等此約所持準為能見自利創成矣次二頌復廣前德準為見佛供佛令佛生喜等功德即含利他意以顯能持者則具二利妙德諸佛下約能持略頌四要兼明得佛三密初明所得祕要即意密次三頌甚深事義即得佛口密以説法慧光除無明暗也斯人下以身業威儀教住一乘乃身密也三結勸是故有智者至是人於佛道決定無有疑由持經之心能與妙法契合為因故與當來所得佛果生決定心無有疑惑縱聞菩提廣大萬行難修轉依難證決不退屈二神力付囑囑纍品第二十二前品如來以希有神力勸持既竟今從法座起復現神力而為囑付囑付者略如古云囑是如來金口所囑纍是菩薩丹心頂荷乃以授受合論故云囑纍又如來躬從座起申手摩頂授以難得之法大衆曲躬合掌如世尊勑當具奉行殷勤頂受故云囑付等文三初普遍付囑二舉佛釋成三委示報恩今初爾時釋迦牟尼佛至令一切衆生普得聞知世尊從多寶塔中法座起現大神力以一手遍摩多人頂者蓋緣將用口輪付囑故以身輪先示妙法流通之相而為加被謂以不可思議方便妙用之手握諸法實相之印而置於諸大士之頂普令其心如蓮華開權實雙融然後乃可弘通大法而使佛種不斷又以一手於一時即遍摩衆頂者乃從即根本法之身輪垂能同之業用於所同內引歸於圓進證德相也又佛手下垂諸大士以頂上承固因果交徹之相亦一多無礙門中事也而作下正明付囑告曰我自曩劫修習是難得之法今以付囑汝等汝等應當受持等然付之以無上菩提而曰受持讀誦普得聞之由無上菩提不在文字般若外此教之所以載理行果也有定謂拈花而付正法眼藏惟在迦葉何如此中付囑之為廣大二舉佛釋成所以者何如來有大慈悲至如來之法勿生慳吝徵辭謂衆生根行不一何能普令聞之如來下即舉佛為例以釋之謂如來有大慈故遇有智者則為盡與無諸慳吝速令受樂有大悲故值無智者則念念拔濟不生畏憚必令脫苦然後等與佛慧佛之智慧即一切智能知一切內法內名外法外名如來智慧即道種智能用諸佛一切道法發起衆生一切善種自然智慧即一切種智謂由諸法各各皆具天然內慧以一種智知一切道及一切種由我能斷諸法中惡獨無所畏故能以此三智普與一切衆生上是引例汝等亦應下正勸學佛普令廣聞也三委示報恩於未來世若有善男子至則為已報諸佛之恩遇利根者則為直説佛慧遇鈍根者須先引置餘深法中然後開顯言餘深者望前小教能為破小顯大曰深未如今經直明佛慧而猶帶權説實曰餘若能如是引接則為已報諸佛之恩矣三大衆領受時諸菩薩摩訶薩至唯然世尊願不有慮三反發聲奉勑者答上三摩付囑之至意世尊降靈為化一類由小之大之機本致既暢今又得人流通矣縱有餘蘊不過捃拾而已四事畢唱散爾時釋迦牟尼佛至多寶佛塔還可如故多寶為證經故來今法事既畢故令塔門仍閉分身為開塔故來今事亦畢故令還歸而釋尊亦還歸於靈鷲故此經有二處三會之説多寶佛塔為贊證諸大士弘通法式雖閉塔門尚未去歸五時衆歡喜説是語時十方無量至聞佛所説皆大歡喜言皆喜者諸佛利他事畢故喜大衆得聞希有法故喜而曰大喜者果人此後無復餘事因位定知將來必得無上妙果故皆大生歡喜四弘經軌式六初以苦行弘經二以往來弘經三以普門弘經四以呪護弘經五以轉邪弘經六以勸發弘經今初藥王菩薩本事品第二十三藥王以下不區區在讀誦章句始名弘經何則諸大士久遠弘經妙觀湛然身口意等即人即法此外毫無別法名句文等即法即人此外亦無有人故宗鏡云色法華受想行識皆法華惟其人法雙融舉一全收故藥王等得以身輪之苦行妙音得以身業之來往觀音得以普門圓照法界直令火宅化作清涼俾奉此芳規者拂彼塵勞出在不久第恐戀宅諸魔宮殿被摧妒汝出界損彼眷屬僉來生擾便成退屈故勞藥王勇施等諸大神王同以密呪護持令不得便此固外難蕩矣復恐內障相仍倘一念有差便如莊嚴王萬善俱失故古注引莊嚴之往緣經説知識之極接警令轉邪以掃意地之微細此則內外俱寂惟弘通之是務方感普賢遙臨請問四法令得是經而結其局齊赴道場今於芳規之初先明苦行者以娑婆國中人多斃惡設不先忘身見了苦如幻雖擅多行未輕與議是故首舉使有仿效文四初菩薩請問二如來解説三聞衆護益四古佛稱善今初爾時宿王華菩薩至及此聲聞衆聞皆歡喜菩薩號宿王華者宿乃星光所止之舍宿中王即月輪也以能映奪衆星之光故以王稱華有結果之能合顯此菩薩能如宿王破衆生長夜黑暗更賜清涼之妙行為因而感果法也藥王昔名星光因於尊者日藏前聞説佛慧以雪山上藥供養衆僧誓曰願我未來能治衆生身心兩病舉世歡喜故號藥王今欲明藥王本事故假宿王華發問問意謂我聞藥王久持此經遊化娑婆而不知以何身遊又此界中我見最重於毫末內尚生貪著而況於身大士為攝此輩自有無量對治妙行蕩彼執情願少解説令諸聞者猛發亡身為法之志而以流通正法為急務二如來解説二初説本事二嘆妙經初中三初本事二結會三勸修初又二初事佛聞法二得定修供今初爾時佛告宿王華菩薩至諸聲聞衆説法華經既無女人應皆一變化生一箭道者須知彼中依正既總優於娑婆何得以此校彼乃以彼時之量而校彼時之數耳以喜見為當機者則喜見亦如身子皆由權入實之人也二得定修供二初得定二修供今初是一切衆生喜見菩薩至得現一切色身三昧上為當機説法今令頓證三昧論此大士因地多從權小中信根成熟方蒙彼佛開顯入住證實特緣經中自具頓超妙旨所以不立僧祇止消萬二之修習即斷現色不相應染便登八地護色自在而得普現色身三昧遂有內現外現內外同時現之妙用問何以知大士從權小來答以從聞經後始有所證自與燃燈因妙光説法互相激揚者不同也二修供二初現在供二未來供初二初神力供二燃身供今初得此三昧已心大歡喜至價直娑婆世界以供養佛由得生喜溯源報恩入定而雨者由因斷染於色法中大得自在故令所出花香皆具實用以為供養二十四銖為一兩六銖乃一兩中四分之一也二燃身供三初然身二佛歎三供時今初作是供養已從三昧起至八十億恆河沙世界不如身供者由神力以身為所依方有妙用故以根本作供乃名上報未供之前於千二百歲中服香飲油者以當下幻軀未得即名法供是以外藉服飲之緣內運定慧之力共相薰淘令十二處轉為五分否則不堪致敬復又外以忍辱纏身內以弘通立願乃從中道妙觀發智慧火自然其身故有妙光照徹此彼恆沙國土薰陸香樹出大乘國葉似棠梨兜樓婆出鬼神國此云香草又云白茅香畢力迦或云丁香膠即白膠香也二佛歎其中諸佛同時讚言至作是語已而各默然問弘經軌式甚多何今先用苦行答由上安樂行中未暇言及故苟不融會終成別見所以首舉良以苦樂二行敵體相違故喜見於得三昧後欲攝苦行同名安樂遂以然身之行昭廓其式否則弘通行海何獨乏此鴻波思之精進言真者緣喜見於然身時內運妙觀觀蘊界處緣生如幻人法俱空苦樂雙遣當體即是實相安住行處惟進無退念念流入薩婆若海故佛讚曰是真精進殊非不達妙行無住者可比也法言真供者諸佛觀彼正然身時妙止湛然於實際中求覓能生此身顛倒之因及現前之生滅未來之退轉了不可得三際平等故究竟如虗空故遂令生身即同法身能所燒相與能所供相悉皆寂然即人即法頓成法供始蒙以真法供之贊誠非國城妻子等供可及最為尊上贊已默然者正納受意也然燒一行為小乘律所嚴禁者為欲具足僧寶尊重之相故又以未如大乘人知法如幻故彼具縛凡夫正在苦中能所未亡奚能以苦為法界當其燒時渠且忍苦不遑安能內運觀想而伸供養之誠諸佛見之正愍其愚妄更何贊之有哉是以制止三供時其身火然千二百歲過是已後其身乃盡五疊六根各各性具千二百功德故歷千二之久以伸供養二未來供六初化生王家二自説本事三復覲本佛四本佛付囑五奉命任持六然臂供養今初一切衆生喜見菩薩至結加趺坐忽然化生復來生於本國者以上供之願猶未滿故正見然身之機猶未成熟得利益故二自説本事即為其父而説偈言大王今當知至勤行大精進捨所愛之身經本六句不得擅加後二句三復覲本佛説是偈已而白父言至世尊猶故在世此供佛已得陀羅尼復聞多經與前得三昧處分明是兩番聞經兩番得益事若不爾者直使然身法供返成無益故知此中我先供佛已一句言雖總指前生而意則別要敘出然身時於觀心中感得聞經得益事以示於人亦如不輕臨終得虗空開口事相等此則然身之功庶不唐捐惟智者詳之況初得之三昧屬色自在今語言陀羅尼似屬心自在居然有淺深之別得解語言者謂菩薩獲大智慧於大小乘一切道法及世間種種語言文字悉能通達照了無礙是為道法無礙又云善能宣説一切語言於一字中説一切字了一切字同於一字甄迦羅乃俱舍六十大數中之第十六頻婆羅第十八阿閦婆第二十數也或云那由它是百萬億甄迦羅是千千萬億頻婆羅是百千千萬億阿閦婆是萬千千萬億猶故在世者知能感之因及應火之緣將盡故發此問四本佛付囑爾時日月淨明德佛至於夜後分入於涅槃以能化之佛法及所化之依正悉付與者由喜見仗持經力德位並臻於諸人之上乃堪付囑託以大事溥被未來五奉命弘經爾時一切衆生喜見菩薩至垂諸幡蓋懸衆寶鈴應化之身法應非滅現滅正法眼清明人之所熟諳而復示以悲戀者欲令法會同生渴仰深種善根意也瞻部在海居妙高之南故云海此岸多出旃檀今積之為𧂐𧂐是聚意六然臂供養三初供養益物二兩臂還復三地動衆喜今初爾時一切衆生喜見菩薩至住現一切色身三昧誡一心念者非一心即不能緣一乘境亦不能引三權同歸一實住色身三昧非歷七萬之久亦不能令念者之根至成熟故二兩臂還復爾時諸菩薩天人至福德智慧淳厚所致心自在故色逾自在是故空塵隨乘願力集還兩臂由斯下十二字乃釋尊贊斷辭也三地動衆喜當爾之時三千大千世界至一切人天得未曾有二結會佛告宿王華菩薩至百千萬億那由它數三勸修宿王華若有發心至諸珍寶物而供養者貪愛重者拔一毛利天下尚且不為而況以身作供夫欲作此供者必須真知妙法難逢多生罕遇身受為招苦之本頃歸無常方可作此捨身微因而求常樂之果二嘆妙經二初嘆全經二嘆本品初中三初能持人勝二所持法勝三例示多福今初若復有人以七寶至一四句偈其福最多廣多七寶非尋常物四皆聖者非尋常人能供所供可名極尊極貴而所得福不及持一偈轉勝者以財不及法也蓋法是聖師能生能養能成能榮故今以人能弘道故先嘆人勝二所持法勝二初顯體二顯用今初宿王華譬如一切至亦復如是諸經中王此下十番約喻用顯此經體勝初約大海謂川流江河並皆淺小不及海之深大如此妙經校諸大乘不惟破小且能深徹底蘊橫該俗諦不違實相二約須彌謂土黑諸山體皆卑微故令須彌在上如餘諸經詮理多含未伸今則一極唱高迥出衆典之上三約月天謂星光雖衆惟被一月奪彩顯照今校諸經所演不止掩蔽權理又能彰碩孤照四約日天謂大明麗天諸暗盡破能依此經作觀者校依餘經所發實智不惟消爍我法重昏即生相積暗亦並破矣五約輪王謂諸國王縱王羣黎不得稱聖惟轉輪王福相齊具方堪稱仰如諸大乘雖名説實實體不足今則純談實相妙理圓滿而為衆典之所尊重六約帝釋謂地居諸天雖名天子仍被帝釋所轄如諸權乘雖名為大仍為此經一實所統七約梵王謂俗呼梵王是衆生父此經亦然能生實智為諸二乘及發心者之父八約辟支謂諸聲聞皆藉修斷證果惟有辟支無師自悟彼果中所説及因位所説未如此經不假方便但説無上者遜揖居次能持亦勝者以所乘乘勝故九約菩薩謂二乘聖未若菩薩二利兼優校諸教中未如今經不但開近復能顯遠十約法王謂佛尊稱諸法中王如此妙經於破小顯大法門及帶權説實帶實明權斥權贊實等法門中若廢若立若開若顯若會若歸俱得自在故得稱為諸經中王此上十節以從下至上從夜至晝從地至天從凡至聖從因至果五對十隻居然有次井井不紊二顯用宿王華此經能救至能解一切生死之縛先法次喻初中一切衆生該盡九界令離二死之苦復滿所願如清下更約喻以彰勝用所以重重引喻者正見勝用無窮處又以無緣悲不因有求拔苦以同體慈不負有感即與其樂一切苦乃在二死果中病痛即果上之報障縛即能感果之惑業三例示福多若人得聞此法華經至所得功德亦復無量實相妙法本超乎數以人法不二故持之者亦與之等佛智難籌者甚言其大也二嘆本品四初通明聞者功德二別舉女人受持三例明隨喜贊善四囑纍一品流通今初宿王華若有人至亦得無量無邊功德持此一品所得之福便如全持者以藥王首用亡身法式而擴安樂妙行俾達苦樂一揆導物之功甚鴻故也二別舉女人受持若有女人至成就如是功德智慧之力別舉女子者以愛不深不生娑婆情不重不墮女身今於如來座下而服聞經法藥即得轉染成淨身心兩病皆除更不復受女身若如下復言後五百歲以佛滅後世逾下而障逾重苟能於此受持身雖女流猶勝雄猛丈夫以在煩惱大海能翻身故故能捨此極苦極穢之身土而得極樂極淨之依正固因法行之精專更見經功匹測不復下謂昔在娑婆全以貪嗔諸垢為力今則不更為所惱且令得通得忍得無漏法性之六根俾六根之妙用過前所得之報百千萬倍眼根既然餘豈不爾言菩薩無與等者私謂此指一類持餘經生淨者言非指舊住補出諸大士言也三例明隨喜贊善若有人聞是藥王菩薩至所得功德如上所説身口皆香得報於現世乃轉染之前相也四囑纍一品流通是故宿王華以此藥王菩薩至應當如是生恭敬心三聞衆獲益説是藥王菩薩至得解一切衆生語言陀羅尼語言即是心聲諸大士雖得弘通法式倘不先解語言則不識彼病源所在藥將誰投故因聞品之力先得用藥之訣於遊化時自能契機契理矣四古佛稱善多寶如來於寶塔中至利益無量一切衆生諸菩薩現前所得之益及未來世所得之益皆因一問而有故感古佛連連贊善
