body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯西蜀沙門佛閑勖𠁼大師立科門人知一雪墩拾遺第二領解授記三初身子領解二如來與記三大眾領解今初譬喻品第三梵語阿波陀那此云譬喻即以類比況謂之譬開曉令悟謂之喻今為二意說喻一為有智說似令解真故如下諸有智者以譬喻得解等二為懷疑就彼取類誘令信故咸由於上法說先三後一之旨尚在沉迷故更約三車一車之譬以況之俾因喻知法品次來也文二初長文二頌文初三初敘聞法信喜二述昔咎釋成三結信喜作佛今初爾時舍利弗踊躍歡喜至心懷踊躍得未曾有內解始發名喜喜動於心名踊躍狀如燕之踊鵠之躍之歡喜即起下又明喜解現於七支也翻內外之執障成三業之妙解矣言今聞者顯耳中一向無此音得未曾者顯心中一向無此喜解也二述昔咎釋成三初自疑有失二疑咎在佛三引咎歸己今初所以者何我昔從佛至失於如來無量知見敘昔之迷也緣世尊於昔教中曾與彌勒等菩薩授成佛記於般若會上曾說如是法似但為菩薩而我則不預寧非己有失耶是以甚自感傷二疑咎在佛世尊我常獨處山林樹下至以小乘法而見濟度在眾時疑己有失獨處時咎佛有私又法性是一理水無二既與諸大士同入何獨置我於度外耶三引咎歸己是我等咎非世尊也至遇便信受思惟取證初引咎歸己即述今之悟也若我當日待佛唱明說此方便法門之所以本為成就阿耨菩提者必得度以大矣由我不解先三為入一之因是故初聞即便信受此咎何關於佛蓋自誤也三結信喜作佛世尊我從昔來至從法化生得佛法分由此法身從佛口教法之所生則如來知見寶藏之分皆其所有又耳聞妙音為從佛口生心悟妙法為從法化生二偈文二初領解咎己二決疑生喜初二初領解二咎己今初爾時舍利弗欲重宣此義而說偈言我聞是法音至我已得漏盡聞亦除憂惱二咎己四初對菩薩言失二對如來言失三於日夜籌量四推佛意釋成今初我處於山谷至如是等功德而我皆已失謂不能如諸大士修大因也言無漏者三乘修證無出滅道二諦有為無為二種無漏此執小同大而不知淺深各異也二對如來言失我獨經行時至自惟失此利我為自欺誑謂不能如佛得大果也此上兩科皆約自欺為言正明不甘於卑下乃上根人也三於日夜籌量我常於日夜至以是於日夜籌量如是事涅槃為日生死為夜雖可表顯然觀文義不若直說為暢四推佛意釋成今聞佛音聲至是時乃可謂永盡滅無餘今聞佛音始知一向所說皆是隨宜足見無漏人之難思雖為說權本欲令我等同至道場我本下推佛在昔說小之故由我久著邪見為梵志師且自謂已得究竟世尊為欲拔我邪見是故先說涅槃使有所得俾其回視曩日之非究竟也蓋天竺諸外道輩於佛未出前莫不各各自謂得無上道故世尊先度梵志之師令諸羣邪不化自改也而今下結成所解乃自覺昔之所得非真必內斷盡惑障外具如佛之莊嚴方名永證無餘之大涅槃二決疑生喜二初會初驚疑二信喜作佛今初佛於大眾中至我墮疑網故謂是魔所為初結前生後初聞下正顯會初之疑由所說甚略故而言趣又迥異尋常故故疑能說之身將是魔之所變來惱亂於我耶佛以下領上總明諸佛開顯乃知還是本佛緣我墮疑網中返謂佛為魔也波旬此云惡常有惡心欲成惡法故二信喜作佛聞佛柔軟音至轉無上法輪教化諸菩薩初明所聞之法清淨無滯故得安住實智中我定下明決定智生更不退轉也二如來與記二初長文二頌文初二初述遠因近緣二與未來佛記初二初述遠因二明近緣今初爾時佛告舍利弗至引導汝故生我法中吾今於天人等即下文集聚國王親族等意也我昔下示今領解與記之由謂我曾於二萬佛所教以無上妙道汝亦曾於生死長夜隨我受學中雖退大我於中間復以種種方便引接是故今日生我法中蓋宿緣所追也身子昔修菩薩行已六十劫因婆羅門乞眼乃退大取小故今先以小乘稱其本習然後授以大法也二明近緣舍利弗我昔教汝至教菩薩法佛所護念初明汝雖忘大而昔之志珠願種猶然未失我今下明今說大也四十年前為菩薩說大乘今四十年後為諸聲聞說大乘是故此經名為破異一乘所說大乘即是了因眾生之知見即所了之正因也二與未來佛記舍利弗汝於未來世至像法住世亦三十二小劫菩提資糧論說四種授記一未發菩提心與授記謂具增上信根人故先與記後令發心二共發菩提心授記謂具增上行人欲度一切同諸眾生共發菩提心蒙佛授記三隱顯授記謂此修行人固當與記恐生滿足想復恐有見此人具如是行何以不蒙授記故佛以神力密為與記轉令他人得聞而自不能聞故曰隱顯四現前授記謂菩薩成就出世善根得不動地即時蒙佛授記此四多是記菩薩得無生忍者今明聲聞得記亦有四意一昔未記二乘故今與記二中下未悟以與記勉之三令聞者結緣四滿彼本願記後更經多劫者以諸聲聞一向止有自利之行今欲得淨土必須萬行莊嚴與物結緣然後感果供佛修福也持法修慧也當得下明果現也華光有二義一華能感果二光能破暗此約因明果也二坐寶華宮威光赫奕此約果上之尊特以彰號也國名下記依報也而皆翻染所得之淨略無一種似我釋尊者以諸聲聞從久遠來皆由深厭五濁是以退大取小故所與記須稱本願華光下記所說之法雖非五濁亦說三乘乘本願故亦傳化門中決不可廢者也國以大心之寶而為莊嚴壽命十二劫者蓋約穢土之時分以紀淨國之數目非如穢之三災能滅物也華光授補處記以華足安行名號者華足即因圓意安行者一如華光之妙行演化而不改也二偈文爾時世尊欲重宣此義而說偈言舍利弗來世至彼即是汝身宜應自欣慶住行向地諸大士皆能現八相度生但廣狹不同耳今明行成果滿從真起應也又今之開解雖未定其淺深必住何位不妨且約入劫之初圓發三心而言以理事無礙門中有一證一切證一斷一切斷義故亦必由初住始三大眾領解二初長文二頌文今初爾時四部眾至今乃復轉無上最大法輪初經家敘喜也各各下傾誠獻供以表其喜衣自迴轉者由正報開解轉入聖位故依報亦隨而迴轉又天花屬色香二塵之上者天衣天樂屬聲觸二塵之勝者等字內或含妙味則五塵具矣夫根境二同一緣起以由塵發知因根有相相見無性既同於交蘆是以存則俱存亡則俱亡今由知見既開故諸塵境應念化成無上知覺同為一實相印之所印矣亦是唯心迴轉善成門中義也而作下亦祇敘先小後大二種法轉並不言及菩提場事二頌文爾時諸天子欲重宣此義而說偈言昔於波羅柰至及見佛功德盡迴向佛道初頌上開顯五眾即五蘊以十一色法方合為一蘊乃至八識合為一識蘊故眾即蘊義於四諦下悟知此五之生滅得出分段也我等下述今昔之異而起隨喜心也末頌迴向佛果也私謂四部校身子之根為更利且不勞佛之記莂便能直下承當作佛一事殊為杰出二喻說授記此下四品皆約喻況法今品正約喻開顯也文二初喻說一乘二領解得記初二初長文二偈文初二初身子陳疑代請二如來正為喻說今初爾時舍利弗白佛言至說其因緣令離疑惑初自述無疑是諸下敘眾有疑自在即解脫義心自在顯心已得脫也成實論云一慧解脫謂以智慧斷除無明惑業而得解脫名慧解脫二心解脫謂因此心離於貪愛之縛而得解脫名心解脫然得慧脫者未必心脫以得心脫者必具慧脫故特以心自在言也佛常下述佛在昔自贊教法之辭是學下述諸人在昔依教取證亦自不虗我見即身見有無二即邊見也而今下述執昔三與今說不同故墮疑惑善哉下正為眾代請今昔相違之故是何因緣二如來正為喻說三初引前起喻二許以喻說三正為說喻今初爾時佛告舍利弗至是諸所說皆為化菩薩故初約能被之法雖有種種皆為無上菩提是諸下約所被人雖有三乘五性而皆為化菩薩故我以如是諄諄何以尚迷二許以喻說然舍利弗今當復以譬喻至諸有智者以譬喻得解許說喻令曉以慰之論云如來為七種增上慢說七種譬喻第一為顛倒求諸功德增上慢心以世間中諸煩惱染熾然增上而求人天勝妙境界有漏果報對治此故說火宅喻應知三正為說喻三初喻說二法合三結答初二初總標喻本二別顯喻事今初舍利弗若國邑聚落至或至三十在此宅中塵餘云喻中祇在長者及子火宅一門三車一車著離苦樂出入等字上取譬而樂著之情救濟之慈望外之喜形容曲盡法合自在下文其不急者略之隱攝者又在頌中補出以前法說外別無可說故假譬喻再明前義即是重轉法華古注於本文法合外強增臆見似穿鑿不可依等前法說中約五濁橫豎遍滿義眾生被溺猶不求出故設隱實說權因緣且令先免汩沒之苦此下喻說中約眾苦逼迫義以喻諸子在宅將被火害猶不肯出是故長者以投其先心所好因緣門外假設三車且誘出宅令無燒害與上欲令捨五濁為說三因緣義正等今若曲譬者國邑聚落乃長者名德所週之地如佛以三身而王三土謂國則盡於封疆如法身充滿法性土邑則盡其宰治如以受用身王受用土凡聚落中自有一長者為眾所推又聚落中人有貧有富如以變化身王變化土而有淨有穢也具十德稱長者如具十號稱佛也年衰如應緣已久財富在內如實智田宅在外如權智僮僕如慈悲無倦其家廣大如以大千為家也但出入唯有一門故長者之驚入由此諸子之爭出亦由於此故曰唯一如實相妙理權實雙融亦唯有一此屬所詮如門下之路門如能詮之教眾生聞教悟理修行出界皆以佛教門出三界苦也世尊隱勝現劣度諸苦厄亦由此門而入五百人在宅如五道之在三界堂閣墻壁柱根梁楝之上皆加以朽隤腐敗言者總喻三界依正同被行陰所遷也週帀俱時被火總喻八苦交煎也宅既朽而又加以火逼見刻頃之不可居其急救之情實難容緩矣前法說約五濁同集用顯眾生被溺之相明世尊因此興悲設權救拔意或猶緩今喻說中約依正既被行陰所遷又加以眾苦燒煑以顯世尊之驚入乃約急救意以釋用權因緣雖曰重轉法華而孜孜不安之情頗顯明見想成受父遺胤乃可名子而數有至三十者今在火宅非如恒人可比如曾受尊教曾發大心中間退失後復發三種菩提心者乃有子義則十如菩薩心二十如緣覺三十如聲聞心始與如來同體大悲相關宜應速救非同五百人之在宅中者可比也是知能發菩提心者方有出苦之基否則直被八苦所燒無有出期二別顯喻事四初諸子樂著無求出意二假設三車誘子出宅三等賜大車得過本望四許三與一徵答妄否初三初長者見火二長者悲救三諸子戀宅今初長者見是大火至心不厭患無求出意子在宅內長者見大火四起故驚奈何諸子尚樂著嬉戲於內不求出路不覺有火不知火是燒法不驚身將被害不怖命將被斷甚之火來逼身苦痛切己而心中總不生厭亦無求出之意是可憐也此如佛眼見三界依正咸被行陰所遷如宅被朽又加眾苦來逼如見火起而疇昔結緣之子尚未出離殊有關於大悲故生驚怖下頌長者聞已驚入火宅義應於此節補出方有照應問於所燒之門得出門既被燒云何得出答無以文害義乃指從門內被燒之處而出非言門被燒也然門有二一宅門二車門要知出宅門即是入車門出車門即是入宅門義雖有二門則是一正如惟有一乘約權與實則分為二又宅門於未經開會前應有二種出入義一約如來說出入者謂隱勝現劣入於五濁如長者之驚入樹下斷結出界如長者於門內安隱而出二約三乘說出入者謂諸權乘斷結出界如諸子之爭出若二乘人則缺一入義大乘初住始有復入意又約自性清淨心忽被無明所動亦是入意又亦可以發心名出退失名入皆約義說也問既車門如實門宅門如權門者諸子本在門內如諸乘本在界內若以出宅門如出權門者但三乘此時正墮權內何得云出寧非法喻不齊答經不云乎知諸生死煩惱惡道險難長遠據此則門內門外皆有生死同名惡道故曰險難長遠當知三乘雖出界內分段猶在變易仍如諸子還在宅中諸子本為求車出宅及出宅後不見有車則與未出宅時正等何法喻不齊之有二長者悲救二初直以力救二直以言救今初舍利弗是長者至或當墮落為火所燒長者見子將彼火害即念曰我身手俱有大力可將自受用之衣裓几案包羅乘載救彼而出復更思惟其奈此舍可出之門止惟有一且又陿小胡能速出況諸子幼而寡識設使違教戀著不獨難救倘一遭墮返成損害不若且置一門即佛教門圓收一切法復能流出一切法故曰一乃最上利根入聖之路故喻以門即根本法輪權實皆所融故言陿而復小者正微而又微重玄意也此擬用神智力授以別教一乘也故下用主伴意云而悉成就無量知見等無奈善根淺劣倘聞而不信寧不返生謗法墮苦之厄不若且置二直以言救我當為說怖畏之事至具告諸子汝等速出此如又直以頓法擬之蓋頓教法門言言透徹直下了當不涉方便奈何縱告還如未告者則又不可用矣三諸子戀宅父雖憐愍善言誘諭至但東西走戲視父而已初二句喻世尊攝受之慈無已而諸子下三句因業惑強勝致戀宅之情亦無有已不驚下五句如善根微弱雖有眾苦當前悉被癡盲了無求出之意但東西下如中間退大不能還照本覺因蒙救拔之慇然亦偶發一念以求出離正如東西走戲時偶一回視其父惟其視父不即受教惟其視父出在不久二假設三車誘子出宅三初擬用方便二正用方便三順從方便今初爾時長者即作是念至奇異之物情必樂著已為所燒約生老病等言必為所焚約死苦言昔因驚入今見苦火來逼故於樹下斷結亦現謀出之相然據已為所燒不時出必為等義正釋開權所以答前求說因緣之問以法說雖約因五濁之汩沒權說三乘其意猶不迫切使無今喻則世尊處處慇勤急救之旨何由而顯說者須得此意乃不雷同父知下如投好設權也由前機教兩不相扣今故躡其退大之後中間復發所不當發之心以誘之便以所不當好者之好誘以投之此上說喻如三七思惟意二正用方便而告之言汝等所可玩好至隨汝所欲皆當與汝初則贊而復勸令生難得想次則出其名指其所在更以隨其所欲誘令速出如勸修示相作證意牛正能駕車者有任重致遠之力如菩薩乘有自利利他之行鹿以閑靜自處行時偶有憐羣回顧之心而羊則躑躅獨跳故以鹿喻支佛有時亦能現通化物羊如聲聞自備怡悅此如世尊以三乘果指在界外可令在昔結緣三子速得出界論云如來為求人天勝妙有漏果報者說火宅喻應知倘不說界外三乘勝妙之樂大過於彼何能易其所好問若以車譬果法在門之外諸權又乘何法出界答能詮之言教如門本通內外所詮之理如道路亦遍內外行人依教悟理依理作觀先斷界內惑染次趨界外果法即先乘因乘後乘果乘也此節即上擬用權也三順從方便爾時諸子聞父所說至其心泰然歡喜踊躍諸子聞說適好便勇往爭先同出火宅諸子火難既夷長者心遂歡喜然亦惟在露地坐下并不見有三車可上昔之三子中退學小今聞與其所好以稱願故奮往修進由用觀道於見諦前分別精粗決擇真偽如互相推排見所斷惑不分品類於一剎那同時頓斷如競共修道位中根有利鈍斷有遲速如馳走爭出苦集滅道世出世別如四衢四皆仝會於見諦如初見四衢交絡道中之地煩惱障盡獨露偏真如露地無有實果如露坐四山不來曰無障礙研窮息梵行立故令長者見而發喜乃知三乘路廣方便門濶無怪諸子之爭出也此如法華之前諸子已得之權乘也三等賜大車得過本望四初諸子索車二長者等賜三徵釋所以四得過本望今初時諸子等各白父言至羊車鹿車牛車願時賜與諸子出宅因不見有車故索之法中索有二意一者機索即密索也二者口索即是顯索言密者三乘之人以佛教門出三界苦謂為究竟初不解索次被多方薰淘一乘機發機宜叩聖義言索耳佛知機熟靈山集會為說妙法即是等賜二者口索已集靈山三乘三根皆悉發言求記如來為說與記即是等賜問就彼當教應指何法以為車體答盡智無生智是二乘車體丈六權智是牛車體問三子出界俱至本果否答二乘到極果菩薩未到以二乘不求作佛故至本果菩薩志在成佛至法華時三祇之行尚未滿故二長者等賜舍利弗爾時長者至又多僕從而侍衛之此譬今說法華開權顯實等與佛記也了無三車之別曰等一亦無卑劣之壯曰大車高廣是車之量眾寶是車之飾周帀下別顯也欄楯可防可凭懸鈴可警近遠幰蓋可障風雨外加雜寶嚴以美觀繩有收攝之用華瓔榮於外婉筵敷於內丹枕可備安寢皆車上所應有之物也下以大白牛駕之色潔而體姝頗有筋力於行步時不唯平正而神速之妙有如疾風旁以僕從供其使令約法則佛以等心成熟中退諸子今復以平等大慧教之如等賜大白也教中行依理修皆有高廣義白牛亦車所應有者當以精進勇猛圓正清白為首庶幾直至道場時在不久若更曲譬者大車教也高廣理也眾寶句總顯餘皆別顯依行所成之德以表莊嚴欄楯是總持義鈴是四辯流音義幰蓋是慈悲普覆義又以慈悲能攝萬善即加雜寶嚴飾義寶繩足四攝義華瓔是神通開敷義重敷婉筵是四禪八定義丹枕是以無分別智息諸攀緣義白為眾色之本是菩提心為眾德本義牛是智度能導餘五同至道場義亦是二利廣被義充潔是梵行清淨義姝好是法性微妙義有力是不退義平正是止觀無違義亦是神足安詳義要而言之由妙教詮妙理修妙行故令行行契真疾如迅風速至菩提也又多侍從是具足方便義此猶三乘疑斷信生而致等記也三徵釋所以所以者何是大長者至猶尚不匱何況諸子釋等與之由有二一由長者大富故能等與二由受者咸是其子故應等與諸藏皆充溢者以諦緣及度陰入界處皆是如來藏故是以一花一香俱可作開顯佛事則舉手低頭微因小善皆成佛因矣此等諸藏皆能作造車之具七寶大車即其所造如依理事無礙之由而建立別教事事無礙之果也其數無量亦分有主伴義且如以今經為主餘經為伴作開會說餘經為主時亦然以我下釋徵詞云與一國尚不乏而況與子故今略於無量車中且隨諸子之數與之如從別教一乘流出同教一乘蓋將引同入別也今經分具圓義處於此可見以非十方齊唱故曰分也四明得過本望是時諸子各乘大車得未曾有非本所望三子本求羊鹿牛車便已今蒙賜大白寶車故非本望如本求權乘而得一實於望外也四徵答許三與一妄否四初徵問二順答三反釋四印許今初舍利弗於汝意云何至珍寶大車寧有虗妄不昔許三今與一許與既乖似近妄誕故問二順答舍利弗言不也世尊至於彼火宅而拔濟之初約三義順顯一以全軀免難正答明不虗二以全身為得申明不虗三況出所許本是方便愈見不虗三反釋世尊若是長者至欲饒益諸子等與大車二約三義反釋一約許小不與一小尚不為虗返顯二約本來無小巧借許小因緣引子出宅以釋不虗三況出等與大車以見真實四印許佛告舍利弗善哉善哉如汝所言二善哉一印其能知許三是方便一印其能知與一是真實二法合二初總合喻本二別合喻事今初舍利弗如來亦復如是至阿耨多羅三藐三菩提初句總合上喻以如來合長者前於長者十德中但出第六耆年一德以影餘德今於如來十號中但出第一無虗妄名如來一號以影其餘上注約三土合國邑聚落今言一切世間則該五重所依之土矣言五者一法性土謂如來清淨法身所依之土以真如為體然此身土體無差別不變不遷離相寂滅是名法性土二實報土謂如來圓滿報身所依之土以無漏五蘊為體此由往昔修習十力等功德成就無礙莊嚴境智融泯實報所招故名實報土三色相土謂如來微塵相海身所依之土以自行後得智為體此由萬德成就眾寶莊嚴周圓無際是名色相土四他受用土謂如來他受用身所依之土以利他後得智為體此由修德成就隨住十地菩薩所宜變現以慈悲力而現大小勝劣種種淨土五變化土謂如來變化身所依之土以利他成事智為體此由往昔修習利他之行故能隨眾生心變現淨穢種種國土是為變化土又此身土雖各有五重然皆以一身融於五身一土融於五土妙色妙心重重涉入有如諸天同器受食及各摶在手時而色味乃異今文總意別別指變化身所依之變化穢土言也於諸下明依病行顯斷德也而悉下明依聖行顯智德即是以實智合在內之財富具足下以權智合在外之田宅大慈下合僮僕恒求下以所化一切合五百人而生下合因驚火起而復入火宅也為度下合有緣之子尚在宅中也生老等合四面火起教化下合一門唯以一性而說一乘令得無上菩提也二別合喻事四初合諸子戀宅二合假設三車三合等賜大車四合徵答妄否初三初合長者見火二合長者擬救三合正明戀宅今初見諸眾生為生老病死至雖遭大苦不以為患前但云火從四起其相甚略故於合中廣其所見申明應當速救速出之旨聖以苦喻火者由火能煎逼而苦亦能煎逼故又苦是火之味故要之眾苦皆從行苦壞苦苦苦三苦開出經中偏說壞苦及苦苦者以行苦舉體遍在眾苦能遷眾苦同至無常而後已故含而不言又文中多約因果二火說者以無明能該盡三毒及等分之惑火貪著追求等能該盡七支之業火故惑業在因中雖未感果已能煎逼心形矣生老病等該盡五陰之果火正屬燒法眾生下明已被燒煑猶以苦為樂也謂業火在身不覺惑火在心不知身心將墜不驚惡道來招不怖安忍於現前曰不生厭纏眠於未來曰不求脫輪迴不已曰東西馳走全身化為苦主惡道化為家宅故曰雖遭大苦不以為患問此段與戀宅意同否答誘而不出方名戀宅二合長者擬救舍利弗佛見此已至眾生不能以是得度應拔者顯慈父同體悲心內有拔苦與樂之責也問佛為有緣三子說三乘何云眾生答約正因言則等視一切猶如一子均當拔濟但以能發心先求出離善根蚤成熟者則先令解脫故每言為諸見諸也舍利下總擬用同別二教捨方便而不能三正明戀宅所以者何是諸眾生至何由能解佛之智慧設能發心求出特緣現身正屬分段渠且救苦不暇何由能入微妙玄門此合上唯一門陿小義二合假設三車三初合擬用方便二合正用方便三合順從方便今初舍利弗如彼長者至聲聞辟支佛佛乘初牒前身手不可救但以下牒方便可救如來下初總合以神智力說一乘不可救次合擬用說三以投先心所好權教大乘亦同實教在因名菩薩乘在果亦名佛乘二合正用方便而作是言汝等莫得至便得無量安隱快樂此下雖含三轉義然不必泥以三乘法中尚有十二緣六度法何以獨約四諦說耶三界以火宅言五塵以麤弊言者出其過也緣諸子退大學小復遇邪外迷有漏天作無為解以五處安隱為勝淨依為對治此故示其過咎乃以三乘無漏妙果以易彼昔求出離之心我今下勸信也汝等下勸修也復作下嘆其希有令生好樂三合隨順方便舍利弗若有眾生至為求牛車出於火宅內有智性者由昔退大學小故習成三乘智性此句亦貫下二節從佛下聞即能信者以投本所好故且能速出故早得涅槃故因聞聲教得悟故以人從緣名曰聲聞又以人名法故曰聲聞乘如羊者雖依人住而不肯回顧後羣如諸聲聞雖則在眾無違而乏利他之行梵語辟支迦羅云緣覺亦云獨覺檇李云獨覺亦觀十二因緣但以根之利鈍有值佛不值佛之別以彼亦由昔曾聞此法來故自然慧者以此因緣本來自有非佛天人所作其能入之慧亦然故曰自然慧又支佛是法行人從人聞法事少自推義多故能逆順深觀以至百千萬世雖不依人而住亦有時現通度人亦如鹿有迴顧之慈也求一切智者謂於內法內名能知能解又於理外所詮之法相能詮之名字亦能知能解名一切智即聲聞之智今為菩薩求者欲度二乘也佛智即道種智謂能用諸佛一切道法發起眾生一切善種名菩薩智也然約當體能知名自然智約不從人得曰無師智又自然之名雖同緣覺而起用處則不相同此上三智皆通因果約如來知見言則惟屬果地菩薩緣此而修則徹因徹果如牛之自近之遠也須知此中雖言牛車由不明牛之德相車之嚴好故屬於權也三合等賜大車二初牒喻二法合今初舍利弗如彼長者至等以大車而賜諸子略牒免難及等賜二義二法合二初合免難二合等賜今初如來亦復如是至怖畏險道得涅槃樂教門上標佛字者以佛在世時九十六種邪外莫不自謂得一切智能出生死但有空言全無實義唯佛所說乃有教有義可趨涅槃故寄佛字以簡邪外也教即能詮其所詮之理方有為教之用故門如能詮門內所含之空方有為門之用今則法喻合舉故曰佛教門問前云唯有一門又云陿小故置而不用今何云無量人從此門出答前不云乎此門權實雙融故曰唯一由即權之實理甚幽微善根弱者不堪秉此故以陿小不用復由即實是權於一佛乘分別說三故億百千從而出之之後復蒙開顯也得涅槃且隨多分說以權教菩薩尚未得故此上合免難意也二合等賜如來爾時便作是念至能生淨妙第一之樂初合等賜之由是諸下合等賜之心如來滅度即無住處大涅槃也是諸下正合等賜而以諸佛所有娛樂之具與之者以諸三乘亦得禪定解脫等之少分今是一乘實相之妙理一乘般若之種智乃聖所稱嘆者言能生等者以此一相一種即是理事無礙而能出生事事無礙淨妙第一別教之法樂故是故此經猶如海口能攝眾流同歸大海之旨於此可見矣四合徵釋妄否舍利弗如彼長者至大乘之法但不盡能受不盡能受為之奈何三結答舍利弗以是因緣至於一佛乘分別說三由我以佛眼見諸子於三界火宅內將被火害欲令速出因緣故於一乘分別說三二頌文二初敘意二舉頌今初佛欲重宣此義而說偈言下文先略示恐畏諸難次正明毒害火災舉三道以喻六道惟人鬼畜宅中可有故舉之以況二舉頌二初廣頌前喻二勸信流通初二初頌喻二頌法初二初廣頌喻本二略頌喻事初二初廣頌朽宅二正頌火宅今初譬如長者有一大宅至如是諸難恐畏無量頌與長文廣略互見以長文廣者頌則略出頌之略者由長中已廣故但長文多以無明闇蔽生老病之火在正報上說今頌約三界言者以依報唯是色法其被燒之相甚顯故即依以顯正也若加以利鈍等惑喻鬼畜恐屬太鑿長者二字即收十德與言佛遍週義等有一下於三苦中先約色法總被行蘊遷至無常言而大宅被朽不停之相甚相似周障二句色法中臭穢似之有五百下明住此者有三類曰人及鬼畜然以五百喻五道即攝三子在內此下諸頌總顯三毒充滿之狀鴟梟下顯宅內畜類所有變怪之相處處下更明宅內遍滿惡鬼又復各縱其惡狀總見無情者既危朽而又臭穢固不可住其有情者險而復惡盡如冤對更不可刻頃居矣二正頌火宅是朽故宅屬於一人至毒害火災眾難非一宅屬一人即下唯我一人能為救護意近出者由佛往昔曾教謹防無明等火次因世尊赴緣他方未久以致諸子放逸不覊此正火起之由於後下正明火起忽然下三句顯能燒之勢甚猛棟樑下顯情與無情被燒之相可怖可愍咸由薄福之故以致眾難齊集二略頌喻事三初頌樂著二頌假設三頌過望今初是時宅主在門外立至猶故樂著嬉戲不已門外立者佛觀眾生恒被熱惱不安法空座上故如人立眾生與佛同一悲仰今既被燒即與能救之悲相關故與如聞人言等又那伽現事亦是以法即人故汝諸下諸子本未出宅而曰來入者以彼於智勝所曾有聞法緣因遂依正因而發了因大心即如已出以果不離因故次由無明戲論強勝善根微弱旋發旋忘故如還入長者下前約因見火燒驚入今約因聞人說驚入乃以人法互顯義也方宜下雖頌教誡即含擬宜意諸子下戀宅也二頌假設是時長者而作是念至是故諸人我今快樂初三行頌擬用三車告諸下正用三車諸子下頌隨順方便長者見子下明長者自慶得全天性然言生育甚難者由經劫教化多方攝受令其發心已自難矣況於既發之後又須數數調護令其漸漸增長保令勿退乃得成熟故曰生育甚難此猶約發大心不退者言也若今之三乘則始發大心中退習小而又先令小熟此於方便中更設方便故曰生育甚難三頌過望爾時諸子知父安坐至嬉戲快樂自在無礙先以三行牒述長者許車之辭以索車長者大富下出能造車之具甚多以眾寶物下明所造之車具大莊嚴以是妙車二句正明等賜諸子下明歡喜以見得過本望也二頌法合二初合喻本二合喻事今初告舍利弗我亦如是至如是等火熾然不息以四頌牒喻及法襍糅成文令義顯然言一切皆子者約正因言也已發三種菩提心者是了因子大疏佛子有三一外子即諸凡夫二庶子即二乘人秉小乘教生法身者三真子即秉大乘法生法身者乃菩薩也二合喻事三初合樂著二合假設三合過望今初如來已離三界火宅至於諸欲染貪著深故寂然閒居者由無為寂照故能見能聞也教詔是擬宜不信是戀宅也二合假設以是方便為說三乘至有得緣覺不退菩薩三乘將見道時俱有決定心若約四諦言者則於四善根中因觀欲界苦至世第一後心真如理顯生無漏法忍名為苦法忍即決定心乃八忍中之第一忍也權教具堅固信根人亦可名不退菩薩三合過望二初正示現前二兼明累劫今初汝舍利弗我為眾生至更無餘乘除佛方便初頌合等賜大車汝等一行合等心是乘二行合車之高廣無量下三行明因讚供等所得之益破無明闇智光朗照如日留惑潤生還入三界如夜知法如幻不拘生滅之迹曰遊戲復能以開顯法門令諸三乘同至道場以是下一行結顯惟一無餘之因緣二兼明累劫二初略示二申明今初告舍利弗汝諸人等至今所應作唯佛智慧初一頌約如父子一體以定應與應受之大義汝等下正明拔濟後且令出界也我雖下廢昔權果也向所盡者但是界內之分段而實不滅以未盡變易故今所應作當填本願以求佛智立今實果也二申明若有菩薩於是眾中至安隱眾生故現於世初約大智菩薩能聽能信諸佛實法即知諸佛雖用方便即方便便是真實其所化者據現前緣因似有三乘若據正因則皆菩薩也若人下申明為不信者開三以彼愛欲障重為治此故說於苦諦以稱所習令生歡喜曰日可令冷月可令暖佛說苦諦真實無異若有下指集諦能為生苦之本者貪欲是也故曰娑婆世界若有一法勝過貪欲則成佛者不止悉達一人矣若滅下能滅者是道諦所滅者是集諦諸苦盡處即名第三滅諦故貪欲滅則苦無所依為滅下指道諦為能滅以修行於道品故則遠離苦縛身之與心始得解脫是人下徵其所得為虗為實皆以廢立言也但離下答其非真其實下出其所以以厭有非真離未盡空有之情故曰其實未得一切解脫之理果及無上之智果既為我子豈可但令灰斷便已我為下一行又以佛之本懷釋成也二勸信流通二初標示信否二廣釋信否今初汝舍利弗我此法印至在所遊方勿妄宣傳此下當品流通也法印即一乘實相印能印定一切眾生皆是佛子同得佛果宣傳言勿妄者值能信若不說則失大利否者強說則令墮苦故二廣釋信否二初略釋二廣釋今初若有聞者隨喜頂受至隨順此經非己智分初明得現前益能信是因阿惟越致是所感不退之果雖在未來然已具於一念信心中矣若有信下明宿世有見佛聞法善根方能信受若人有下約未來能信弘傳人說即具深信解相也一切下明中上二智力所不及汝舍下明智首之得入者是信力非智力也餘人不過隨順信從而已二廣釋二初釋否者莫說二釋信者應說今初又舍利弗憍慢懈怠至無智人中莫說此經初明值憍慢等莫說者內障重故凡夫著欲亦不可說外障重故斷佛種偏在信上言者以不信之罪在眾罪之上故古注引淨名以煩惱為如來種此取境界性為佛種善惡事異名境界故大品以一切種智學般若為佛種此取了因性涅槃以心性理不斷此取正因性為佛種等今約不信言斷者乃約斷了因佛種也方便品以舉手低頭皆成佛種彼約緣因為佛種也皆悲心護持恐令招𠎝也或復下廣約不信及毀謗人備顯三途惡報者以其造自他俱損之業故說尚難盡苦豈有窮亦即伐南山之竹書罪無窮意也二釋信者應說若有利根智慧明了至汝當為說妙法華經若有利根下十七頌古以五雙十隻略示善根可說之相末二頌結示可說之槩慎勿負叮嚀流通之意此上廣顯信否功過皆約最初一念言即涅槃中無垢藏推功歸本果從教生義如醍醐最上功本由乳如來至極功歸於教故信之者阿惟越致其否者既無緣了則正因斬然世間闇瞑矣初喻說一乘竟二領解得記二初四子喻說領解二如來述成與記今初信解品第四此品始終以不求自得四字寫因得生喜之狀謂四子往昔曾於世尊所發大菩提心植了因種投入聖胎得名為子次緣背覺合塵退大樂小雖仍入五道第以欣厭情急復蒙累劫拔濟故於今生感佛現身先於二十年中以貧所樂法令其熟脫至應有寶藏分之言悉皆忍而不說縱聞說大以為但為菩薩而不為我故勞世尊復於二十年中漸用大法或抑或揚令生慚愧或命轉教令自思惟加以真如內熏力故令在昔善根復得增長以致大機闇發自鄙先心是故靈山集會初以光瑞問答動執生疑又復以法以喻開佛知見於望外是以欣慶之懷踴躍之情忽發於心內咸由信解所致故原其本而題其品曰信解文二初長文二頌文初二初略陳今昔於希有法不求自得二廣陳喻法委狀不求自得之義初二初經家敘喜二略陳今昔今初爾時慧命須菩提至曲躬恭敬瞻仰尊顏善吉以妙慧深達般若海空故以慧為命又為慧人命令轉教故曰慧命餘三名皆帶摩訶者是彼族中長故聞未曾有述約教開三顯一也見授記述約果會三歸一也皆悉所未見未聞者今忽躬遇寧非希有是故指上得喜之由即從下敘領解之儀也二略陳今昔二初標顯二徵釋今初而白佛言我等居僧之首至成就眾生心不喜樂初述昔為僧首法臘既高晚學以我為模範曷可改轍所以不求年並一句又述生臘亦高曷當大任故不當求自謂下述所證既深愈不當求涅槃妙理已證無生妙智已立故不進求世尊下又以身倦心灰故不喜樂但念諸法無我我所本來空故求男女一異相不可得故由無相故無所作即無願也以此三故於二利功德心不喜樂二徵釋所以者何世尊至無量珍寶不求自得初釋在昔不好之心我等下結成今喜之故二廣陳喻法委狀不求自得之義二初舉喻二法合初三初窮子愚頑無心希求長者之富二窮子志大全受長者富有之賜三窮子心喜無量珍寶不求自得初三初敘累劫如安貧里肆力不求二敘今生如安客作賤役不求三敘客作如安領知出內不求初二初父子雖失遇止不違二父子雖見貧肆不求初二初父子相失以況退大二遇止不違以況因緣今初世尊我等今者樂說譬喻至或十二十至五十歲初二句𧫎請許說四子因聞火宅父子從喻得解故亦以父子作喻酧之百法論以壽暖識三合為命根今年齒既即是壽則以命根配善根宜矣幼稚如善根甚微也捨父背覺也逃逝合塵也久住亡返也他國即五道所居之三界也如四子往昔雖發大心得稱佛子但以善根微弱以致瞬息便忘背本真常仍往他國或十如在天道二十如在人道至五十如墮三塗矣二遇止不違以況因緣二初所遇不違以況內因不失二所止不違以況外緣不失今初年既長大加復窮困至漸漸遊行遇向本國此節喻中退習小速求出離便成感佛現身之正因也年既長大如雖退大而由真如內熏之力令在昔所發之善根漸增雖得長大尚乏栖止況窮無法財外被苦困是故馳騁於身受心法之內或求火之光明愛水之清淨樂風之周流觀塵之成就希得法服以蔽身法味以滋口雖此等邪求但可增長生死然即此求出之心却亦與本性相順故曰漸漸游行遇向本國本國即本性或亦即世尊攝受之本願由與本性本願相順故成感佛現身能為出苦之正因二所止不違以況外緣不失二初明長者所止之城二明長者所作之念今初其父先來求子不得至商估賈客亦甚眾多此下言身言土應且約中根開解入住所見者言之先來非先後之先乃隱顯意也謂四子往昔從應化邊發大心已由能感之薪既盡而應火亦隨之而隱復由世尊不捨大悲乃以即法之勝應不離他方常在此土故曰先來以求覓無機故且中止涅槃如所都之城能却五住之敵防二死之非中止者以進非法性及自受用退非變化穢土乃勝應所居之淨土也其家下顯長者之富有家可曲配實相如人丁財物並依家住色心等法同依真如正位而住金銀下別舉也不必瑣配大意不過彰其富耳有指此為華嚴境界雖華嚴於一土能融諸土然不可直指故諸天敘云昔於波羅柰轉四諦今復轉最妙又如來答上行等雖云始見我身似已露出華嚴隨曰除先修習學小乘者據此二文則二乘人直在不見不聞數內矣此科及所念二科同喻四子不失世尊攝受之外緣是以中止待其來也二明所作之念時貧窮子遊諸聚落至坦然快樂無復憂慮文有三節初明窮子之游始於四方次遇本國次歷郡邑遂到父城皆自遠而近以喻內因之漸長父每下明失子之憂以喻無機復作下明得子之樂以喻有機又上科約世尊身業冥加以所止言此約意業冥加以所念言而成開解之勝增上矣二父子雖見貧肆不求二初父子相見二貧肆不求初二初約子見父以喻怖大之心二約父見子以喻調慰之狀今初世尊爾時窮子傭賃至作是念已疾走而去傭賃者四子於退大後中途以習小法為力速求出離為財故如傭賃或依邪外而捨正見或依正見而捨邪外謂之展轉二者皆被求出之願力所持冥資正道遂成見佛善根故如遇到父舍此皆見佛之由也住立下明窮子見所怖之境住門側則非正立遙見則非覿面如慕小之善根雖熟未秉正教與住門側同又雖有叩教之機尚未親炙故曰遙見此若以法就人四子尚在小乘法外注家何得劇以偏真但空言耶踞師子下種種嚴飾皆豪貴所應有如勝應土中自具萬德莊嚴也然萬德由萬行所致故令樂小者起怖也窮子下正明起怖之心由見長者有大力勢遂悔其來以所見處不與能求之心合故念曰此或是王或是王等欲得彼物須是能出入其門者乃可倘以一介微寒託此彼若強使我作我將何法敵彼不若疾走之為妙也況貧里中衣食易得且可速救飢寒此如四子自退大來但有樂小之心倘聞行海莊嚴不但不受且生恐懼惟肆小慧之力於但空貧里求八忍之衣四諦之味以資身口便已是以怖大疾走而退二約父見子以喻調慰之狀時富長者於師子座至轉更惶怖悶絕躃地世尊於勝應土師子座上不廢悲願待諸有緣其曾發心者氣分自投故得一叩便應如水清月現見子便識心大喜者因昔無能感之機常生憐愍今既能感故心大喜即作下釋生喜之由以適所願故問有將師子座作第一義空無畏境說者復有以中止之城指為有餘者豈不前後相違耶答二說俱非以與經中止義不合故蓋中止義雖濶而進非自性自受用何以指為第一義空若唯局有餘土不該至果報其入住者可於此處見佛倘上上機一經開顯即能超登聖位又於何處覓佛是故中止應該他受用及勝應二土而言以見進非自受用退非變化劣應苟不作是解豈此經勝用但能令入劫便已即遣下喻佛擬宜用大也則以妙觀察智為能遣名句文為所遣旁者以四子是漸機合以小乘為正被而如來因在昔令發大心故仍用大擬宜則大教返為旁被矣急追者欲直說大乘也將還者以宿善可起也教奉智命如使者其所詮之義最為爽理快性如疾走收功甚速曰往捉窮子驚下正顯怖大之狀以明無機也卒聞大教故驚境與心乖曰愕若使我於生死中覓涅槃煩惱內求菩提何異劫殺來侵是故稱怨而又大喚次二句如我本無悲願奚用此至教為使者下明既不受重玄妙法何不即將苦惱如幻之頓旨直以告之故曰執之愈急彼縱無機亦必勉其令受故曰強牽將還總譬不受也於時下更申明深怖無機之狀無罪被執者若諸大士以悲願為能感之業應還界內現如幻之生死而在二乘視之如有業者方受囚執之罪我既無業何以被執倘無方便寧不直入輪迴故曰此必定死轉思轉怖迷失本心曰悶絕桎棝七支伏於無明曰躃地皆怖大之相也此上若法若喻皆不過曲配怖大樂小之情不必過泥二貧肆不求父遙見之而語使言至往至貧里以求衣食遙見者一在門外側立一在門內正坐相隔俱遠故父子皆云遙見又上子見父既如三乘能感之內因今父見子即如如來加被之外緣以此機教相叩故得感佛現身脫御於下文不須勿強皆息化意也以冷下意謂既如結緣便不可置之度外又此躃地未醒之人既不可飲以甘露且傾半盞清凉先為解其煩悶使彼宿世小根可以先熟乃先用小法教之令醒故以水灑令醒為喻不與語如不言是子應有寶藏之分所以下釋不語意由審是緣種故方便覆護抑其本懷勿令小機亦同退屈乃故令隨意所趨窮子下因見釋放生喜又聞隨其所好故從地起直往貧里而求法服禪悅令其自濟上自說喻至此內圅大小二種善根以為怖大樂小之柱一因大機未熟而顯怖大之狀一因小機先熟而明累劫好樂之心由小先熟故先聞小大後熟故後聞大法二敘今生如安客作賤役不求三初標用方便二正用方便三結示不求今初爾時長者將欲誘引其子而設方便上科約累劫言此下追述鹿苑以後事也二正用方便四初用密遣方便二用著弊方便三用加價方便四用作字方便今初密遣二人形色憔悴至其父見子慜而怪之內秘外現曰密出制使往曰遣如世尊令諸大菩薩現聲聞緣覺二形故曰密遣既隱妙相故形色憔悴既攝身香故少威德非此狼狽難為儔侶何以得近研真斷惑即是作處直即二種涅槃也言倍與者蓋界內戒善止可伏惑得人天果直若肆力於道品不但伏且能斷不但得人天果且能得界外無漏妙果故云倍與若伏若斷即除糞之賤役又以共作而鼓舞之爾時下先取價者如二乘欣厭特重故先慕滅道後除苦集也故令長者愍其捨大怪其取小若據既已得之具陳上事則因緣和合感應之道成矣然亦惟先熟小善得與如來應化同生一處猶未親炙道範二用著弊方便又以他日於窗牖中至以方便故得近其子上緣四子能感之小善先熟世尊將欲隱勝現劣故先敘其由古注指他日之他為法身今准諸子退大後世尊於本發心處求之不得既中止勝應而待則所現之身亦應指為勝應故下云天人常充滿等何必指為常寂耶窗牖遙見雖非於明堂近視處可比然已不同前四方推覓難見之時矣今長者因遙見復思聚首奈彼以卑劣軀處污穢地何堪投足但以天性相關不容不屈尊以就卑於是脫御著弊塵坌其身手執糞器亦來共作乃與相近使其不驚此即如來以十種大恩與眾生中之第七隱勝現劣恩也大鈔云十蓮華藏塵數相海滴難思無盡之德并隱不彰但云百劫修成三十二相三十四心斷見修惑五分法身覺樹初圓如老比丘同五羅漢故法華中脫珍御服著弊垢衣執除糞器往到子所釋曰塵數相珍服也三十二相弊垢衣也三十四心除糞器也見修惑即所除之糞右手用便如丈六之權智狀有所畏示同病行先語諸作次近子身曲盡慈濟矣語諸作如示諦緣法門也此節因上累劫來因緣成就故今先現劣應身以應之三用加價方便後復告言咄男子至亦有老弊使人須者相給既咄而復稱男子者乃先叱醒而欲獎勵也勿餘去如以定伏亂意也加價如因定而又令發慧不但能伏且使進斷也論謂以窮子煩惱熾然增上慢染罔知有出世法門但求人天勝妙境界等今隨順彼先以所餘戒定之力以與人天果報之直則所除之糞如所伏之惑又以近得共聚故加以妙慧斷感而感界外之果亦有老弊則又因定慧更起工巧也有將此數科細配道品說者恐太泥四用作字方便好自安意我如汝父至更與作字名之為兒承上加獎又進慰曰汝於我家好自安意我如汝父勿復他慮言如父者以彼自客作來將二十年今雖得近第貴賤殊分階不躐等故先以如字進許之倘突以即真之言許之恐驚且疑矣所以下釋許如父意我已老無能為汝正少應努力況汝於常作時全不似餘人有欺怠等惡此後應如所生之子進雖不似我之親生退亦不同餘作耳即時下正為更名作字此如諸子自鹿苑發心習小迄今已能初得世第一之似解進雖不似聖流退亦不墮於凡夫少選便可稱為權智佛口所生之真子此如窮子先除客作之名而預入聖流耳三結示客作不求爾時窮子雖欣此遇至然其所止猶在本處因斷分別起得與子名故云雖欣此遇俱生未盡尚在學位故云猶故自謂客作前後三番言二十若合言之僅得數之四十蓋以除糞之二十喻如來自鹿苑說四諦始至說般若止以喻阿含於此二十年中但除界內染污無知故如糞也其執作家事之二十如奉命為說般若正合四十若兼今說法華便合世傳說法四十餘年之餘字義倘不准除糞配阿含亦應不信執作家事之二十配轉教矣過是下心相體信者謂不獨長者知我身心無偽我亦能知長者始而與直次而加價既皆不虗此後心口自然相應絕無虗誕如不但如來知我已出三苦我亦熟諳如來施教之不誣進語大退語小皆所不難塵餘謂心相體信等謂之喻轉說般若則可如何配為方等時方等論時觀教後學決不可依予謂若將心相一節插入硬配方等恐違聖教以方等二字是大乘經之通稱如云謗方等經何必別立時部則心相等文乃承上起下意也然其下結成安於客作不求也三敘客作安於領知出納不求世尊爾時長者有疾至下劣之心亦未能捨不久如應謝在近也倉與庫如能詮之不同金與銀等如所詮之不同機有利鈍說有廣略故云多少以法化物曰出收功歸己曰入可教者應即與之不可者應善護念曰無令漏失語窮子下喻命轉教也我心下喻既蒙佛加則與佛不異爾時下正受命也而無下結成領知不求以見其中根也二窮子志大全受長者富有之賜四初喻大機叩教二喻靈鷲集會三喻結會古今四喻開顯授記今初復經少時父知子意漸以通泰成就大志自鄙先心少時以說般若時得蒙大法薰染其心及聞說無量義得知無量既從一法生則應以一法還收無量回視自證於心不安即大機密叩時也不更仍被小法所阻故曰漸已通泰成就大志又復自鄙在昔不應有如是安於貧里種種下劣之心二喻靈鷲集會臨欲終時而命其子至剎利居士皆悉已集終指涅槃時也臨終即今正說法華時也併會下喻今之雲集也三喻結會古今即自宣言諸君當知至此實我子我實其父初定父子天性以喻曾發大心得名佛子於某下釋由昔之逃失今之遇會乃得重逢以喻由退大而復得開解仍稱佛子乃可進領家業也四喻開顯與記今我所有一切財物皆是子有先所出內是子所知我之所有皆是子有即說佛慧與授記令起正因也播萬行被物曰出攝萬行所成之德曰內二利之行已具如般若中說故云先所出內是子所知即會三乘之行同為一乘成佛之因如攬三點以成一𠁼不必更點此正會昔成今也又即今但示是其所有之辭更不廣明諸行此又彰今異昔乃昔所未說今乃說之之法門也故叡公云至如般若諸經深無不極故道者以之而歸大無不包乘者以之而運然其大略皆以適化為本至悟物雖弘於實體不足皆屬法華固其宜矣等世尊自與四子結緣始中經累劫引攝齊今開顯而降靈之本致稍結局矣三窮子心喜無量珍寶不求自得世尊是時窮子至今此寶藏自然而至始而安於貧里不求既而安於客作不求終則安於領知不求無量珍寶今忽自至其歡喜之心曷可勝言問前世尊脫御現劣示同病行今至開顯應現勝脫弊然後委付答既得開解則法眼清明空華當滅世間諸相尚得常住何況佛身此正寄化顯實開佛知見也二法合三初合愚頑二合智大三合心喜初三初合昔安貧里以明累劫不求二合今安客作以明今生不求三合領知出內以明轉教不求今初世尊大富長者至迷惑無知樂著小法言似佛子者昔為說法生解則父子義已成由遜上根於開解時曾言真佛子故且云似也常說我為子即合見子便識等意三苦由三受生苦受生苦苦樂受生壞苦不樂不苦受生行苦受熱惱樂小法合安於貧里等大凡法喻互有廣略喻意未盡者則從法合中補出喻已盡合則略出如今文是也又前法說中以五濁釋於一說三之旨葢以貪愛大水為門汩沒眾生而顯昏擾之相文中總不以火字義犯之於喻說中以火宅釋速救之旨乃約嗔恚大火為門燒煑眾生以顯三苦熱惱之相故法喻中總不以水字義犯之此譯人用意之脉絡每見注家水火相犯了不知其回護二合安於客作以明今生不求今日世尊令我等思惟至如來知見寶藏之分初合密遣僱令除糞依根本無明所起虗妄名戲論糞我等下合先取價方與除糞也一日之價即於如來無盡功德中但得一但空也然世尊下合安於客作便見下合脫瓔著弊示同病行故不為分別等三合領知出內以明轉教不求世尊以方便力至而我等不知真是佛子如來智慧大乘實相正教菩薩亦令二乘從旁聞之故曰方便縱然可愛以小有所得故亦不希取問前據兩番二十年駁別無方等時及方等部若勘今文似於阿含後般若前雖無時可指亦似別有部類矣答此正方等也但如來於一代聖教內凡教菩薩法門均名大乘方等即般若部亦在此收然據今由小之大之機所見既以初二十屬阿含次二十屬般若於中無別有隙安插方等故駁之理實如來於此二教外未嘗不時時以大乘方等正被菩薩諸二乘既從旁得聞何妨於此敘出思之我等下合轉教不求也因者即蒙加被為眾顯說隨我說者即帶權說實也我若達此乃是藉人為我之意我則蚤已薦取矣二合志大今我等方知世尊至然佛實以大乘教化知見一開始悟昔之與小昔之轉教昔之毀訾正實以大乘教化三合心喜是故我等說本無心至所應得者皆已得之二頌文二初敘意二舉頌今初爾時摩訶迦葉欲重宣此義而說偈言二舉頌二初頌前喻法二報佛深恩初二初頌略陳不求自得二頌廣陳法喻委狀今初我等今日聞佛音教至無上寶聚不求自得二廣陳法喻委狀二初頌喻二頌法初三初頌愚頑二頌志大三頌心喜初三初頌昔安貧里二頌今安客作三頌領知不求今初譬如童子幼稚無識至何用衣食使我至此初行半頌子背父況退大後流轉五道其父下九行頌所止不違況緣不失四方如於四生覓機了不可得造立舍宅即從自受用身土為地上現他受用為地前三賢現勝應身土也止於此中而以同體大悲冥加即不失外緣意爾時窮子下三行頌所遇不違況因不失約漸次等義如因內熏而善根漸長也爾時長者下頌父子雖得相見而仍安於貧肆況累劫怖大樂小共九行先以六行明子見父而驚走長者是時下明父見子而追逐此上大意明四子自退大後於累劫樂小心中若與正見相應則有所得與染慧相應則無所得雖有邪正皆可增長速求出離之善故於佛世多諸梵志凡得見佛便蒙解脫二頌今安客作長者知子愚癡狹劣至又以輭語若如吾子初標用方便意即以下頌密遣方便況二乘惟有偏空小慧全無德相莊嚴長者於牗下頌著弊方便以況現劣方便下頌加價方便以況不獨有人天勝妙果報更有出世微妙大益又以下頌作字方便以況少得似解不列凡品矣其不求之旨自溢於言外耳三頌領知不求長者有智漸令入出至自念貧事我無此物二頌志大父知子心漸已曠大至悉以付之恣其所用初明大機叩教欲與下如靈山集會於此下退指昔日相失由我周行求索而來以見累劫之提𢹂前後合言四十今約見子來以二十言者以著弊之初二十但可云客作縱得同居一處而以尊卑懸絕不可云聚首相見則非蒙更與作字執作家事時不可云見以全無子意故凡我下頌今開解得記如委付也三頌心喜子念昔貧志意下劣至甚大歡喜得未曾有二頌法合三初略合不求二廣明轉教三望外自得今初佛亦如是知我樂小至成就小乘聲聞弟子由知退大樂小所以與小而說下合但僱除糞不言委付也二廣明轉教佛勑我等說最上道至初不勸進說有實利初一頌受命轉教我承下五行正明轉教但為菩薩如彼二行牒喻合明無希取者為其無分亦無怨佛之意矣我等下復申明自己本無希取意者以內證寂滅故於利他一事全無欣樂所以下亦頌釋明內證之深以顯自足不求意謂一切諸法自性本空因緣和合虗妄有生因緣別離虗妄名滅觀中證此名空解脫門求大小男女等相不可得即無相解脫門無漏染無為作即無願解脫門又空寂句即總明三脫也謂無生滅名性空無大小名相空無為名願空也如是下顯己之能證亦深即佛之智慧了無志願美食不中飽人飡也佛所下明佛以是教我我以是酬佛既不負其所教即為報恩矣我等下二頌半結成不求由觀我心是以見捨初不勸進三望外自得如富長者知子志劣至普於其中應受供養初頌半牒喻貼合佛亦下頌半總合我等下歷頌歡喜也得道得果聞法得記也於無漏中道得清淨眼即法眼清明入住也昔以持戒之報僅歸空寂今得實果不虗所持矣昔修梵行不落凡夫今並不落二乘矣又昔聞聲悟諦止可自利今兼利他可謂真聲聞矣昔者應供止在人天今可應世出世間之供矣文中共七個今字皆約勝昔以狀喜心也三報佛深恩世尊大恩以希有事至於一乘道隨宜說三初一行總標恩大餘頌但明恩大難酬大鈔明如來以十種恩與眾生一發心普救恩二難行苦行恩三一向為他恩四垂形六道恩五隨逐眾生恩六大悲深重恩七隱勝現劣恩八隱實施權恩九示滅令慕恩十悲念無盡恩又世尊應住世百年而止享八十者留二十年餘福蔭庇末法弟子今四子若約累劫言則全受前之九恩其第十雖但為未來須知現受之九恩亦即過去世之未來也
