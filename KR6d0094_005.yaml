body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯西蜀沙門佛間勖𠁼大師立科門人智一雪墩拾遺二示所住行安樂行品第十四此品釋題及文多准華嚴疏鈔而以疏與鈔雜糅成文者便覽也問法師品以衣座室三為弘經之軌今之四行似與彼無異何也答今文止觀慈悲實與前同但彼是略說安樂行今四為廣說衣座室亦非前為久行今為初行成兩種也大疏云安樂行者略有二意一涅槃之果名為安樂此行能趨即安樂之行也鈔云此以果名因也二住此四行則身靜神定身靜神定則外苦不干故稱安樂鈔云此即因安樂亦生公意疏又常見外道因果皆苦斷見外道因樂果苦析法二乘因苦果樂唯有菩薩因果俱樂鈔云此即天台意常見者因果皆苦計我常故修於苦行以期妙果所修是邪還招苦果斷見者不信當報恣意行惡受五欲樂當受苦果析法二乘無常拙度加功苦到此名因苦得入涅槃故云果樂菩薩如實巧度故為因樂證大菩提得涅槃樂等即今安樂行也文二初問二答今初爾時文殊師利法王子至云何能說是經諸大士忍難弘經二乘人雖曰弘經而皆避難遠住與其有難可忍何如無難為快故文殊以排難為問二答三初標示四法二次第釋成三結示利益今初佛告文殊師利至欲說是經當安住四法疏云安樂行品說四安樂行一畢竟空行經名行處近處二身口無過失行三心無嫉妒行四大慈悲行鈔云今疏所列初一會諸師義後三全同生公生公初一但明行處近處意是總名遠惡近理下三別耳寶林基第一明空行二明離憍慢三四同生公南嶽云一無著正慧二口不說過三敬上接下四同生公大乘法師一正身行二正語行三心離憍慢自利行四心修善法利他行天台云止觀慈悲導三業及誓願初身有止故離身粗業有觀故不得身業不得能離無所得故不墮凡夫有慈悲故勤修身業廣利一切不墮二乘有止故著忍辱鎧有觀故坐如來座有慈悲故入如來室止行離過即成斷德觀行無著即成智德慈悲利物即成恩德恩德資成智德智德能通達斷德名身安樂行餘口意亦如是釋曰此即通辨三法為能導其所導即三業及誓願大乘法師傍以立名然諸師立名皆從多分增勝以分通用三法指天台理則玄妙不彰四別今取生公之意合身口在第二取行處近處及南嶽寶林共立一名名畢竟空行寶林但語一空似約於境南嶽云無著慧但語於心今云畢竟空心境兩亡空有雙會故生公云近處明遠惡近理行處而為履行之宗在畢竟空耳此為大智四為大悲悲智相導於中二三業天台之意亦不失也又初後成德中二離過離過即斷德初智後悲三德備矣雖意俱通從多故別是以經中但名行處近處意在近理行理耳無行而觀寂照雙流為行理也二次第釋成四初安住行處近處二不生好惡怨嫌三勿生嫉諂我慢四廣垂屈濟慈悲初二初長文二頌文初又二初雙標二別釋今初一者安住菩薩行處親近處能為衆生演說是經二別釋二初釋行處二釋近處初二初約所住論行二約不行論行今初文殊師利云何名菩薩至而不卒暴心亦不驚疏云生公云已入於理而履行之名為行處鈔中問若以入理為行住忍辱地等豈入理行耶答正是入理謂無生地寂滅之忍為所住柔和善順即柔順忍而不卒暴心亦不驚即音聲忍三忍頓具故為入理入即住也二約不行論行又復於法無所行至是名菩薩摩訶薩行處疏云既云無行而觀即寂照雙流為理行也亦不行不分別釋此自有二意一謂上無行而觀皆是不分別今又不行則寂照兩亡也二但對上而觀諸法如實相恐濫下從行起觀今正明觀時亦不行此觀不分別此觀就行約心詣於理就觀約照達於理今心行不行觀無分別即觀無觀是寂照雙流故下云又復不行上中下法有為無為等即不行也亦不分別是男是女等正是入理即亦不分別也然住忍辱地即如來衣觀如實相即如來座以此導悲即如來室二釋近處二初對遠論近二觀法論近初二初遮詮顯戒二表詮顯定今初云何名菩薩摩訶薩親近處至亦不樂與同師疏云雖未入理能遠諸惡鈔云總離十緣顯戒也一遠豪勢謂國王等為損害緣二不近邪人法謂外道梵志等為惡見緣三亦不親近諸有凶戲是壞亂緣四又不親近旃陀羅等即惡業緣五不親近求聲聞者即離友緣六文殊等不應於女人身即長染緣七亦復不近五種不男等即非器緣八不獨入它家即譏訶緣九若為女人說法等離非軌緣天台云八離冤害緣九離譏嫌緣十不樂畜年少等即散亂緣二表詮顯定常好坐禪在於間處至是名初親近處鈔云此明所應親近乃親近之始為初親近處二觀法論近復次菩薩摩訶薩至第二親近處鈔云此第二親近處為親近之終正明近理以觀相未除故名親近初句總顯觀法論近觀即能觀之觀智一切法即十界所觀之境空字顯能觀之智所觀之境皆不可得結成妙觀也如實下別釋但前觀諸法如實相乃歷緣起觀此觀如實相者正明依定起觀也是知妙樂云行近二文廣略異故未之思也如實相者先約法釋以顯此空乃是如實空義非體非析乃第一真空也下以四義轉釋謂初由一念不如實知分為心境二種顛倒今由一念歸真則二倒俱寂故云不顛倒由歸真故則離妄動由離動故不退入生死亦不轉入涅槃矣如虗下次約喻重釋空義謂上理空義深難明故更藉事空喻顯今此空體雖亦妄現若對諸緣則自他等四執之性了不可得且不可以語言通其有無之徑萬物以之滅而不見生鑿井汲之而不見其出本體寂然而不起虗空之名豁達之相並是巧安強立故曰無名無相求少法不可得曰實無所有越乎數跨乎徼曰無量無邊入一切曰無礙不拒諸相發揮曰無障此從淺釋庶不與上義重沓矣但以下釋疑疑曰上以中道妙觀既雙絶能所何以生死涅槃仍如狂華之不止耶釋曰但由染淨二種因緣致有兩途紛然之相又因妄真同二妄之顛倒故令捏目似有所見而說有生死及與涅槃常樂下結成遮照同時之妙觀謂上標云一切法空此雙遮也今結云法相者正即雙遮以明雙照也二頌文二初頌前二結答初三初總標二釋成三示相今初爾時世尊欲重宣此義而說偈言若有菩薩於後惡世至應入行處及親近處二釋成二初總釋二別釋今初常離國王及國王子至以此二處能安樂說小乘三藏者佛在波羅奈最初為陳如等五人說修多羅藏次在羅閲祇最初為須那提說毗尼藏在毗舍離獼猴池側最初為跋耆子說毗曇藏此小之三也名字羅漢即假名阿羅漢非大法器故求現滅度速出生死二別釋又復不行上中下法至常住一相是名近處心一於理唯見一性故平等說法以所化等故能化亦等是以不行上中下法等復由隨上說法之行起觀照達於理行得理息故云亦不分別此上二頌皆約頓教同性門說法起觀也一切諸法下由初一近處及第二近處之文皆始終相承故綺互而顯以見定慧兩須之意將頌與長文細對自明三示相若有比丘於我滅後至其心安隱無有怯弱行成則外儀無失理成則內心無滯故說經時無有怯弱菩薩有時下釋無怯意二結答文殊師利是名菩薩安住初法能於後世說法華經二不生好惡怨嫌二初長文二頌文初二初標章二顯行今初又文殊師利如來滅後至欲說是經應住安樂行二顯行二初止行二作行今初若口宣說若讀經時至又亦不生怨嫌之心疏此下取生公意合身口在第二中以頌云施座塗身等皆先安處其身而後論止作也衆生好樂不一咸由過去習染所致自應調伏隨宜設教故不必罵亦不必輕人好惡長短皆物不齊之情況人皆惡聞己過倘一訐露後患繼之矣又好譽者必善毀故亦不稱人之長於聲聞人不贊不毀者贊恐退大取小毀恐並失小益大論謂自贊自毀贊他毀他如是四法智者不為又亦下妙樂云損己則怨違情曰嫌心機一動聲說即發杜說過之源在不生怨嫌心也二作行善修如是安樂心故至令得一切種智善修安樂者由能觀諸法空心與理融故能隨機應便不逆其意難問不答以小者一可遠但令得小之益二遠有妨大乘之失且可令生一切種智二頌文四初說法儀則二說法心行三示安樂相四結歎功德今初爾時世尊欲重宣此義而說偈言菩薩常樂安隱說法至安處法座隨問為說內外淨雖兼三業下二句即合身於口以為正行則重輕自分矣隨問而說則遠輕慢取害之道矣二說法心行二初慈心為說二清淨心說今初若有比丘及比丘尼至離諸憂惱慈心說法內融妙義外以和顏口宣至四衆同飲甘露矣舊謂智者語可答王者愚者語不可答竊謂弘通之人須具妙辨不拒所問方堪演化然愚者語或可不答若王者有問不答倘臨不測為之奈何二清淨心說晝夜常說無上道教至是則亦爾安樂供養無希望即清淨心也三示安樂相我滅度後若有比丘至亦無擯出安住忍故內業既澄則外難俱靖矣四結歎功德智者如是善修其心至算數譬喻說不能盡三勿嫉諂我慢二初長文二頌文初三初舉能持人二明安樂行三示安樂相今初又文殊師利菩薩摩訶薩至受持讀誦斯經典者二明安樂行二初止行二作行今初無懷嫉妒諂誑之心至戲論諸法有所諍競止行有四謂無懷亦勿無得不應等八字是也初中嫉妒與諂及誑三皆小隨煩惱行相最粗故懷嫉妒者殉自名利不耐他榮妒忌為性正與菩薩隨喜法門相違故首止之諂者為罔他故矯現異儀能與菩薩直心相違以體即貪癡故誑者為獲利譽矯現有德能違檀度故此三皆意家惡行故並止之亦勿下二學佛道者乃已發大心正修行人也輕罵雖係口業實由小隨中之憍心於自盛事深生染著醉傲為性所使諸菩薩未得三不護已來何能槩免誤犯之輕垢弘通者若與相遇但當略其所短取其所長彈指獎勸明進其德倘被輕毀而生阻退其罪可懼若比下三先通約四衆言以此四中皆有三乘之機故以三乘菩提為所求應知此輩雖不若一乘之直往然亦可為入道之漸故止其勿得惱之而令起疑起悔致生退屈語其下其人別指依權教發心人也倘語以汝等若但惟攻事行則去至道甚遠必不能得種智所以下復責其不肯直求無上故云放逸以於行解圓融觸事皆真之妙道懈怠故設彼非決定性人聞此則不成增進故並止之又亦下四凡無益之語言文字悉名戲論若與之校徒增擾亂故亦止之二觀行當於一切衆生至深愛法者亦不為多說於衆生起大悲想者欲拔彼苦於如來起大慈想者望與我樂於菩薩起大師想者求其教誡遵彼模範敬禮諸大士者希為伴侶長養善根於一切下為順平等法性而說平等法門稱其機宜令無增減非論文句之有廣約也三示安樂相文殊師利是菩薩摩訶薩至恭敬尊重讚歎先結成安樂故無惱亂得好下亦現報中之增上果也二頌文三初頌止行二頌觀行三結成安樂今初爾時世尊欲重宣此義而說偈言若欲說是經至不令他疑悔云汝不得佛二頌觀行是佛子說法至破於憍慢心說法無障礙三結成安樂第三法如是智者應守護一心安樂行無量衆所敬四廣垂屈濟慈悲二初長文二頌文初中三初舉人二明行三示相今初又文殊師利菩薩摩訶薩至有持是法華經者初安樂明大智今第四明大悲悲智相導於中二三業同歸安樂此下正顯大悲所成之德則所導三業悉融為一大悲體耳文中雖具彰慈悲二行今獨標悲者以事有緩急故苦息而樂可自致故二明行於在家出家人中至令得住是法中初於依權教發大心人起慈心者欲與無上法樂也次於依權教發二乘心及全未發心人起悲者欲拔其二死苦也應作下謂不知如來方便說法當問解是經既有此失必住種種諸地菩薩安能不引之而住此中三示相二初顯相二徵釋今初文殊師利是菩薩摩訶薩至能令聽者皆得歡喜初總結行成離過常為下別結行成之果由慈行成故有供養隨侍者冀得聽法之樂若在下由悲行成故有衛護令來者不成難問免其墮苦且令聽者生喜若合言之即入如來室以慈悲覆物也二徵釋二初略釋二廣釋今初所以者何此經至何況得見受持讀誦初句徵次釋中先竪論尚是三世佛護況復諸天文殊下復橫論以顯難得難聞何況下正顯今之得見聞者乃希世之人也安得不感四衆諸天供養衛護二廣釋三初舉況二喻法三總結今初文殊師利譬如強力至王諸眷屬必大驚怪輪王譬如來諸國如陰入處界小王如煩惱於凡夫中得自在故不順如煩惱於境界妄生分別驅使七支而作諸業也兵言種種者即三乘觀道也隨功賞賜如依何等止觀破何等惑障便得何等果報髻如權珠如實髻中珠如以權覆實頂乃百體之尊珠在王頂之上又尊中之尊矣如權教為出界之尊今經又在權乘之上正尊中之尊耳是故一切可與而珠不可與如能破煩惱障人涅槃等城皆可與非發大菩提心人若與說此經則諸大衆未有不疑不驚者二喻法二初昔不與之喻法二今以與之喻法今初文殊師利如來亦復如是至而不為說是法華經法中皆以說權說實為賜與不拘教理行果之次者為順喻故二今以與之喻法文殊師利如轉輪王至先所未說而今說之明珠久在髻中以待有大功者方與如一乘久為三權所覆以待有大心者乃說如來亦復下今也死魔即二死魔三毒有染污及不染污之別若賢聖軍與煩惱魔戰則斷染污無知出三界斬分段死魔若賢聖軍與五陰魔戰則斷不染污無知出界外斬變易死魔兼裂坐道場時天主魔網始名有大功勳者能令法王大喜而為開權說實如解髻賜珠此法下出昔不說所以也多怨如五千退席難信如中下根由譬喻因緣乃領解一切智解見前三總結文殊師利此法華經至乃與汝等而敷演之初約於已說當說中為最深故結為諸佛第一之說文殊下復約不妄說結為祕藏然言諸佛祕藏者乃約法體過量超數非至菩薩究竟地不盡能受以言祕也故涅槃云如來但有密語而無密藏如秋月十五日欲令同見豈有祕密衆生不了謂之為密有言如來有祕藏者約下位不測耳然有約法體無約佛心以佛心無吝但不妄與耳長夜守護若遠指即塵點近即靈鷲以前皆不妄宣時也今為敷演同歸於一二頌文二初明行二法喻今初爾時世尊欲重宣此義而說偈言常行忍辱哀愍一切至為說此法令住其中初一頌總頌行成下三乃正頌本行也二法喻譬如強力轉輪之王至今正是時為汝等說如來因中發大心以忍辱力果上得智慧寶藏若衆生亦發大心具忍辱力已我則賜與智慧寶藏如王解髻三結示利益三初總舉四行二廣舉利益三結成行益今初我滅度後求佛道者至應當親近如是四法二廣舉利益二初現未果報二夢中妙事今初讀是經者常無憂惱至智慧光明如日之照此明若一行成則三障盡五果現其益甚大初一頌轉現報也謂現前色心屬於報障而持者能滅現世憂惱令意地無苦即轉現報之心無病鮮白即轉現報之色總謂之增上果也不生下半偈轉業障得生報即異熟果衆生一偈明修賢聖行便與賢聖同即等流果天諸半偈因持經而獲給使即士用果刀杖下二頌由三毒滅而智慧生即離繫果若合上頌總明滅惑障得後報也又多貪者為人所遠離故多嗔者為人所加害故多癡者常被物所覆故今皆反此故知惑滅二夢中妙事二初聽法說法授記證實二出家成道說法入滅今初若於夢中但見妙事至聞法為人說常有是好夢他宗以下十六頌約信住行向地妙六位配夢中所歷之境今准宗鏡判後四頌為銅輪位則此上十二頌應是十信位在鐵輪以信為道源德母是故從因至果一切功德皆在最初一念信心中具足故皆發兆於夢中以果不離因故今以此經分屬於圓是故一切即一令持經者得以一念夢入十信初心於此心中即能竪該一切賢聖位次言初心該者如初頌半中由昔曾印信三寶具實德能深忍樂欲熏以成種故今夢中得見佛僧聽聞法要寧非初心耶此下皆約竪論故以初信攝初住初地至等覺也次又見龍神下頌半明不離初心即得入住現身說法也又見諸下六頌半顯超證初歡喜地入總持門證念不退得記莂也又見下一頌顯行證之滿足故曰證諸法實相次頌半顯等覺菩薩入金剛定感十方佛現身摩頂受職也問何以不言行向耶答此中夢境不過顯德若拘常例則非夢境矣二出家成道說法入滅又夢作國王至後當入涅槃如煙盡燈滅以上四頌准宗鏡判為銅輪十住顯持經人又以此心獨頭夢入十住初位於此位中得見八相妙境以為當來入住之先兆又此八相各有所歷之時而長者甚至以千萬言以時無別體依法建立由所依之夢境既融故能依之時分亦俱融矣問前已明初信攝初住今何重耶答前於初信急欲歷顯攝盡諸位故於住中略明說法一相今特於住初備彰八相者一以補前一以見位位之中皆應有此八種相皆如來之巧示也三結成行益若後惡世中說是第一法是人得大利如上諸功德二下方傳持從地湧出品第十五地乃色法以質礙為性湧出是從下發來之相諸大菩薩已離現色不相應染久證色自在三昧深悟實相依正一如性色真空兩俱無礙故承自在神通一聞佛命不用加行亦不見上有地礙四方奔湧祇應聖召故曰從地湧出品台家自此品去約本迹二意又立一重三分今不然者由非本無以垂迹非迹無以顯本本迹雖殊其揆一也故不敢分文六初客衆傳持二如來制止三湧贊訊喜四問答決疑五廣說功德六發願傳持今初爾時他方國土諸來至當於此土而廣說之上顯能持之行既畢是故雲集者因聞弘經大益又得遠難芳軌所以發願亦欲於此弘經又藉此一請可作開顯之由二如來制止爾時佛告諸菩薩至護持讀誦廣說此經所以止者由彼方此土既均屬所被何必廢彼益此倘此土緣淺不但失此亦並失彼是以不許又若許之則下方不來遠本何由而顯是以止之而召本衆以發疑問之端三湧贊訊喜四初應命湧出二詣佛禮贊三問訊安否四發隨喜心今初佛說是時娑婆世界至算數譬喻所不能知諸大士深證實相原與如來共居一處本未曾離今為未解者發顯本跡故如來方便有呼諸大士亦方便現發來之相地言振裂者乃預表開顯之兆也二乘聖十八變中尚能履水如地履地如水不見有礙況諸大士耶此界虗空中住者既曰界則非空矣又云空中住則不離空矣大鈔謂他受用土當以色香味觸四塵為體從如來後得智所現為他受用身所依如來利他行滿隨諸菩薩所宜見而現種種妙色諸塵境界釋曰今若就菩薩言則以諸大士意樂大用為因託如來利他大用為緣而於下方衆同分中現有此土以為所依未便指為常寂由寂光屬自受用且寂照雙流存泯莫羈今既能所歷然何必談玄說妙況帝網剎中必不缺此依空之土故行願經云或有依空及諸卉木而生住者思之是諸下明發來之由一一下明所來之多而以所領之極多者作最少者說起故約能將則從寬之狹說至五四三二一皆以所領最少者倍倍漸增以顯能領者甚多如領六萬者止有六人而領五萬者則有十人是故令五返多於六二詣佛禮贊是諸菩薩從地出已至百千萬億國土虗空初明三業禮贊之儀是諸下明所贊之時分以顯時隨心融之妙而拂九載說經之迹但經文渾明五十謂如半日若各承一邊者一謂湧出菩薩非上承佛力令於自心即促見延非展半日為五十不足以盡贊嘆之法故云五十一謂本會大衆非上承佛加令於自心即延見促非緒五十為半日曷能經久聞贊不倦故云半日爾時下明本會四衆更承佛力即狹見廣也地湧之衆自應命出後已遍空界衆但未見茲承佛力以佛眼之用擴之始令即狹而能見廣然上延促及廣狹二種無礙並是循機所見業用門中事也三問訊安否是菩薩衆中有四導師至得聞是經入於佛慧四上首皆以行立名者由以持經之行竪窮心源故名上橫彌法界故名無邊不染二邊故名淨中道卓然故名安立行皆能創啓法門引接物機得為唱導之師在大下問訊也先長次頌而以病惱等為問者以如來應身人中示同人法故輪王以有漏五陰住世尚得無病自在況以全體金剛為身者諸大士為順世常儀故初覲時應有此問爾時下答也釋成安樂易度之由文有三節然自開卷至此並未曾言菩提場說華嚴事今由開顯得立一乘已竟更欲引同入別乃作是說故古德依此文建立三種法輪謂於始見我身下立根本法輪令根利德厚者聞一乘法入如來慧次於除先下立枝末法輪令五濁障重者聞三乘法先出火宅後於我今下立攝末歸本法輪即依此經退攝從前依本所垂之末會為一乘同歸華嚴佛慧故云我今亦令得聞是經入於佛慧正以先率後也是知今經亦明指華嚴以為其本矣須知融會時佛慧雖無有二而於未會之前則先後二相自不可廢大疏謂華嚴為諸教本有二一為開漸之本一為攝末之本則今經與彼同名為攝末之本而屬於所同也四發隨喜心爾時諸大菩薩而說偈言至能於如來發隨喜心以娑婆之難化而返易化故以大雄贊之四問答決疑二初決不識衆湧疑二決執近教化疑初二初大衆疑問二如來決答初又二初此土衆疑二他土衆疑初又二初長文二頌文今初爾時彌勒菩薩至心之所念并欲自決所疑彌勒位極補出智豈遜人遊遍十方見可云廣今乃不識一人亦並不知所來之處足知佛境廣大深遠故他經云佛所知者如大地土等覺所知者如爪甲上土豈虗語哉二頌文二初問來處因緣二陳己及衆疑初又二初略舉二廣舉今初合掌向佛以偈問曰無量千萬億至是從何所來以何因緣集一問所來之處一問所來之由二廣舉二初問來處二問師宗今初巨身大神通至過於恆沙劫猶不能盡知二問師宗是諸大威德至受持行誰經修習何佛道後從誰成德初從誰教發心以初發後成不得有三人故止用兩箇誰字中間修道自然歷覲多佛故連用何誰三字二陳己及衆疑二初陳己疑二陳衆疑今初如是諸菩薩至忽然從地出願說其因緣以此塞畟虗空之衆等覺輩尚不能識一人則諸大士之本迹亦叵測矣二陳衆疑今此之大會至無量德世尊惟願決衆疑初六句會同所疑後二句正請也二他土衆疑爾時釋迦牟尼分身諸佛至汝等自當應是得聞答問之益不在諸佛故抑待釋尊又釋尊一代近跡因此答問玄祕方顯故令待之台家自此品初至此文止名本門序分今並為流通所攝者以此上下文俱因召本衆持經決疑乃有此問及答故二如來決答二初嘆勉安慰二正答所疑初二初長文二頌文今初爾時釋迦牟尼佛至諸佛威猛大勢之力釋尊一代化儀皆被近跡所覆非藉此問弗顯故先贊其問而又勉之以勿散亂勿怠退勿疑悔者如來果後施化無量為邊菩薩因修未免聞罕不疑故勉之如此如來神智二力一言之歎不足以盡之故既曰師子奮迅又足以威猛大勢非如是不能作廣大佛事二頌文爾時世尊欲重宣此義而說偈言當精進一心至如是今當說汝等一心聽欲聞第一法須住第一義諦故云住忍善中二正答所疑二初長文二頌文初五初答發心二答住處三答修習四釋修習五釋住處今初爾時世尊說此偈已至調伏其心令發道意此去五科皆略為開顯令其動執生疑此文顯諸大士先皆凡夫由釋尊成道後始教發心非由於他人二答住處此諸菩薩皆於是娑婆世界之下此界虗空中住釋論以有底散三昧釋住處言底者下也散者空也應是以下方非非想之頂為此界之底散即底上之虗空有即是堪忍之下邊此正指出下方空為所住處也故行願云或有依空及諸卉木而生住者三答修習於諸經典讀誦通利思惟分別正憶念三慧如文可知古謂於經分別是修智正憶念是修斷四釋修習阿逸多是諸善男子等至勤行精進未曾休息以不樂在衆而樂靜處成無諍行也五釋住處亦不依止人天至一心精進求無上慧不依人天二邊則顯身所依之空界乃即中道之妙空也樂深智顯觀所依之智也諸佛之法顯觀所依之境也共顯此菩薩若身若心久離散動故下云善入出住百千萬億三昧二頌文五初發心二依處三修住四總答五勸信今初爾時世尊欲重宣此義而說偈言阿逸汝當知至悉是我所化令發大道心上文但云得菩提已化令發心以未言在無數劫前或謂此是利根大乘故得一生超證今頌忽云從無數劫來法會不能不因此答轉更生疑二依處此等是我子至捨大衆憒鬧不樂多所說三修住如是諸子等至說種種妙法其心無所畏上處中既不樂在衆而又領多眷屬今修中既不樂多說而又說種種妙法何也由勤行精進之人雖多亦靜雖說非多豈凡衆可比四總答我於伽耶城至今皆住不退悉當得成佛總以一我字答盡數問且云道後施化悉當得佛而疑團更大湧矣五勸信我今說實語汝等一心信我從久遠來教化是等衆二決執近教化疑二初大衆疑問二如來決答初二初疑二問今初爾時彌勒菩薩摩訶薩至阿耨多羅三藐三菩提既曰伽耶樹下成道已始教令發心又如何云從久遠教化語殊矯亂是以生疑又或雖聞久遠之說由上云伽耶云樹下成道故仍忽久遠以為四十故下陳疑但執於近並不達開顯意二問二初長文二頌文初二初陳疑二請決初又三初舉少時能化廣大難信疑二舉父少子老以況難信疑三復舉難信之法以合喻今初即白佛言世尊至如此之事世所難信初以道成之近何能廣化深位多衆此執近疑遠也言四十餘年者以初二十但令除糞次二十執作家事又今在法華故合有四十餘也世尊此大下執遠疑近也妙樂云結請中但舉難信者託物不信拒而擊佛令必有答也二舉父少子老以況難信譬如有人色美髮黑至生育我等是事難信以色美髮黑喻近成百歲喻久修雖老指少為父少指老為子了不自疑若令旁觀者則不能信末故斷曰難信三復舉難信之法以合喻佛亦如是得道已來至乃能作此大功德事本會總被得道之近跡所覆故皆於未久起疑入定有從散入有從定入定之異既曰無量百千萬億三昧豈得以二三局之空生尊者尚能於一剎那入四萬三昧諸大士寧可思議二請決二初出請意二正請決今初我等雖復信佛隨宜所說至而起破法罪業因緣初以現在之機雖知佛語誠諦因憑仰信雖不敢起疑猶乏增進之益若未來新發意人聞而不信能不造破法罪耶二正請決唯然世尊願為解說至聞此事已亦不生疑二頌文三初頌執近疑遠二頌以喻合法三頌決疑之益今初爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種至是事難思議云何而可信二頌以喻合法佛得道甚近至為求佛道故於下空中住三頌決疑之益我等從佛聞至教化令發心而住不退地請決意多重未來者以未來人無能決故二如來決答如來壽量品第十六如來之稱是十號之一乃十方三十諸佛出障圓明之通號也即含三身異義則無所從來亦無所去乃法身如來也若以第一義諦名如正覺名來乃報身如來也若以乘如實道來成正覺此應身如來也壽量者以此三中各有身恆之壽故謂若有始有終長短萬差者乃化身壽也有始無終是報之量法身之壽則無始無終矣合而言之乃如來之壽量依主釋也上即通義若別明者則以伽耶生雙林滅者乃本師之化壽經云我本行菩薩道時所成壽命乃報壽也而常住不滅乃法身壽也今之經宗雖三身三壽一一圓融皆不可思議之身與壽而開近顯遠則唯約所得之報壽以決其疑耳問三身十身有優劣否答三之與十皆數之開合原無異義若約義相對則三十有差如四經云以三十二相用莊嚴法身此約理事無礙說三身圓現也若華嚴八地則以事事無礙說十身相作則有差勝之別矣問台家判華嚴為兼別之圓若以四法界義校之似不然者何耶答以彼迷地上一分行布義未詳是寄位顯深之旨乃作是說故大疏因沿襲彼迷作勝負觀者釋經至或見釋迦成佛道已經不可思議劫偈但曰已經多劫不定始成一點便已至作鈔時欲令知其源尾方明云所以疏中牒既云已經多劫不定始成者遮天台師之謬釋也謂彼學者云華嚴雖則玄妙而有二事不如法華一兼別義是故不說聲聞作佛二說如來始成正覺不說本師壽量久成故指出此偈即是華嚴說久成處竊謂此偈既是菩薩所說便為共知之壽何用開顯又彼以久成為本始成為迹而華嚴則以非古非今以為其本若就迹門則能今能久故生公云是以極設長壽言伽耶是一若伽耶是者則伽耶非復伽耶伽耶既非長安獨是乎長短斯非則所以長短存焉誠為妙悟不說聲聞作佛者約不共義既不厭捨曾何棄之況一成一切成無一衆生不具佛智善須得意勿雜釋經文准此既彼經亦說久成及一切成則純圓獨妙之稱二經亦齊第二經詮體雖同而用則有別故華嚴以直體一乘為一類法身大士於能說人及所說法無隱無顯直示法界緣起稱性德相是以廣談事事無礙餘非所及而今經則以破異一乘為化一類由漸之機因最初不堪即聞大法故於所說之法及能說之人始則覆其遠本於一佛乘而作三說今至成熟位乃會三歸一開其近跡而餘亦非所及是故今承上文於所說法既經開顯則應於能說人約壽量以顯遠本而拂近成之跡故此品來問前云本跡雖殊其揆是一何判壽量入流通耶答經不云乎如來所以出為說佛慧故而壽量乃因為流通佛慧者決疑而說是故釋尊一入寶塔即便唱滅求人付囑雖以流通為所急而流通者乃佛慧也文二初如來正說二聞說功德初四初三誡四請二重誡聽說三牒現近跡四示成久遠今初爾時佛告諸菩薩至我等當信受佛語在昔皆隨他意說隨他意語今欲隨自意說隨自意語發久成之祕決近謂之迹故先殷勤再三誡勉令發深信祇領誠諦為開勝解二重誡聽說爾時世尊知諸菩薩至如來祕密神通之力祕密神通乃用大也報化二身是此用隨染緣所現者今欲顯即用之體大叵測故約即體之用大先歎神通之祕密使悟現覲之佛身真應相融延促無礙正不可作真應促延觀由非因位所能知故曰如來祕密神通之力三牒現近跡一切世間天人至得阿耨多羅三藐三菩提法會不知如來以祕密神通覆其遠本致令身世俱迷決不悟今佛非今佛伽耶非伽耶是故雙牒現跡而為開發四示成久遠二初長文二頌文初二初總顯久遠正破近執二別顯方便令知祕密初三初直示久遠二喻顯久遠三分明宣示今初然善男子我實成佛已來至百千萬億那由他劫此正以久成誠諦之語而決近成之疑也前科之誡誡勿疑此言下文之喻喻其成來之久則法會執近成之疑可以袪矣然論說此經之佛雖三身與三壽俱融若克論開顯則應各有所指以所開者正屬化身而拂伽耶近成之跡其所顯者則正屬於報以顯道成之久故曰我實成佛已久蓋指最初以始合本萬行初圓四智創滿之報體言也何也以法身無初可示故化身無遠可顯故二喻顯久遠譬如五百千萬億至如是諸世界無量無邊上云甚大久遠未審何如今且作喻直舉下塵被點之界為問彌勒下答中以具世間有漏慧者皆不足言知但舉凡具出世無漏智人及有窮因之大智者亦不足以知此俗諦之多數以等覺人猶未離見相故不能顯照一切三分明宣示爾時佛告大菩薩衆至阿僧祇國導利衆生上止舉被點之界已不能知今復增出未被點者更不能知矣況復將此二者盡抹為塵此塵之數如何說知又況所歷之壽更過此數百千萬億耶此上皆約得報之後所有之壽已與法界量齊至為菩薩時修因所感之壽尚未言及亦未享用故知此中俱約報壽以顯遠本也自從下由上雖明久遠未審居於何地故指常住娑婆及餘國土則今日之迹居猶是本所成道之處但德薄人便見被燒其種善者不但不見亦復不聞此則娑婆外無淨土而淨土外亦無娑婆矣二別顯方便令知祕密二初明如來本來不滅二明方便非滅示滅初三初示方便二明佛事不虗三結成不滅初二初總示二別示今初諸善男子於是中間至能令衆生發歡喜心上決近疑雖竟復恐疑曰般若經說釋尊過去世曾作善慧仙人於燃燈佛所得成佛記方歷二僧祗位在八地隨復入滅此何說耶今為拂曰此皆果後垂化所現之方便也諸善男子若有下示感應方便也先明能感世尊現量用事而言觀根者亦隨順語也又觀根是法眼今以佛眼圓具五眼之用故以佛字該之來至我所即九界冥叩之感隨所應度即以無私普應之真我而為現九界之身以度之復有種種召體之名字及身恆之壽量有大有小此皆非生示生也亦復下此明應以非滅示滅得度脫者又以下明於上生滅二際內以種種方便說種種法而皆權實隱顯不可思議要之此等方便不過欲令衆生先得歡喜悉檀漸漸引入佛慧也二別示諸善男子如來見諸衆生至令入佛道作如是說上科總明遍應九界此下別約鈍根而示以八相之近成然我下正拂此現前近成之跡結成久遠為衆決疑所謂開顯也據此則文外影出利根人恆得見佛如華嚴之無煩開顯矣二明佛事不虗三初直示不虗二徵示明見三所作不虗今初諸善男子如來所演經典至諸所言說皆實不虗此明於上現身成道後所說之經典皆能有益也謂或以因緣說自他本生之身迹或以身相示現自他之身或以事業指示此是自他身之所作凡所言說皆實不虗二徵示明見所以者何如來如實至如來明見無有錯謬以如來具足如實妙智始能所作不虗蓋真如隨緣現三界狂華之相而令九界翳眼各有所見唯如來圓證其體得以淨眼而見實境故三界之相即是實相既無生死誰復涅槃又既無退失菩提心者則亦無發心求出離者因修既無退出果中何有住世之佛及滅度者又此退出生滅諸相於實相體中求之毫無所有故非實離此體外別求隨緣之相又不可得故非虗以有隨緣義故非同二乘所見之一如以有不變義故非同五趣所見之隔異惟其不同三界所見之二邊始能以中道妙智具見三界隨緣之相如斯等事我皆徹其底蘊無有錯謬何為錯謬以不能如實知真如法一故則見退出等狂亂華相三所作不虗以諸衆生有種種性至所作佛事未曾暫廢先明能感之緣以諸衆生於先世有種種習所成之性而發現前種種之樂欲使身口七支作種種之業行復於前境分劑上安立種種憶想分別是為能感欲令下明隨感而應令生善根然此應感之教及所作之事自成佛來熾然勇健未曾暫廢問據七支所作之業應有善惡之分善者可以言感而惡何可言感答如見衆生欲造重罪當墮無間無異方便救拔須斷彼命自墮地獄令彼脫苦豈非感耶三結成不滅如是我成佛已來至今猶未盡復倍上數如是下先總結三身之壽謂所證之如既無始無終故能證之智亦得冥契不異何有始終此法之不滅也若如因智顯似有初起實無終窮此報之不滅也若稱體大用隨緣所現之化於翳眼中似有起滅以相即性故亦得常住不滅諸善下復對現身別結報之常住再決所疑謂我自入住來所得壽命猶倍上數而況道後稱真所得者安有涯耶所以作此結者以諸聲聞曾認樹下成道之身便為報體次經般若等會淘汰進知樹下是化而報體尚在色究竟及聞今經始悟三一圓融體用遍周之旨得知現前乃即化之法報故涅槃以常與無常作二鳥雙游之喻二明方便非滅示滅二初正明二喻顯初二初標示方便二徵釋所以今初然今非實滅度至以是方便教化衆生今因開顯令入佛慧得知佛身常住須知前於入塔時唱滅者此方便也然此方便正所以警悟衆生也故如來於十恩中有第九示滅生善恩謂若如來久住於世薄德之人不生難遭之想是以示滅令心戀慕便種善根此即正為佛世結緣人及未來衆生約化身唱滅令其生善也古注三身皆有唱滅義不知有何利益二徵釋所以二初約久住反釋二約難遭順釋今初所以者何若佛久住於世至難遭之想恭敬之心德薄者雖值佛世亦不種善以致後世墮在貧賤見五欲境深生貪著入於三倒網中若見下謂若不唱滅不獨無益而且有損甚之反起憍恣不生敬仰三倒者謂憶即心顛倒是根塵相對所起者為羣妄之源建立種種分別故想即想顛倒謂由不了六塵過患能害善根妄於境緣安立分劑起諸顛倒故妄見即見顛倒謂眼是諸見之本以不了所緣如幻執斷執常而生邪倒故二約難遭順釋是故如來以方便說至雖不實滅而言滅度夫法身周普用本恆常故令妙化難思地湧叵測是故法眼清明者見毗藍生雙樹滅皆即體之妙應悟知釋尊本來不滅今為翳障未除者應以唱滅方便警令生善言難可遇殊不易值縱過無量百千劫之久尚有得見不得見者之別是故下結成唱滅本意二喻顯三初標法二立喻三結合今初又善男子諸佛如來法皆如是為度衆生皆實不虗引同諸佛者顯此唱滅方便非自我創乃化五濁之程規也二立喻四初良醫他往二良醫示滅三良醫不滅四良醫無妄今初譬如良醫智慧聰達至以有事緣遠至餘國良醫喻佛子喻衆生之已受化者醫稱良者由內有睿智外達經權知藥知病如佛有權實二智知機知法也其人下以三乘根約數之多少以明子義之親踈則以十數配菩薩二十配緣覺百數配聲聞若配三因則以無緣慈等視大地如子此以正因可言百也若約昔曾聞法未生解者可以二十配緣因若以過去世曾飲法乳始而生解發心既而退大此具了因人可以十配今但總舉以有下如他方緣熟示生而於此土則見薪盡火滅二良醫示滅六初諸子飲毒二父來歸家三諸子求救四良醫與藥五服否有異六方便示滅今初諸子於後飲它毒藥藥發悶亂宛轉於地於後飲毒自因求飲而飲以致藥發如佛滅後妄受邪法倍增輪轉者二父來歸家是時其父還來歸家父之歸來因子誤服毒藥如佛見諸衆生深入邪見皆因邪求所致是以更關大悲乃為現身竊謂所秉之教雖有邪正其厭苦求出之心則無有二是故邪求亦資正感故佛出世最先所度諸大弟子多從邪外中來三諸子求救諸子飲毒或失本心至願見救療更賜壽命求救如機宜叩聖飲毒如信受邪法者然有利鈍二根鈍即失心者以深著虗妄法故熟脫之益尚在未來利即不失心現得益者二人雖同見色相而並不知法報邊際故曰遙見而皆能發心隨喜請轉法輪即得度因緣也四良醫與藥父見子等苦惱如是至速除苦惱無復衆患佛世諸子於未奉佛前秉邪增苦今既奉佛是故世尊遵古為說令其度苦經方如化儀藥草如化法色香味如教中所詮之戒定慧能伏能斷也初搗如斷分別起次篩如斷俱生起和合如真智證理冥契不分而作下即作證勸修意五服否有異其諸子中不失心者至於此好色香藥而謂不美服藥者如昔退了因今得值佛復起了因速出生死者所謂佛種從緣起也不服藥者如宿具緣因今雖值佛反起憍恣仍不奉教者故興如來唱滅之歎六方便示滅父作是念此子可慜至遣使還告汝父已死佛世衆生雖以緣因值佛而為三毒所中不能發起了因仍成結緣故勞世尊先以唱滅警之次以示滅拔之令種善於今生熟脫於後世衰老如化期之將畢死至如當入滅留藥如遺教還告如四依菩薩奉顧命弘法也三良醫不滅二初諸子病愈二良醫復現今初是時諸子聞父背喪至即取服之毒病皆愈衆生見佛入滅無恃是以發心修行以為能感作未來佛之當機矣則示滅佛事正為未來衆生作得度緣為能感因此佛事之不虗也二良醫復現其父聞子悉以得差尋便來歸咸使見之得差即能感現身之因已成也見之之見乃了如來常住不滅之智也然由歸而後見與斷煩惱悟真常其旨一也此則前科病愈約能感而咸見亦可作斷惑言四良醫無妄諸善男子於意云何至虗妄罪不不也世尊此科專為如來於無生中示生無滅中示滅似屬虗妄可議故藉良醫之他往還歸一喻不獨發明現世益物不虗且并顯過未二世亦如今日以空華佛事令諸衆生實得饒益則三世益物不虗之旨俱溢於言外矣是故前標云為度衆生皆實不虗今結中復以虗妄為問也三結合佛言我亦如是至如法說我虗妄過者二頌文二初總明久遠二別顯方便今初爾時世尊欲重宣此義而說偈言自我得佛來至令入於佛道爾來無量劫以無量二字貫於百千等上者正顯此數非佛罔測兼示所化尚入於佛道其能度人安可測量二別顯方便二初常住不滅二非滅示滅初二初總標二釋成今初為度衆生故方便現涅槃而實不滅度常住此說法言常住此者如來八自在我中其第四明現無量類常居一土者謂如來雖為衆生現衆類之身而所居常在一處自在無礙經云如來之心安住不動而能隨類現無量形又云如來之身常住一土而令他土一切悉見二釋成我常住於此至常在靈鷲山及餘諸住處承上應有問言既常住此何以不見故釋云我雖常住而以神通力令顛倒者雖近不見衆見下別約三世皆滅應感似有存沒之相而實常住不滅初二偈明過去之感時我下偈半初半以非生示生應之次偈說壽談常也餘國下偈半明他土感成此方應卸也我見下偈半明示滅因緣復成未來之感與應神通下結成常住不滅於靈鷲言常住於餘處言及者與華嚴不離菩提樹而上升忉利等處意同問如來用大既稱體遍周法界衆生何以有見佛不見佛之別答用大是起動門必待感而後現故有見否非不起門之體大可比二非滅示滅二初約處顯常二喻成不虗初二初別見劫盡二罪福不同今初衆生見劫盡至憂怖諸苦惱如是悉充滿此下別顯依報者由終實門中性相無礙依正一如故說正則隱顯一致言依則起滅難思前於長文雖已約正顯常而未發明所依之土亦復染淨同源不離一處即有一存一滅滅雖不俱起必同處故今別為不知生滅去來本如來藏者顯示周圓不動妙土常存之旨初以半偈明劫燒難思有惡業者但見火壞更不見有不壞此被壞者乃變化之粗相也次二頌半明細存存由二因一約佛二善業約佛者則不離火處不獨無苦且有自受用之法樂故曰我此土安隱二約善業者亦不離火及自受用處復有他受用及變化淨土故曰天人充滿衆生遊樂雨華供佛又此細存處之聖者雖知當下有火而了不見有火相然亦有示同見火相者所謂存中無滅以顯佛土真常依正之一如也二罪福不同是諸罪衆生至久乃見佛者為說佛難值初二偈申明以善惡二業為能感則有不聞名及皆得見者之別後偈以初半為於善業中具了因人說壽下半為於善業中具緣因人說佛難值二喻顯不虗三初舉智勸信二略示喻相三結合始終今初我智力如是至當斷令永盡佛語實不虗前云以諸神通力今曰我智力先後互舉者正顯種種祕密方便皆是神智二力之所流出又前云我為菩薩時所成壽命未盡今又云久修業所得此前後文皆約報壽以顯久成也又諸地湧位雖高數雖廣仍是果後之所化度則修因時所度者愈不可測故勸智者勿疑二略示喻相如醫善方便為治狂子故實在而言死無能說虗妄結合始終我亦為世父至得入無上慧速成就佛身每自作意以何方便令速成佛正見倚閭之望殷甚切甚二聞說功德分別功德品第十七分別功德者佛說壽時靈山常隨並會初雲集多寶隨來分身侍者海湧龍衆地湧耆德重重海會於一席內一聆法音即得塵勞頓歇定慧開朗悉緣聞法之功有得於心故曰功德復由益有淺深位有高下非蒙佛說何由而知故須分別品初以能所合舉故曰分別功德問何以聞壽之益轉勝於聞正說答聞正時止知釋尊自鹿苑歷至今會始暢本懷而所悟者乃僅僅一化之事故得益者不過三乘弟子茲因聞壽豁然廓悟釋尊道成之久即大通覆講燃燈得記猶是中葉方便且又進了三身三壽圓融常住之旨是以校前得益為多為勝況諸大衆自纍劫來並在如來數數示生數數示滅熏汰之內是故一聞開顯頓將疇昔善根俱時開發故得益者位臻等覺人尚得以一四天下塵數計況得餘益者問聞壽之益若以台家四教判則今所得正屬於圓若以吾宗校之似屬終實仍須越頓乃可稱圓如何會通答若約證道言凡一登地無論偏圓悉皆平等則二宗皆可會通惟於地前所秉之教因言相之具缺故教有權實以致發心有異令所修之行便有日劫相倍之別是以判教者取意各別則令兩宗有異即不可會又若以今經校圓中之言相稍缺似不必會而以分屬於圓則無不可會然亦未免有後來者居上之嘆且如台家以一心三觀為圓而吾宗則謂此觀尚屬理事無礙必去理言事至事事無礙乃為至極雖台家亦有言事事無礙處特以未約六相十玄緣起等義以發其奧雖同名為圓而義實別也問教道差別答如本宗五教位次統以觀道淺深為能伏能斷法界心性為所緣所證而以二障種現習氣細分品數以為所斷但於小教惟約生空言後之四教並各依本教觀智增微以顯升進故始教中頓往者於三賢位中但伏二障分別起漸往者唯斷煩惱障出界後但聞有牛車之名並不上車若終之初住頓根者即得永伏二障分別十方佛土隨願往生得與始之初地同漸者或於十信中伏彼法執現行或於三賢漸次伏除此之二教並依地位漸次修成故名漸教第四頓中總不說法相唯辨真性亦佛無不佛無生無不生即心即佛了無位次近亦有於此頓中建立階差者頗悖頓旨矣第五圓中其所斷者雖不異前特由所乘之觀法既得圓融自在遂將前教之行布若位若行若時若能所斷一併鎔融遂得一多相即相入念劫互攝事事無礙之果復立三生以顯速證於此三中如地獄天以見聞生一得蒙光即登十地林中比丘以證入生則道成言下此二種人皆在十信最初一念發起上求心中即得開發三德祕藏圓契一真與普賢等此並約行首信門實義言也三解行中住滿成佛者或以橫攝或以豎攝若以發起上求義為正以開發為兼即約行布當得圓極為言若以開發三德等義為正而兼前發起即以行本菩提心究竟具德言此外更無別佛是知秉教行證不可不先審其教與義也問圓之初住與終之初住皆現八相於義還有差別否答終之初住於無佛世界現八相者乃約行門示現也圓則有二若住滿成佛即是當位以初攝後如善財於一生內遍歷諸位此圓融不壞行布相也若究竟成佛即異位相望以初攝後如龍女等此行布不礙圓融也是故二住不可同日而語問此下聞壽得補處人與一生圓曠劫之果者何別答證入處本無有二若據教道施設以未約德相明十十無盡等義應屬同教即能同所引之同也則不得槩以增道損生便抹殺此義是故今經進能類於圓頓文二初現前功德二滅後功德初二初增道發心二須深信初又二初如來說二彌勒說初又三初總敘二佛說三供贊今初爾時大會聞佛說壽命劫數至得大饒益二佛說五初得無生忍二總持辨才三能轉法輪四損生得果五發菩提心今初於時世尊告彌勒菩薩至恆河沙衆生得無生法忍此下如來但據現前所得之益而為分別總未暇推其往因今為略溯其源更見經功之叵測且如得等覺果餘有一生在者人內不獨全是從小始等教中來超登者理應亦有乘急戒緩從八難及具縛凡夫中來者何也以聞壽之益與見隨好之益無二無別故則此下得無生忍者內亦不獨全從權淺之初信二信等來者亦應有現發大心之凡夫及曾發大心尚在八難之流同因聞壽勝功不須更歷十千皆超入正定聚矣以此二位推之則中間所明諸位例可知耳無生法忍者謂於聞壽時頓悟生滅一如不作二解知一切法即心自性又知此心自性即一切法則理現自心即心之性已備無邊之德又初具後德唯是慧境因見性成就智身生如來家是為信心成就入住之初相二總持辨才復有千倍菩薩摩訶薩至無量旋陀羅尼入十行人得聞持後於一切語言諸法耳之所聞皆不忘失復有下入十向人得決定無盡藏演說一切佛平等法得無量旋入初地者能旋轉二障分別起者并旋俱生分劑頭數而開發三德祕藏矣三能轉法輪復有三千大千世界至能轉清淨法輪入第二地轉不退輪入第三地轉清淨輪四損生得果復有小千國土至阿耨多羅三藐三菩提入第四地八生得果五地七生得六地六生得七地五生八地四生九地三生十地二生等覺於金剛後心一生得果自初住至此位位各破一品無明增明一分中道最後更破一品微細生相即入妙覺皆於位位中增圓妙道損變易生也五發菩提心復有八世界微塵數衆生至三藐三菩提心此初發覺心初入十信者下得六根清淨人應屬此中三供贊佛說是諸菩薩摩訶薩至歌無量頌讚歎諸佛世尊為化此一類漸機從久遠來以大慈悲方便熏淘而於今生成熟位仍須漸引是以於能說之身先為隱勝現劣乃可為實施權復歷四十餘年直至今會方吐本懷故初以三周開顯權實次為說壽開近顯遠俾進知現佛即報即法本來常住而諸法會乃得徹始徹終深知世尊自塵劫來於所現之身及所說之法各有重重引接殊恩縱身為牀座頂戴塵沙何能報其少分爰從清淨開解心中流出種種法供以申斯須之敬且盡此斯須之心二彌勒說三初時衆解喜二領佛所說三述所供贊今初爾時彌勒菩薩至合掌向佛而說偈言佛說希有法至說得法利者歡喜充遍身末句之歡喜因聞分別功德而生二領佛所說或住不退地至多有所饒益如虗空無邊三述所供贊雨天曼陀羅至一切具善根以助無上心散諸佛詠諸佛供諸佛一見佛佛道同一見諸佛即我佛也二須深信二初一念信解二深信解相初二初正明聞品二結況衆行初二初長文二頌文今初爾時佛告彌勒菩薩至三菩提退者無有是處上科所分別乃宿植了因今於佛世得熟脫者之功德此下乃分別宿植緣因今方聞法開解初得了因者之功德以此功德相雖隱微而能發起無上之慧非蒙世尊分別格量何能自知珍重則他人聞之亦不敢忽慢矣初二句牒上所聞之法而言乃至者意謂莫論預法會聞壽後能行證者及念念相續起信解者之功德茲但約能生一念信解人所成之德試為校量之然一念則顯非多念信解者謂於會內得聞佛壽常住便進悟自身既具佛知佛見亦應與諸佛等一切衆生亦皆平等世出世間若依若正皆與實相不相違背卓然有見自信於心全無疑惑明解現前不可引轉此約具縛凡夫得十信之初心言也所得下略舉所成廣大之德若有下以於多劫廣行諸度所成之德與此一念信中所成之德而校多少以顯超勝唯除般若者以此妙信即是正慧故言退則無是處者由究竟位中廣大功德皆已在此一念中具足而為明信所持又況為諸佛冥加所攝故得不退二頌文二初頌能校量二申明具德今初爾時世尊欲重宣此義而說偈言若人求佛慧至乃至一念信其福過於彼二申明具德若人悉無有至如是之人等於此無有疑此下申明能信之因由於具德初一頌初二句明法器本淨次二句明器所貯之德以結前其有下一頌正申明久修行人始能發此妙信則顯淺行人不能無疑矣如是下三頌明此人不獨具信更能發願思齊若有下二頌復申明能信之所以由具好樂正法之深心故於世間法不起味著有清淨心故無諂曲之直心故始能生解始能信而無疑所以重重申明者以一念中能具難思之德非所易信故二結況衆行二初舉略解一品之功為能況二舉廣聞全經之德為所況今初又阿逸多若有聞佛至能起如來無上之慧但以唯聞說壽能解言下意趣之功尚得不退發起無上之慧而況聞全經者所成之德詎可思議故下科況出聞全者二舉廣聞全經之德為所況何況廣聞是經至無量無邊能生一切種智上舉少聞之德甚大者正欲況出此科廣聞之德愈大也又況有能超廣聞復具種種利他之德者前無上慧是根本智屬自利而種智乃即實之權兼二利矣問台家憑此數節立現在四信今何直廢合彼二三兩信成一節結況耶答持明藏中唯取於信以是祕密故而在顯教則信解雙取故以言為所信言下之趣為所解前云深心須臾信正顯於一念中而有深心好樂即是略解言趣處若以有說力釋言趣者此利他益自在廣聞等句後方況出何必太早二深信解相二初即信名觀二正示觀相今初阿逸多若善男子善女人至其菩薩衆咸處其中此節更明若能深信者功德轉大遂以所未有者准為所有謂若有人於聞我說壽時不唯須生信若更有能念念相續深信者我知此人縱未能依理起觀即此深解明信心中所成之德便可已為見佛常住靈鷲莊嚴土內以此妙心理本自具故可即信以名觀也又須知說壽之時雖在變淨土內及唱散後仍是穢土非因想成而此淨相決不能起也二正示觀相若有能如是觀者當知是為深信解相如是二字乃重指上文正顯觀相也謂若有人既能念念深信復能依教作觀以至想成如上所說之相朗然在目炳現於心當知是為深信觀成則入菩薩十信位矣上須中明信及願今深信中明觀此信願行三法具而十信成六根淨矣二滅後功德二初長文二頌文初五初起隨喜心二況顯持誦三書持益他四兼行六度五諸善功德今初又復如來滅後若聞是經至當知已為深信解相上已分別佛前聞壽功德此下復校如來滅後能於此經發隨喜心及修六度者之功德而有五種皆以後後勝前前以為校量然此五中獨隨喜之功為最劣而特分為廣略兩項其廣明處自在下第六卷首今文且略校直起隨喜心者之德又須知此隨喜心校前信心為劣何亦准同佛世即信名觀者耶以佛滅後時世愈下善根愈弱此經名字尚難得聞則能發隨喜心人非火內之蓮乎又信解相雖性本自具非蒙世尊以不護之尊重口先為懸記加被決難卒起說者須得如來重重准輕為重之意其庶幾乎下四節同有此意二況顯持誦何況讀誦受持之者至作是供養已此以上之隨喜況出能受持讀誦者所成之德又即以此德便准為頂戴如來乃至供養舍利及衆僧何也以經即法身故受持者即同頂戴如來經是能詮如塔能盛故不須起事塔實相是所詮即法身舍利故不須安生身舍利又經文能容第一義僧故不須供相從僧廢事存理所益弘多三書持益他阿逸多若我滅後至及造僧坊供養衆僧上以持誦自利今復教他則功兼二利故校德勝前赤旃檀影前是凡材三十二等影前數尚劣我及之我約形像言四兼六度況復有人能持是經至疾至一切種智理觀為正事行為旁故曰兼行古謂初品至此理觀若熟涉外不妨內事資於道如油多火猛順流揚帆又加功力其勢轉疾運懷甚大能以少施與法界等故德疾至種智五諸善功德二初明德二勸供今初若人讀誦受持是經至三藐三菩提坐道樹下此承上力二諦將融能知理為行本行依理現故得在觀不廢事行雖涉事而內照恆存六種妙德同資淨信又雖生佛後亦同前信漸入銅輪故云趣道場近菩提又近菩提即生如來家矣然如來家有二種一是菩提心家一是真如家今近菩提乃正信將滿入住時也二勸供阿逸多是善男子善女人至皆應供養如佛之塔既能讀誦復具諸善功德則是福慧具足即未來佛若知三世平等則應於彼行住坐臥處亦應起塔如供現佛法而興供養二頌文三初奉持功德二書持功德三總攝衆德今初爾時世尊欲重宣此義而說偈言若我滅度後至經行及禪窟種種皆嚴好不先頌隨喜者以影在六卷初欲廣顯也二書持功德若有信解心至如虗空無邊其福亦如是三總攝衆德二初明德二勸供今初況復持此經至若能行是行功德不可量二勸供若見此法師至常在於其中經行及坐臥持經佛子若肯惠然住此地中則同我佛於此受用無異矣
