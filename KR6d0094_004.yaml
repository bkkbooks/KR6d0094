body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯西蜀沙門佛間勗𠁼大師立科門人智一雪墩拾遺二與作記五百弟子受記品第八此後與下根授記而多發迹顯本者正影張前上中二根中有是結緣已得成就而權現來者如不思議境界經云爾時復有千億菩薩現聲聞形亦來會座其名曰舍利弗目犍連乃至云阿難提婆達多跋難陀等而為上首皆久修六波羅蜜近佛菩提為化衆生於雜染土現聲聞形等問若皆權現則世尊現身説法之益悉唐捐矣答為有真實方用權現若無有真權現何為又論云聲聞人得記者有四種一者決定聲聞二者增上慢三者退菩提心四者應化聲聞二種如來與記謂退大還發心者及應化人若增上慢及決定性根未熟故菩薩與記方便令發心故問應化者心已決定何用記為答若蒙記莂便得增道損生問既品標五百何先記滿慈答以是五百之上首故故應先記由五百乃得記之當機故以名品文三初記滿慈二記千二百三記學無學初二初長文二頌文初二初領解默請二述成與記初二初敘領解二述念請初三初敘領解之由二敘領解之喜三敘領解之儀今初爾時富樓那彌多羅尼子至有大自在神通之力由聞法喻二周之權實及聞授聲聞記而往昔因緣又恍然在目且聞自在神力善超有無而善用權實誠如險路導師是以妙解勃發二敘領解之喜得未曾有心淨踊躍聞所未聞解滿成佛曰得佛知佛見不為分別法愛所障曰淨三敘領解之儀即從座起到於佛前至瞻仰尊顏目不暫捨二述念請二初述念二述請今初而作是念世尊甚奇特至於佛功德言不能宣凡請法有三種儀式一者言請即口中發言也二者念請謂口不言而心作念也三者言念請如彌勒於序中先作念後發言也今即默請也前二周皆發言領解者特由下根未悟事須以言旁激今既領悟是以默請拔出處處等者且如前云爾時所化恆河沙衆生自結緣退大後既世世所生與菩薩俱其拯拔處不能枚舉亦可指前以四喻破四種增上慢人言不能宣者如四子所説之喻不過僅窺一班況我中下又況先以雲雨喻廣彼所不及以顯佛慧之大次復即謂此雲雨譬喻亦但如海之一滴則更顯佛慧之大矣故曰言不能宣二述請唯佛世尊能知我等深心本願為下化故有內祕外現之深心請發迹也為上求故有莊嚴佛土之本願請顯本也或止求記令增道損生也二述成與記二初述成二與記初二初發近迹二顯遠本今初爾時佛告諸比丘至無能盡其言論之辨一否字舉人以示衆也謂汝等雖知滿慈迹在聲聞亦知其本否今欲發迹故先點醒大衆勿被迹覆我常下先發明輔今佛之迹若自轉法輪若助轉皆外現之深心也以説法稱第一是正行亦常句是助行精勤下明助轉也自捨下總顯辨才無礙然既曰捨佛之外無能盡其辨才則不但七方便人不能盡矣二顯遠本汝等勿謂富樓那至常勤精進教化衆生汝等一句因上發迹故此拂迹謂應知滿慈不止於我所能師子吼亦於下正顯其本然論滿慈遠本自是結緣能先成就者因愍同類是故復以同事攝化而弄引也九十億佛所亦第一現證人空也又於下深達法空也能審諦則比觀不謬無疑則斷法愛矣皆謂聲聞亦以迹覆本也以方便饒益者現聲聞身也又化令立者現菩薩身也為淨下結顯本願諸比丘下上明遠本也此下更約三世以顯本迹亦歸於淨佛土之本願二與記七初明因圓果滿二明依報清淨三明正報殊勝四明所依住食五明聖衆功德六結顯無量七劫國久近今初漸漸具足菩薩之道至天人師佛世尊初句明因圓過無下明果滿也即於此土得菩提者以於此轉染成淨之緣最深故於一切法悉能圓明了知故號法明二明依報清淨其佛以恆河沙等至人天交接兩得相見能被之教既廣故所化之境亦大地平如掌者如來三十二相中其第十七相云七處平滿謂兩足及兩手兩肩項中七處悉皆平滿端正而無窊屈故即藉現前之佛掌以示之恐非遠取掌石也三明正報殊勝無諸惡道亦無女人至三十二相而自莊嚴女身為貪欲之本墮苦之源故與三惡道並驅又阿閦佛國雖有女人而無女事不食地肥故得飛行自在四明依所食住其國衆生常以二食一者法喜食二者禪悅食出則聞法生喜入則安禪適悅二者俱能資益諸根大種賾養道胎而成食事故不須段食五明聖衆功德有無量阿僧祗至六通三明及八解脫菩薩衆唯有地上而無地前聲聞衆唯有俱人而無慧人六結顯無量其佛國土有如是等無量功德莊嚴成就前後授記文獨於此章廣顯功德者以説法妙行最在萬行之上故七明劫國久近劫名寶明國名善淨至起七寶塔遍滿其國二頌文二初通舉諸子本迹二別舉滿慈本迹今初爾時世界欲重宣此義而説偈言諸比丘諦聽至衆生聞是者心則懷疑惑小欲樂小也懈怠退大也少欲不貪界內塵境速求出離也厭生死不達生死涅槃本自平等也示具三毒凡夫也示具邪見外道也二別舉滿慈本迹今此富樓那至如是無量事我今但略説二記千二百三初大衆思齊默請二如來次第與記三五百因喜自責今初爾時千二百阿羅漢至如餘大弟子者不亦快乎心自在皆能得觀練熏修四種三昧人也即不動法阿羅漢二如來次第與記二初長文二頌文初二初記陳如二記五百今初佛知此等心之所念至天人師佛世尊初因迦葉總記千二百者以迦葉是第二大師故呼之以為盟證陳如是僧寶之首故別記之二例記五百其五百阿羅漢至盡同一號名曰普明三迦葉梵語如前迦留陀夷云黑光亦云鹿色顏色黑而有光即六羣之一是婆羅門種其性多貪不受人諫住迦尸黑山聚落作諸非法佛因優婆塞來白命阿難同六十比丘往作驅出羯磨二人知之乃同車匿出一由旬外向阿難求懺已還至佛所後因入婆羅門家説法被賊打殺上頌云若我具足説種種現化事衆生聞是者心則懷疑惑黑光於得記後尚被打殺倘不知聖迹難思者不能無疑也優陀夷云出現日出時生故餘名見前二頌文二初頌所記二例記其餘今初爾時世尊欲重宣此義而説偈言憍陳如比丘至壽命劫多少皆如上所説二例記其餘迦葉汝已知至其不在此會汝當為宣説初二句結五百已得記者次二句以亦當復如是句即為例記餘聲聞乃七百也後二句為不在會人令迦葉記者以第二大師即是佛故故令宣傳如來總記之旨三五百因喜自責二初長文二頌文初二初正明二釋成今初爾時五百阿羅漢至頭面禮足悔過自責因喜返責也二釋成三初舉況二立喻三法合今初世尊我等常作是念至而便自以小智為足慶今得悔昔為小智所蔽不悟大法是所應得而返視為分外故如無智之者二立喻二初貧人醉臥不知二親友覺悟如願今初世尊譬如有人至若少有所得便以為足論云第五人者示其過去所有善根令憶念已然後教令入三昧故又云五者散亂增上心實無有定過去雖有大乘善根而不覺知故不求大返於狹劣心中生虗妄解以為第一乘如是倒取對治此故為説繫珠喻譬如已下皆領上結緣意來有人人如五百親友如王子以五百等曾飲智勝法乳故得視王子以為親友家如大乘由王子自發四弘來即住大乘家故言至者如王子以冥加力五百以冥熏力因緣相感得遇覆講會中故如至親友家醉酒臥者酒如煩惱種子醉如依種發起現行臥則如被業縛不起矣官事如度生之公幹殊非私務可比當行如他方緣熟應往不可緩也繫珠而去者親友念其因窘而來既不能久待其醒是故乘醉繫珠而去此如王子候彼除障與記未能且從長夜不覺內乘渠初至之微醒與説妙法令得了因智種成結緣義如繫珠而去然繫有二義一約結緣釋如上二約本性釋謂珠雖本有未知令知即是繫義其人下領前中退意謂初聞法時彼雖具縛由法力故猶有微解微願及王子去後則煩惱仍熾遂致退失起已下領上中間有接小意謂此如我輩雖然退大而由厭苦心生遂令先心所好小根復發宛如臥起為飢寒迫但求衣食隨路而行遑問本土他國而於所求甚大艱難若少有得便足此如捨菩提心凡有所往皆名他國五道求樂名為艱難證小涅槃名為得少要知此處得少一句即將如來中間接小之旨悉該於內看者不可不察二親友覺悟如願於後親友會遇見之至常可如意無所乏短會親友如今靈鷲集會作言如於法喻奪教廢果也我昔下如説因緣也某年日月如指塵點之前衣裏者以在昔聞法未悟雖如醉人但堅種既成還同已繫未合本體如在衣裏汝今下勸貿如因得記而當作佛則萬德斯圓矣三法合二初曠劫大志未失二今會復與授記今初佛亦如是為菩薩時至一切智願猶在不失以昔曾教發大心如繫珠應知珠體有二一經約即理之事以智願為珠故曰一切智願猶在不失南山約即事之理為珠則珠是本有以未知令知未發心令發心為繫耳尋忘合退大既得下合起已因遊行得少也一切句則合今説法華二今會復與授記今者世尊覺悟我等至甚大歡喜得未曾有覺悟合咄哉等我久下説昔緣也以方下超示中接以小也而汝句斥得少為足也世尊下合聞記喜也二頌文二初頌歡喜二頌譬法今初爾時阿若憍陳如等欲重宣此義而説偈言我等聞無上至如無智愚人便自以為足二頌譬法二初頌譬喻二頌法合今初譬如貧窮人至富有諸財物五欲而自恣有將肴膳譬方便教者當知王子所覆講者即智勝所説之法華若因頌中補出肴膳故作是説何妨以肴膳分配覆説及教發心亦不致與正説頓乖二頌法合我等亦如是至及轉次受決身心遍歡喜三記學無學授學無學人記品第九研真斷惑名學真窮惑盡名無學人數共有二千雖同登戒品而所證之位有在三果四向者有已證阿羅漢果者然亦有位屬沙彌而已證無學如羅睺羅者有位列比丘方見道如阿難者品中由阿難與羅雲是衆所知識復是二千之上首又以首出請記故結集者得以名品文二初請記二與記初二初知識言請二二千默請今初爾時阿難羅睺羅至我願既滿衆望亦足因念記而復請記亦應有分引例思齊也唯佛所歸者顯非餘人能知也如涅槃經佛語文殊言阿難事我二十餘年具足八種不可思議是故我稱阿難比丘為多聞藏八者謂一不受別請二不受故衣三見佛以時四見女人不生欲心五法不再問六知佛所入定七知衆會得益八悉知佛所説法彼經復明更具八法稱多聞藏茲不具録故云唯佛也羅雲是佛第二妃耶輸所生所有密行亦唯佛能知故頌中顯出又我下述所請意為滿自願令增道損生並赴他望也二二千默請爾時學無學聲聞弟子至住立一面引例同於二人二與記五初記阿難二記羅雲三記二千四授廣記與現在五授懸記與未來初三初與記二釋疑三增進今初爾時佛告阿難至欲重宣此義而説偈言我今僧中説至於此佛法中種佛道因緣尊者因中以竪窮橫遍之妙慧護持法藏故果號亦依逾高逾深通得自在處而立稱也當供下總明道前道後上求下化之行二釋疑二初八千生疑二如來與決今初爾時會中新發意菩薩至而諸聲聞得如是決八千是初發心修菩薩行人未知諸人遠本是以生疑二如來與決爾時世尊知諸菩薩至其本願如是故獲斯記世尊與阿難同時發心而得果有遲速者以所好不同故既曰同時發心則阿難之發心猶在智勝塵點之前非結緣者可比此本此迹逾難思矣三增進阿難面於佛前至爾時阿難而説偈言世尊甚希有至方便為侍者護持諸佛法大鈔問阿難是佛得道夜生年滿二十始出家至年三十始命為侍者則前三十年如來所説既並不聞何以經初皆云我聞答有四意大為兩節前三帶權後一顯實一是展轉聞或比丘或諸天或弘法菩薩邊聞等二是如來重説以滿初出家三願之一三是得深三昧如金剛華經説阿難得法性自在王三昧故佛昔説皆能憶持四據實者如前所引不思議境介經云復有千億菩薩現聲聞形亦來會座等若準前三義帶權者則今之增進雖亦帶權並欲顯授記有增上力也二記羅雲爾時佛告羅睺羅至欲重宣此義而説偈言我為太子時至安住於佛法以求無上道昔以福慧二足蹈七淨妙華為能得果之因是故果中隨因立號名蹈七寶華果不離因故如來二子一以密行得記一以妄説法空身陷地獄行密行者如來不能惠以三昧謗法者如來不能免其墮苦足見縱使親如父子神力如大聖而於善惡果報皆不能代又羅云自陳密行唯佛能知則今之索記多因同事而設蓋亦密行耳三記二千人二初正與授記二得記歡喜今初爾時世尊見學無學至欲重宣此義而説偈言是二千聲聞至名聞普周遍漸入於涅槃柔軟寂靜則執權之疑皆氷釋矣告阿難與記者其亦護法藏同類也二得記歡喜爾時學無學二千人聞佛授記歡喜踊躍而説偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌四授廣記與現在法師品第十如來在世法王重如來滅後法師重良以道由人弘非師無以續古佛慧命無以開後生知見故極贊其師因法重而安住三德又必法師所當具也然利他必以説法為主自利必以修習為勝當知所主又必修習者始能善説辨中邊論頌謂書寫及供養施他聽披讀受持及開演諷誦與思修此偈明十種法行即十種法師也今文有六而略四十種皆可為世模範皆可稱師如來現身説法至授廣懸二記與現未則垂化之能事已畢過此但欲以斯妙法付囑有在為所急務是故於未説流通前先示持毀所得之報極大極重俾深起敬畏發生好樂進取流通則此一品能為流正二分之關鍵故此品來台家判此下五品為迹門流通分自是一家之談然考一大藏教皆如青光所判三分以為定式並未見有剖一經而為兩重三分者雖華嚴與阿含會會結集篇篇流通應知彼是經中自為建立非離本文外有所加也若謂壽量等品不得抑為流通理實壽量本為求人付囑而顯不流通之是屬而誰歸況顯本原為開迹開迹原為顯本本之與迹其揆一耳苟分為二則迹為誰開本為誰顯又須知如來説法既初中後皆善後奚獨非般若云如人食蜜中邊皆甜旨哉爾時世尊因藥王菩薩至阿耨多羅三藐三菩提前説三周法授三根記於為一類漸機現身説法邊事亦以略周復欲與現未人結當來得度之緣乃以廣懸二記大澍法雨並顯得記者不止於前方稱如來度生本懷托藥王告衆者由此法利深遠即文字是實相非宿學洞達者聞罕不疑故呼而告之亦即以現未衆生寄托傳化意也汝見下先約現前能求之人及所求之願亦異者次如是下明所聞之法雖有多少我皆下正以平等慈普與授記也以一切衆生皆同一性故唯有一乘佛記可與一偈一句顯所聞者甚少下至於法於人今在佛前生一念隨喜心者雖自無法行即此一念之喜正如鑿石火發推而廣之便可燎原將來得果悉不外此故又此一念隨喜人多易忽故下文校量法師功德後於六卷初廣顯隨喜之德五授懸記與未來二初正為微因與記二順顯人法功勝今初佛告藥王至阿耨多羅三藐三菩提記佛滅之後身世俱劣猶能聞能隨喜者則此善根亦自不淺故皆蒙佛記然一念之喜尚蒙懸記況復其餘以法自師者故下明六種法師能以法師人者所得之報不可思議二順顯人法功勝二初能説人勝二所説法勝初二初長文二頌文初二初通明六種法師二別顯説法巨益初二初明持者之福二明毀者之罪初二初具顯少持功德二況顯具持功德初三初明現前六師二明過去殊因三明未來勝報今初若復有人受持讀誦至乃至合掌恭敬此依六種法式自師師人故名法師六者一具信念人名為受持二對本者名讀三背本者名誦四撰集講演者名解説五者書寫六者供養此上六師並依所弘法之多少而分果報之優劣以此經中法利微妙廣大難思故先約持極少之人即得廣大之福難可校量而況能具持者則聞之者安得不深生好樂發流通之願二明過去殊因藥王當知是諸人等至愍衆生故生此人間初明因深愍衆下問此人既具深因何不乘願往生淨土答為愍念等故則現前之功亦大矣三明未來勝報藥王若有人問何等衆生至廣演分別妙法華經若示未來之大果非出諸大菩薩口則不足信故令藥王宣語問現見有人不但一念隨喜亦有能念念隨喜者亦有聞説全經至纍纍者何以不得如是之報答隨喜人若果三業純淨無障此報自屬現在否則屬於後報矣其聞説者試問此人從聞説後便能盡形壽如范儼陸沅課誦無間得生淨土者否更問誦一句者有能如婆子持青蓮華香白蓮華香不雜用心身後口中能出青蓮華者否倘視聞説如行雲流水輩則不可同日語矣二況顯具持功德二初通況六種具持二別況説者一種今初何況盡能受持至生於惡世廣演此經上明持供一句之報已自難思況盡能受持大興供養者所得之報自非界內法所能攝取而仍生於惡世者為愍衆生乘願力而來者耳二別況説者一種若是善男子善女人至於大衆中廣為人説六種人雖通稱法師唯解説者能具自他二利餘五多屬自利是故別顯説者大益故先舉竊説一句被一人者所成之德此人雖生佛後便如具大善根親值佛世上承佛命為如來之使者奉如來之差遣而行如來説法度生之事者一般竊説者尚然何況當衆能廣説者之德二明毀者之罪藥王若有惡人至讀誦法華經者其罪甚重此以經久毀辱無上大聖所得之重罪尚不如於一時以一言罵一博地持經凡夫所得之罪更重者由如來能等觀逆順縱有八風毫末不動獨持經人內具煩惱善根未堅苟因一言之辱浩然發起退屈則斷佛種故其罪轉重二別顯説法巨益藥王其有讀誦至阿耨多羅三藐三菩提故諸佛定慧莊嚴從此經出故持之者即是以佛莊嚴而自莊嚴又此經是諸佛母為佛所荷故持之者心契實相則人法不異亦為諸佛所荷擔矣又既即人即法則凡所趨向即是大法所在因法敬人亦應向禮不但應以人中上供而供即天上寶聚亦應奉獻所以下且約聞者釋所得之巨益正與華嚴初發心時便成正覺成就慧身不由他悟之頓益相等蓋緣此經本具頓旨故下有龍女之速證及一生當得菩提者聞者尚然何況説者二頌文二初頌受持誦説二結示所説最勝初三初勸供持者二兼勸自持三勸供説者今初爾時世尊欲重宣此義而説偈言若欲住佛道成就自然智常當勤供養受持法華者二兼勸自持其有欲疾得一切種智慧當受持是經并供養持者三勸供説者三利説者深因二冀聞應供三少聞大益今初若有能受持至能於此惡世廣説無上法二冀聞應供應以天華香至供養是佛子冀得須臾聞三少聞大益二初校量毀贊二正顯大益今初若能於後世至及與香味觸供養持經者二正顯巨益如是供養已若得須臾聞則應自欣慶我今獲大利二結示所説最勝藥王今告汝我所説諸經而於此經中法華最第一二約所説法勝二初長文二頌文初六初約難信難解顯勝二約住處應供顯勝三約能善行道顯勝四約得近菩提顯勝五約非機難聞顯勝六法師具德初二初約法在佛顯勝二約法在人顯勝今初爾時佛復告藥王至猶多怨嫉況滅度後已説者即法華前所説般若等皆帶方便取信為易今説即同一席所説之無量義以一生無量為易信無量還一為難信故當説即涅槃等所以不及法華難信者以此經是會三之初歸一之始故難信也設將已説該至華嚴亦為易信以彼始成正覺便説一極上根所受不對昔權故為易信藥王下囑無妄授以是佛心之祕密法海之要滙故唯其是祕要藏故為諸佛守護昔不為顯説者由小始教中此平等旨不易言故皆對教顯勝也而此下明如來盛世根熟時成依正俱勝當其正説尚有五千之怨嫉況於滅後二約法在人顯勝藥王當知如來滅後至則為如來手摩其頭心佛衆生原無差別六種法師既叨法廕則與如來衣覆無異又既為本佛所覆亦為諸佛所護者以諸如來本同一心一智慧故是人下明依信願善根所成之德謂妙極法身非具大信力者不能孚解脫勝行非具大願力不能行萬善駢臻非具根本大智者不能導至彼岸如來所止不踰此三故云與佛共宿又既以諸善為身信願為首則蒙如來智手而摩其頭矣二約住處應供顯勝藥王在在處處至阿耨多羅三藐三菩提天竺於如來生處得道處轉法輪般涅槃等處皆為建塔一以求福一表處勝今以此經凡所流通處即應以七寶起塔且當高廣遍興大供又不須安舍利者以此處已有如來全身故蓋碎骨是生身舍利而此經乃法身舍利也然生身舍利固有全碎而法身亦然諸權淺教詮理不足如釋迦之碎身今經唯詮一實有教有義如多寶之全身今於有法身處不用生身者以生身是法身之所流故若有下且將起塔人所得之福置而勿論唯進論得見此塔者及禮供者之功已能高超權淺得近菩提況彼起者三約善行道顯勝藥王多有人在家出家至乃能善行菩薩之道不見此經不具善巧執事迷理多種少穫有得見者始善用心藉事顯理行行契真故舉手低頭皆成佛因世諦流布同歸實相又能見者如生王家貴過臣佐出入自在四約得近菩提顯勝二初約近果標起二約喻法釋成今初其有衆生求佛道者至阿耨多羅三藐三菩提自初住至妙覺總謂之菩提雖有果因之別皆與實相同源然求佛道者必自入住始行人於未入住前倘能得見此經信解受持則不須遠歷塵沙及十千劫自乘妙行得近菩提故知是經正成佛之捷徑也二喻法釋成二初喻釋二法釋今初藥王譬如有人渴乏須水至其心決定知水必近渴乏有二義一以無明熱惱為渴乏一以求佛之信樂為渴乏水如果法平坦無水處即是高原高原之土如教土下之水如果穿鑿如依教所詮之理法而修觀行也然依權教修但有言説都無實義如見乾土依般若等修雖詮實相而無開顯妙旨如見濕土若依今經即直捨方便但顯真實性相雙融理事交徹如水土和而見泥相者真空性水解渴在即雖未即入正定聚中而心已決定不可撼矣二法釋菩薩亦復如是至成就菩薩而為開示初約聞與未聞明去道之遲速所以下釋得近義菩薩有二類謂頓及漸其頓往者已知一切法即心自性不須開顯今云一切者乃指由小入大之二乘及會權入實者之三種若以人該法則菩薩二字應含權小教理行之因及果法以此四法皆須決了故屬此經以此能具開顯之功故然開之一字若對昔言應作二義釋謂廢與會也言廢者如長者宅內所許但有空言故出宅後不見有車以是誘子可廢之方便故如在昔之教理及果皆可廢除故前云其實未得一切解脫此開方便門廢權果也果既廢則教理等俱可廢矣前又云化一切衆生如我等無異此正示真實相也二約會義釋開者由諸子之奔競出宅亦上車之所不廢故前云汝等所行是菩薩道故今開會權行同趨極果即示真實相也是故一切漸往菩薩所有果因並應攝屬此經而為開示不亦宜乎是故此經最為深大非眇目者所能窺最為堅固非具金剛心者不能入最為幽微即不退人亦不能知最為遙遠縱過三百由旬猶不能到今佛為化權小而成真實菩薩始為開示説此法門如須水者先令見泥俾無疑意決定進取五約非機難聞顯勝藥王若有菩薩至當知是為增上慢者六法師具德二初設問二自答今初藥王若有善男子至説是法華經者云何應説二自答三初示所具德二遣人聽護三現身重説今初是善男子善女人至及四衆廣説是法華經衣座室三名為三軌末世弘經必藉此三乃獲二利如來以慈悲名室者菩薩妙行必先以衆生為所緣境故攝生是成佛之本若能令彼離苦得樂處即是惠利歸己時也故大慈悲室不獨自覆亦復覆物矣又如來以柔忍名衣者由內用柔和覆除二障外以忍辱遮諸暴惡使不得入則內心寂而外境亦融矣又如來以法空為座者須亡諸相否則著我人等執不能深契實相是故菩薩安住此中能所兩忘方堪弘化然須以不懈怠心遍䇿善法庶可廣弘斯經矣二遣人聽護藥王我於餘國遣化人至阿修羅等聽其説法説法者須六種成就故遣化人揄揚其德而為集聽法之衆又來聽者若見諸化隨順不逆亦生效法心矣三現身重説我雖在異國至我還為説令得具足令見令聞皆世尊因法重人拳拳不捨之意也二頌文三初頌説法勝二頌法師具德三結勸勝益今初爾時世尊欲重宣此義而説偈言欲捨諸懈怠至當知此人等近於佛智慧二頌法師具德若人説此經至諸佛護念故能令大衆喜三結勸勝益若親近法師速得菩薩道隨順是師學得見恆沙佛第三開近顯遠拂迹入實令廣流通分共十八品諸經正宗皆藉現前因緣發明當會之理事便已其流通分亦不過贊當經詮旨微妙顯具勝益發四衆之信樂令廣流通今經不然於正宗中祇以開顯妙義演為三周要將一代聖教中凡為一類先小後大之機所設方便之教悉使開除令見真實既破昔三而復依本具之一性融攝三乘別立今日一乘之實教是以正宗文雖九品而義則總攝諸教所以此下流通品多十八言溢數萬校正宗而返廣者須知此文能通為在昔權教及一切枝末法輪作開顯流通寧止為一經耶又正宗內雖已快談四十年來所蘊之本懷然於一期設化種種權現之迹尚未暇開顯故今於流通中一拂前迹使返觀在昔所見者多屬權現則不唯拂本師捨釋宮之近迹顯久成之一端又亦不唯拂法華已前之迹即正説三周時因無暇於拂所帶之方便今並拂矣且如四子於聽説因緣時雖悟久遠接引安知不即以大通為至極故藉塔湧為流通之始此後逢迹便拂令悟玄門擴其廣大知見俾興大願流通務令此經付囑有在而後已是知流通文字雖多殊不厭也茲將因流通所有拂顯之旨略泐數端以彰性相無礙理事交徹之旨使不滯於權迹謂如多寶塔從地湧而於地兩不相妨則拂地大有礙之迹而顯法性之融通淨土三變則拂實有穢土之迹而顯佛土之本淨移無緣於他方拂諸善類自矜與佛同時之迹召龍女從海湧顯凡有妙信即具超升之路拂微類可輕之迹光集分身拂娑婆一化之迹而彰妙應之普周多寶分座拂生滅隔世之迹融古今於一致記唱調達拂實有逆順之迹並顯本師亦因經功速證之實文殊海湧拂一定之化迹使知聖應能具隱顯並呈之德又既經變淨復見海湧者拂淨穢水陸之分限顯土體重重於無礙也又地湧傳持顯妙化之竪窮以拂上下之懸隔中間取滅拂因燃燈得記之迹顯道成之久遠更拂入塔唱滅之迹以顯法身之常住分別功德顯一念聞法頓超以拂權乘之階差六根互用不離生身顯此根身原非一六而有能一能六之德此外隨文復有妙義智者詳之文二初廣顯流通二總結流通初四初求人付囑即寶塔品二驗法希有即達多品三海衆傳持自持品至囑纍品四弘經軌式自藥王品至勸發品初中二初長文二頌文初三初多寶湧贊二集身開塔三正求付囑初五初塔湧之相二八部供養三多寶贊證四大衆疑問五如來答釋今初見寶塔品第十一此品已下皆屬流通由前法説而喻喻已復引往昔因緣普令三根皆得受記則經初以放光為發起一段因緣已結局矣但流通此法非得其人不堪付囑又非湧古佛集分身則莫可憑故自唱滅求人至現身囑纍而後已其國王求法龍女成佛所以驗法希有也校量展轉至第五十顯依此經所有極微之功德已自難思而況六種法師又不輕之未聞此經前不善行道及得聞後始能善行菩薩道方感虗空開口不使輕毀墮苦然後現神付囑令法有在其末之六品皆大菩薩弘通之實踐不區區於章句也問此下諸品若俱判入流通曾有據否答會玄第七問如法華三變八方嚴淨圓覺佛地等經皆居淨土中説豈非平道教耶答以少從多故又法華正宗分但是娑婆木樹草座説至流通欲容分身佛始變淨土然亦有分限等詎非證耶爾時佛前有七寶塔至七寶合成高至四天王宮顯塔涌之相也蓋法會於正宗已悟實相深知諸法皆為一性所融悉歸常住無礙故以親證之人所住無礙之境而先示之使發大願流通言無礙者情謂塔與地大均屬質礙今由幻色不自礙不自壞當體即是真空故涌現時兩不相妨於虗空中朗然安住又此妙塔與我本師原未曾離今為流通緣熟是以不現而現自非神力之所使耳二八部供養三十三天雨天曼陀羅華至恭敬尊重讚歎三多寶贊證爾時寶搭中出大音聲至如所説者皆是真實初贊能説之人由本師於五濁不可説處而説且所説者乃一乘平等大慧難信之法又復為衆普説誠為希有故極口連贊也如是下證贊所説之法謂前所説若開若顯若廢若立不涉方便皆是真實誠了義之談也四大衆疑問爾時四衆見大寶塔至又於其中發是音聲因值未曾有之事故發未曾有之喜自應怪有所問問意有三一問何因有塔二問何故從地湧三問何故有此音聲五如來答釋爾時佛告大樂説菩薩至讚言善哉善哉先答第二問由彼佛因中發願今於道後湧塔者蓋滿本願也彼佛成道下答第一問何緣有塔緣彼佛遺命所製也釋論謂多寶在世未説法華故命建塔涌説經處隨喜作證其佛下答第三問為作證明故發是聲問正説經此塔與佛尚在東方何言得聞答遠近分限俱屬情境若過量人則無邊剎海不隔毫端二集身開塔二初放光召集二與欲開塔初中五初求見多寶二放光遠召三諸佛欲來四變淨國界五諸佛普至今初是時大樂説菩薩至我等願欲見此佛身言以神力者由樂説求見乃發起種種廣大佛事如本師久遠成佛之底蘊悉緣此請掀翻若非上承佛加何敢作此大師子吼二放光遠召三初承願當集二大衆亦求三正放光召今初佛告大樂説菩薩摩訶薩至今應當集多寶來聽之願凡欲以身示者必先集説者之分身若進論之説法華既不止一佛而分身又豈獨迦文倘分身亦説而本師亦應集彼似亦分有主伴圓明義然屬文外二大衆亦求大樂説白佛言世尊至世尊分身諸佛禮拜供養三正放光召爾時佛放白毫一光至所照之處亦復如是光中所見唯約一類淨土言者自是會衆破五濁後更發大心者所應生之佛土或是如來滅後得羅漢果應生此中發菩提心人所生之土又復應知本師稱體起用所有分身自周法界染淨雜居今但召此與會衆有緣者之一類故且約五百言三諸佛欲來爾時十方諸佛至并供養多寶如來寶塔下明八方變淨今言十者舉成數也四變淨國界時娑婆世界即變清淨至諸天寶華遍布其地淨穢之相雖虗非承佛神力不能撤其迹以顯其德諸天人既得與佛同時同處而生正可進見三佛得聞壽量而返被移者足知微善不足恃當深種見聞之善根可也佛之神力尚可毛吞巨海塵含法界今由一變而至於三自應有所表示故上三根既有三番悟入是以依報亦應見有三番變淨古云三變者變心也倘無所表則見不能容復更變者即於諸佛現量用事之旨違矣五諸佛普至爾時東方釋迦牟尼至諸佛如來遍滿其中二與欲開塔二初致訊開塔二開塔見佛初二初遣使致訊二致與欲辭今初是時諸佛各在寶樹下至以此寶華散佛供養生佛本同一體故以慈悲化世若衆生受化少病少惱如來亦少病少惱氣力安樂亦然致訊致供皆順世儀也二致與欲辭而作是言彼某甲佛至諸佛遣使亦復如是與欲儀例如律制凡僧作法事衆必同集若有因緣身不能到令索欲者送心達僧知其不違其辭曰大德一心念某甲比丘如法僧事與欲清淨今諸佛身雖同集非得心同未便開塔以故致欲二開塔見佛二初佛升開塔二衆見全身今初爾時釋迦牟尼佛至如却關鑰開大城門開塔可表開權見佛可表顯實又前贊善可表證前今開塔可表啓後從座起住空中者正顯色空一如兩不相礙是以文中絶不言神力也二衆見全身即時一切衆會至及釋迦牟尼佛上二善雙贊人法也快者恣爽意謂一向昧爽今得快其性矣説是悅意謂快悅所懷也近則快悅四十年前所有蘊積遠則無量劫前三正求付囑三初古今共座二大衆升空三唱滅付囑今初爾時多寶佛於寶塔中至坐其半座結加趺坐多寶是古佛釋迦是今佛却共一座坐生公云古今通始終同窮本極末浩然大均既同一際則生滅之迹俱不可得矣二大衆升空爾時大衆見二如來至接諸大衆皆在虗空大衆之中雖有於神力得自在者如未上承佛勑何敢自升故求也三唱滅付囑以大音聲普告四衆至妙法華經付囑有在世尊入塔即唱滅付囑者以前於正説中開權顯實委明唯有一乘之旨法會已悉如來降靈之本懷矣此外惟欲大法流通是其所急然大衆雖知釋尊一降之懷猶未免尚被捨釋宮之近迹覆却遠本故藉唱滅求人而召下方令其生疑然後開近顯遠以拂此迹此則唱滅付囑一事鈎鎖前後矣有在者佛在世時此法在佛佛若滅後饒益未來非先得其人則法將誰付故求之誰能能者應須及時發願我及諸佛當與證盟知法有在二頌文二初舉古今勸勉二勑發願付囑初二初舉過去多寶勸勉二舉現在分身勸勉今初爾時世尊欲重宣此義而説偈言聖主世尊雖久滅度至在在所往常為聽法二舉現在分身勸勉三初諸佛來意二嚴土待來三喻顯集相今初又我分身無量諸佛至令法久住故來至此二嚴土待來為坐諸佛以神通力移無量衆令國清淨三喻顯集相諸佛各各詣寶樹下至以是方便令法久住二勑發願付囑三初以發誓勸二以難事勸三結嘆能持今初告諸大衆我滅度後至今於佛前自説誓言二以難事勸三初諸佛證知二問誰發願三舉易顯難今初其多寶佛雖久滅度至所集化佛當知此意二問誰發願諸佛子等誰能護法至多寶如來及諸化佛三舉易顯難諸善男子各諦思惟至若有能持則持佛身佛藏經云譬如有人嚼須彌山飛行虗空石筏渡海負四天下及須彌山蚊腳為梯登至梵宮劫盡燒時一唾劫火則滅一吹世界頓成以藕絲懸須彌山手接四天下雨雖則如是亦未為難如來所説無相無為無生無滅一味大乘平等法相令人信解是則為難此與今文舉易顯難文相相類結云則持佛身者前謂有此經處不須復安舍利此中已有如來全身舍利故云則持佛身三結嘆能持諸善男子於我滅後至一切天人皆應供養初明能持者則諸佛歡喜是則下名能持者即成勝行得自利佛滅下顯化他之勝行也二驗法希有二提婆達多品第十二提婆達多云天熱以初生時人天等衆心皆驚熱故亦云天授以父母從天乞得故本大菩薩權現逆行為懼惡人令不起惡餘緣如別文二初明求法甚難以驗希有二明成佛甚易以驗希有初中三初明多生求法無倦二明一生求法無倦三明聞品離苦得樂今初爾時佛告諸菩薩至身肉手足不惜軀命先總明長時求法無倦於多下歷明多生作王所發之願為欲下明所行之行而獨約施度言者以施能攝於六故又多作王者以於寰中得自在易於化物故二明一生求法無倦四初求法得師二結會古今三歸功於師四授成佛記今初時世人民壽命無量至欲重宣此義而説偈言我念過去劫至遂致得成佛今故為汝説若能達富貴如浮雲過眼則不以萬乘為尊祇知道德實有利益故以求法為所重時有下明因求得師其不違二字乃事師之實也然以王力尚須勤求方得足見此法之希有又以一得之後即能速至果地更見此法之功力極為殊勝希有阿私云無比二結會古今佛告諸比丘爾時王者至今提婆達多是三歸功於師由提婆達多善知識故至皆因提婆達多善知識故善惡皆有知識而天授則以一人總之者由煩惱即菩提故是故順行逆行而天亦莫測四授成佛記告諸四衆提婆達多至發菩提心至不退轉於過去世以順行持經現在以逆行持經共成佛因故蒙記莂三聞品得益佛告諸比丘未來世中至若在佛前蓮花化生能不疑達多順逆之迹則道眼清明了了見佛性矣故楞嚴云聖性無不通順逆皆方便二明成佛甚易以驗希有五初智積請還二如來制止三文殊湧現四所化無量五龍女速證今初於時下方多寶世尊至白多寶佛當還本土證經法事既竣自應請還二如來制止釋迦牟尼佛告智積曰至論説妙法可還本土制止者以釋尊之遠本尚被近迹所覆故託文殊以留三文殊湧現爾時文殊師利至共相慰問却坐一面此節文有二意一若如常儀大士於會初問答竟文中應有辭佛遊化一節或由貝文未全至故闕二若無此文即祕密隱顯之妙用也謂大士之身本周法界故會初問答竟雖未離法會而却即顯而隱已在十方及與龍宮今在龍宮本未離跬步亦復即顯而隱仍來靈鷲若隱若顯乍來乍去並是妙用隨緣而本體實未曾動此拂化緣一定之迹彰隱顯之妙用也又前變淨時已無山海今復云海云山者由能依之正報既隱顯隨緣故所依之土亦顯重重無礙之自在矣當知善根深者則見變淨之相無緣者縱不被移亦不見淨乃有證無礙之境者得於大海湧現夫地大水大同是藏性循業所現若實有自性即具大神力者亦何能變特緣性相本來無礙鎔融是故淨土宛然不礙山海宛然故令水陸分限等迹皆不可得四所化無量二初數問證答二贊問法答初中二初問所化數二湧證結答今初智積菩薩問文殊師利至所化衆生其數幾何二湧證結答文殊師利言其數無量至於海教化其事如是指事現證也二贊問法答三初偈贊二偈問三法答今初爾時智積菩薩以偈讚曰大智德勇健化度無量衆今此諸大會及我皆已見二偈問演暢實相義開闡一乘法廣導諸衆生令速成菩提以初句問説一次句問開三若説三則有廣利之益若説一則有速證之益三法答文殊師利言我於海中唯常宣説妙法華經以彼海中多是乘急戒緩之流故五龍女速證二初重問直答二湧現釋疑今初智積問文殊師利言至志意和雅能至菩提文殊直以龍女答所問者由龍係畜類已非善品況是龍女況是女中之小者今由一聞此經便得超證可與地獄天子兩相頡頏此經功之希有為何如則八難之性皆空矣二湧現釋疑五初智積執疑二龍女贊證三舍利執疑四龍女速證五結釋衆疑今初智積菩薩言至於須臾頃便成正覺漸教中自凡夫地發心至成佛皆有一定時分今經分屬於頓故龍女持之即得不立階差頓證不退二龍女贊證二初偈贊二請證今初言論未訖時龍王女至却住一面以偈讚曰深達罪福相至一切衆生類無不宗奉者權教罪福皆有定相以不達罪福之性俱同一際故生疑也贊深達者謂世尊福相也我龍女罪相也唯世尊能了二相平等不隔纖毫恐翳眼為相所迷故先贊達者又權謂法身無相四八皆是化之所具今經以三身俱融故得相即無相無相即相涅槃云吾今此身即是常身二請證又聞成菩提唯佛當證知我闡大乘教度脫苦衆生三舍利執疑時舍利弗語龍女言至云何女身速得成佛此執小疑大也初約懸曠明難信二約具障明難信大愛道經亦載五障之説身子會初已得入佛知見今示有此疑者似為疇昔同類設也四龍女現證四初舉事校疾二現前速證三法會遙禮四兩土獲益今初爾時龍女有一寶珠至觀我成佛復速於此言復速者龍女以珠獻佛佛即受之初無推却留難然猶有剎那此彼授受之間必不如於一身在一念間成佛之疾故云復速於此故以成佛之時校獻珠為更速不必表法二現前速證當時衆會皆見龍女至一切衆生演説妙法上因分屬於頓故令異類一介之微即超地位階差具菩薩行乃依漸出頓亦被接意也又今以分屬於圓故令龍女依第一義空森羅萬象捨身受身現相成佛此則泯相而相不存故捨女身又以泯相而相不壞故現佛身亦佛事門中不捨一法之圓義乃依頓現圓也三法會遙禮爾時娑婆世界菩薩聲聞至心大歡喜悉遙敬禮四兩土獲益無量衆生聞法解悟至發菩提心而得受記古謂南方緣熟宜以八相成佛私謂成佛者恐不當以八相槩論一切試問龍女有何八相五結釋衆疑智積菩薩及舍利弗一切衆會默然信受始信妙法希有非權小所能窺故能持者雖微類如龍女亦已驗當下即證菩提矣故下會衆齊發大願赴佛所求三海衆傳持二初本下兩方傳持二如來神力囑纍初二初本會傳持二下方傳持初又二初能持人二所住行今初持品第十三此因如來入塔唱滅求人付囑並聞世尊往昔求法之難及見龍女持經成佛之易況今妙法在前不勞更求是故大衆生難遭想發願傳持令法有在故品以持目文二初自誓受持二兼順佛意初二初菩薩持二聲聞持今初爾時藥王菩薩摩訶薩至種種供養不惜身命五濁弘經非以藥王為首不能廣令離苦得樂故先發願傳持菩薩以藥王立號者以所持之妙法全成能持之人是以即人即法能令見者聞者不但身心兩病皆除且令得大法樂則於法藥得大自在矣然雪山藥王樹固亦能療見聞者之病不過在身便已奚能如大士之普療身心兩病二聲聞傳持爾時衆中五百阿羅漢至於它方國廣宣此經為引初心及開安樂行故作是願恐非實不能也波闍波提即憍曇彌云尼衆主二兼順佛意二初長文二頌文今初爾時世尊視八十萬億至在於它方遙見守護不用言而以目視者由前殷勤勸發已極故今但以目視而默勸也二頌文二初發願弘經二請證於佛初二初略標二廣釋今初即時諸菩薩俱同發聲而説偈言惟願不為慮於佛滅度後恐怖惡世中我等當廣説諸大士聞此法之妙是故上順佛意下滿本願出而弘傳然非得衣座室三為惡世弘經之芳軌詎能作師子吼云當廣説二廣釋二初恐怖惡世二廣説此經今初有諸無智人至念佛告敕故皆當忍是事初一頌通明無智愚人是所忍之境我即能忍之人惡世下別列所忍先一頌明慢心次八頌半細陳假阿練若三業之惡以此輩極易於誑惑愚夫故阿蘭若云間靜處或云無諍無諍有二一以三昧力將護衆生令不起諍惡心二隨順法性無違無諍汝等皆是佛句即阿練若以重為輕嘲調持經之人以滿毀嫉之惡心濁劫下三頌忍惡口也世尊下二頌忍擯出也共十六頌皆以忍難持經為言是故下文請安樂行也二廣説此經諸聚落城邑其有求法者我皆到其所説佛所囑法二請證於佛我是世尊使至發如是誓言佛自知我心
