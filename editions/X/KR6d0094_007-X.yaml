body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯西蜀沙門佛閑勖𠁼大師立科門人智一雪墩拾遺二以往來持經妙音菩薩來往品第二十四品末結云說是妙音菩薩來往品時四萬二千天子得無生忍等則此菩薩以身業往來之威儀能令法會於見聞時得饒益處便名持經法式又於四種攝事中示隨類形同事身名為持經又前品以身輪之苦行持經今則不但以身輪現隨類形更以身業之來往作流通無盡之軌範品故次來文二初如來光照妙音二妙音來往益物初二初照國二照身今初爾時釋迦牟尼佛至白毫光明徧照其國大人相者乃指大人所有福報奇狀炳著處以名相也菩薩本行經佛為淨飯王略說相好云佛生人間示同人相故說三十二相勝諸天故說八十種好為諸菩薩說八萬四千諸妙相好佛實相好我初成道於寂滅道場為普賢賢首諸大菩薩於雜華經中已廣分別等俱舍論說輪王雖有三十二相而有三義不及於佛一處不正二相不圓三不明了為菩薩說八萬四千者約果相明也由因中斷八萬四千煩惱成八萬四千波羅蜜獲八萬四千相好今經指三十二相中肉髻者乃即法報之化身凡聖同見之佛相也若校量者善生經云一切世間福不及如來一毛功德一切毛功德不及一好功德一切好不及一相一切相不及白毫白毫復不及無見頂相所有功德非無上士不能具故名大人相然無見頂即是肉髻故應持求見不能經初止放一光者欲三乘人捨諸方便直乘一乘慧光以為成佛真因而終趨於無上智光妙果茲欲顯持經妙因即徹無上果地是以二光齊放用表果因交徹之相皆在妙音一種流通境內二照身爾時一切淨光莊嚴國中至釋迦牟尼佛光照其身此下敘能流通者乃可雙被果因交徹之照初明值多佛是得二嚴之由而悉一句顯慧深也得妙下顯福廣也古謂十六三昧即法華三昧之異名若果然者何以結云得如是等百千三昧耶明明體異用別方各用名以召之又若是一何必枚舉況更有法華三昧名亦雜於中耶此下釋名一本智度論百八三昧名下義釋之但此彼名字略有參差而必於甚相符者取之並不敢雜以臆見如妙幢相三昧似彼畢幢相三昧因其必定微妙方顯尊勝謂菩薩住此三昧則能決定持諸法幢於諸三昧最為尊勝譬如大將得幢表其尊大之相故法華三昧似彼攝諸法海三昧謂菩薩住此三昧則三乘法皆攝入是三昧中如一切眾流皆歸於海故淨德三昧似淨妙華三昧謂菩薩住此三昧於諸三昧中開功德華以自莊嚴如樹華開樹自莊嚴故宿王戲三昧似滿月三昧謂菩薩住是三昧則淨光具足滅愛恚等火自在滅障即游戲意清凉功德利益眾生譬如秋月圓滿破暗清凉可樂故無緣三昧似無心三昧謂菩薩住此三昧則心心數法悉皆不行智印三昧似寶印三昧謂菩薩住此三昧於一切三昧悉能印證然諸寶中法寶為最今世後世乃至涅槃能為利益解一切眾生語言三昧似入辨才三昧謂菩薩住是三昧則能辨說一切三昧悉知眾生語言次第及經書名字等集一切功德三昧似集諸功德三昧謂菩薩住此三昧則能修集一切善根功德初夜後夜無有休息譬如日月運行不停清淨三昧似寶斷三昧謂菩薩住此三昧則能斷除一切三昧諸垢如有真寶能治諸寶令得潔淨禪通游戲三昧似師子游戲三昧謂菩薩住此三昧於一切三昧中出入遲速皆得自在於諸外道強者破之信者度之如師子游戲時而能制伏諸禽獸也慧炬三昧似然炬三昧謂菩薩住此三昧則能然慧炬照明一切諸法無錯無著如然炬夜行不落險處莊嚴王三昧似大莊嚴三昧謂菩薩住此三昧則大莊嚴成就見十方世界以七寶花香莊嚴佛處而心無所著淨光明三昧似淨光三昧謂菩薩住此三昧於諸三昧光明清淨諸煩惱垢皆不可得淨藏三昧似無盡三昧謂菩薩住此三昧能滅諸法無常等相即入不生不滅真實之理滅諸相淨也入真實理藏也不共三昧似妙行三昧謂菩薩住此三昧不見諸三昧有二相即是畢竟空相應三昧一切戲論皆不能破日旋三昧似無住處三昧謂菩薩住此三昧不見諸法有住處可得釋迦下一句正明被照問何以照人照國皆云果因交徹耶答白毫內具現世尊修因之相者示因分可見也肉髻是無見頂顯果分不可見今並照於依正者乃事理無礙門中照明因果交徹之相令弘通人發大勇猛謂能持者即得坐道場也二妙音來往普益三初發來供訊二大眾獲益三還歸本國初六初辭佛現相二承命發來三供養問訊四求見多寶五昔修功德六現住三昧今初即白淨華宿王智佛言至甄叔迦寶以為其臺辭佛並求見文殊者先廸隨往者之景仰也又彼佛誡以莫輕者亦寄妙音申飭隨往者也何則妙音乃法身大士雖知塵剎圓融隱顯自在第恐未了緣生如幻法無定性輩以彼最尊嚴之依正忽見極卑劣之佛土能不妄生二解何以蹈此淨穢一如小大無礙平等之域而聆平等大慧之法故寄能將預誡所將也妙音下領旨也我之往彼皆是如來道力所加神通所使福慧所嚴安敢復生高下之心於是下示將發來之軌式先令此土見瑞生疑大啟渴仰以作受益之本閻浮檀金閻浮樹名生於河邊提上故曰閻浮提言金者由此樹果汁入河染石成金其色赤黃兼帶紫𦦨校人間金勝千百倍甄叔迦云赤色寶西國有甄叔迦樹其花色赤形大如掌寶色似之故名慈恩云狀如延珪似赤琉璃二承命發來四初決現相疑二文殊求見三多寶為現四正為發來今初爾時文師利法王子至亦欲供養聽法華經二文殊求見文殊師利白佛言至彼菩薩來令我得見等覺大士尚欲求見餘人能不大生渴仰此亦文殊善弘經處與前求見文殊意雖等而皆各益己眾也三多寶為現爾時釋迦牟尼佛至文殊師利法王子欲見汝身釋尊以現相之功推歸多寶不獨見其謙光可掬逾深法會之願樂矣四正為發來於時妙音菩薩至而來詣此娑婆世界耆闍崛山法身大士尚能以一身充滿法界全無來往之跡今從彼至此而有存沒者正應以身業之來往威儀得度者於現威儀處即名弘經也又所經諸國既皆現瑞則於得見菩薩時諒不虗度矣古引天竺有青蓮華其葉修廣青白分明有似於眼前云目如等那羅延涅槃疏翻金剛晉言鈎鎖或云堅固或云力士三供養問訊到已下七寶臺至安隱少惱堪忍久住不妙音以四萬之巨身禮丈六之微軀猶云頭面頂禮奉上瓔珞總不見其迫迮者正拂小大之迹而顯法無定性之實德東坡云丈六金身不為大方寸千佛夫豈小亦能作此平等之見如來現身人中示同人法故有九惱十緣皆以善巧方便令諸眾生知善惡業因必有苦樂果報故此彼相見時所有禮儀法應如是若論如來已離一切障礙成就無量諸勝功德安有如是業報之實然非已融隱顯一致者亦不能作此問四求見多寶世尊我今欲見多寶佛身至故來至此釋尊雖還靈鷲多寶仍在虗空非承佛加何能輯見高遠是以求也爾時下釋尊為通時多下多寶敬順所請即於塔內贊善而答便可名見古謂溪山各別雲月是同固自可通但或者謂何以閉戶之答便筭得見今則據經直為剖示法華功力叵測但能持者無問地前地上悉得六根清淨圓融而器世間亦隨超越以同一緣起故是以於一根內即具六根之用耳獨非眼乎聲塵獨非色乎正不必在色見聲聞上作理會也思之五昔修功德三初引昔二結會三指廣今初爾時華德菩薩至今生淨華宿王智佛國有是神力初問功德二問神力昔奉伎樂寶鉢今於華報上故令天樂自鳴法器恒隨雖是等流果報亦無作妙德之所使也二結會華德於汝意云何至今此妙音菩薩摩訶薩是三指廣華德是妙音菩薩至百千萬億那由它佛此上總以所植德本答初問也六現住三昧二初舉三昧用二釋三昧名今初華德汝但見妙音菩薩至智慧之力其事如是此下明三昧用即是答神力而有兩節初明於娑婆內現六凡身弘經但言救濟者由彼正在沉淪受苦尚且不暇何由能解佛之智慧下明內德充而外用足故於神智皆無所損以隨類形隨類音隨其所欲而接以隨類法門故曰各得所知於十方下約現四聖身弘經然初文明於娑婆現六凡今於十方明現四聖皆行文之巧此彼界內未嘗不互現也統而言之所現之身固有種種而弘通之教則維一法華又須知未甞不先以一法作種種說然後攝種種還歸於一二釋三昧名爾時華德菩薩白佛言至能如是饒益無量眾生古注謂三昧與陀羅尼體一而用異若准起信云八地得三種世間自在色性隨心無有隔礙九地善知眾生十種稠林得四十種無礙辨此約色心分八九二地之優劣又唯識謂八地能任運現金等諸相及土九地得四無礙解以析淺深非無有異又須知妙音所住三昧雖亦名現一切色身與被益者所得應有不同以妙音是等覺人於諸三昧已能深入無際豈法會初得者所能比二大眾獲益說是妙音菩薩品時至亦得是三昧及陀羅尼此彼兩土皆獲益者原先見華瑞已發勝解不可引轉繼以妙法印心故得定慧雙融經文欲辨定慧體異故於陀羅尼上三昧之下加一及言三還歸本國二初復本佛命二重結普益今初爾時妙音菩薩摩訶薩至得現一切色身三昧來往所經國內之眾於兩番見聞瑞相時豈無傍益在文不顯昔我佛光照彼國亦應有傍益文亦不顯而意則不無二重結普益說是妙音菩薩來往品時至得法華三昧諸天子見妙音於所證妙圓體內示來往相說寂滅法令見聞者廓悟一切幻相雖生非生滅亦非滅於實相無相本來不動之旨了了於心故曰獲無生忍而華德又於妙音百千三昧中見其能以一身現種種身以一法作種種法說調伏眾生待至善根成熟復攝種種還歸於一揆厥所由並不離法華三昧一種妙用之內於是攝權歸實不作二相頓悟法華三昧矣三普門持經觀世音菩薩普門品第二十五此繼前品來者緣妙音雖以來往威儀及色身三昧弘經此方但事僅七支何似觀音以如雲如雷圓融無盡之三業統太空為一普應玄門被正報則上至聖賢下及蜫虫極乎中陰於依報則地水火風但有色有聲可馮悉是大士解脫樊籠處故於所被總不分善之與惡逆之與順能感與不能感者齊萬化於一致皆不在普門設化之外且如七難中稱名得無畏者大士之口輪冥加也二求中以禮拜得遂者大士之身輪冥加也三毒等中以念敬得遠離又超勝多名者大士之意輪冥加也以此化法寧不校廣於前故次來也又即此中雖未現身說法而令百千苦惱同得無畏者正約普門人以顯普門法故不須於色於聲以人即法故下三十二應則又以普門法顯普門人所以用及色聲以法即人故而化被亦廣於前問以何為普門法答權淺教中則曰名無得物之功物無當名之實名之與實互不相蒙若夫今經則實相觀照與文字雖三而一舉一即三大士聖號詎非般若乎唯其即是般若是故含弘廣大一多平等此彼無礙萬德瑩然以見大士甚深行處亦非一生所繫菩薩不能徹其底蘊與言佛便週義正等無異此即普門法也要知大士以普門法融入法界故令有緣及無緣者皆得離苦自然而然有一自性觀音住無畏地救度九界眾生品名觀世音普門者乃以人法雙題品名也今先釋人次釋法人名觀世音者如楞嚴無畏章云一者由我不自觀音以觀觀者令苦眾生蒙我觀其音聲即得解脫故觀音名遍十方界若今文則由苦惱眾生一心稱名菩薩觀其音聲而得解脫名觀世音竊謂二經唱名雖同而意則各有所重楞嚴則謂由我蒙我方得脫苦重在能應上名觀世音今文雖曰脫苦似貴在一心稱名上而意實雙取感應道交之旨名觀世音則觀是大士之能應而世音乃眾生之能感感應合顯故曰觀世音次釋法者謂普門即是大士所證實相般若之體與用謂普即竪窮橫遍之體門即藉出入無礙義以喻大士之顯加冥加皆從無作妙用流出及眾生之顯感冥感皆因投入無作妙用之內始能脫苦則普門二言雖是體用一對亦是法喻一雙九界眾生除此一門別無岐路證解脫道故曰普門若更略釋者則觀是大士寂照雙流權實無礙之智斷惑證真因此自利拔苦與樂因此利他復由此觀絕偽離垢含弘盡際泯同愛畏故下偈中各從厥德而立五觀之名以見大士弘通導利之廣故目曰觀世即器世間眾生世間智正覺世間此皆大士所化之境也音即所被亦即能感之機而有二種謂音聲與心聲也若大士以同體慈現三十二妙容說十九尊教而與其樂是為顯應冥感心聲之機若大士以同體悲遍施無畏而拔其苦是為冥應顯感稱名之機也究大士之妙應如月在天有水皆映了無此彼機縱無感亦未甞捨正猶杲日麗天不為無目而捨明照是故異音殊感皆能漸拔三乘權人此能頓收故合稱曰觀世音菩薩普門品文三初長文二偈文三結益初二初初番問答二二番問答初二初問次答今初爾時無盡意菩薩至以何因緣名觀世音文有兩番問答初問人次問法初能問人名無盡意者華嚴十地品說初歡喜地菩薩發廣大如法界之願以十無盡句而得成就若此十句有盡我願乃盡以此十句無盡故我之大願亦無有盡十無盡者謂眾生界無盡世界虗空界法界涅槃界佛出現界如來智界心所緣佛智所入境界世間轉法轉智轉無盡也此菩薩於登地初即緣此十以立名故曰無盡意將顯普門法而以無盡意發起者正顯能問所問與普門法同歸於無盡也次答三初正答所問二兼示禮念三舉他校勝初二初總示二別示今初佛告無盡意菩薩至即時觀其音聲皆得解脫由大士與眾生同一悲仰復由即人即法故先約人顯法不用身面言說即能拔苦萬億機得解脫總顯應之普感之眾也然持名成感者夫大難一作卒然臨頭其愴惶求救心中自不暇論念心之理與事今即以此現前一心持名聲中便已總攝六根盡該三業進為能感之機退為脫苦之本使此將危之身轉作一心持名之念由其念念相續不被有苦當前之心所間處即是自性觀音出現急難化為清風時也汝問以何因緣名觀世音因緣雖廣多由應感得名然有二意一若約眾生言則以稱名顯感之音為因而普門中即以悲觀冥應為緣因緣相感令其離苦故名觀世音二若就菩薩言則以普門觀法為能救因眾生悲仰之世音為緣亦是因緣和合與拔苦處名觀世音所以有如是之感應者由真妄交徹互相遍故謂由真外無妄是以觀音心內之眾生凡有所感其應知響復由妄徹真源即悲仰時而眾生心內之觀音自然出現為拔其苦此於無畏中略示名觀音之因緣下偈中世尊就菩薩自所證法門釋觀曰真觀清淨觀等於音則以梵音海潮音等意釋之二別示二初明七難二結神力今初若有持是觀世音菩薩名者至稱其名故即得解脫此下但約楞嚴說菩薩以斷德神力加被法界自然而然能令離苦至無畏處意以釋之不必深講惑業等水火風若另立觀文則教外別有觀矣何名依經作觀故亦可略今初且約菩薩以口輪被物言所以能救火難者以見覺屬火由菩薩以同體知見旋復力加之故稱名者便不自焚二以聞覺屬水由菩薩以同體觀聽旋復力加之故稱名者即不自溺三由滅妄斷殺力加之故羅叉鬼不能害一人稱名餘皆解脫者由菩薩以同體大悲普熏法界深入眾生心海是故得聞稱名之聲者亦蒙解脫毗沙門天王所轄有二部鬼一曰夜叉即捷疾鬼二曰羅叉即食人鬼遍在諸處即人所居處亦並有之以業力故兩不防礙復於海外另有一國以為專居四由六根消復同於聲聽力加之是故刀兵無能損害同聲聽之六根五由菩薩以聞熏精明力加之故癡暗之鬼不敢正視況能興害六由菩薩音性圓消離諸塵妄力加之以亡塵故身相亦消枷鎖於何不脫七由菩薩滅音圓聞遍生慈力力加之故能令諸商人坦步於冤賊險道二結神力無盡意觀世音菩薩摩訶薩威神之力巍巍如是巍巍如是四字指出菩薩從久遠來以大神力充塞法界遍拔眾苦意不僅於上之七事便已也二兼示禮念二初念敬益二禮供益今初若有眾生多於淫欲至是故眾生常應心念標曰常念結曰常應心念正廣上妙音但用身輪攝化今顯觀音則加以意輪被物矣又與前但以口輪被七難意亦不同多婬眾生由無始以欲習合塵故為色劫茲蒙菩薩以熏聞離塵力加之故得根境不偶欲愛乾枯嗔恚由對境違情而生今緣菩薩以根境圓融無對所對力加之則不嗔矣愚癡由妄塵所蔽無明所覆故多茲緣菩薩以消塵旋明朗徹無礙力加之故得離癡結辭於威神力上更加一大言者見眾生內惑校外難為難除非具廣大神力決不能却二禮供益若有女人設欲求男至皆應受持觀世音菩薩名號求男者蒙菩薩以融形涉世遍事諸佛為法王子之德遍中陰故俾求者即得生男又以承順秘密領受無失之德亦遍中陰俾求者即得生女故亦校妙音為廣結辭先結身輪之禮拜者影彰上七難三毒二求皆菩薩以三輪應三業之感也次更結勸持名者正顯普門之法身觀照皆不在文字般若之外則持名一事乃脫苦受樂最捷徑之法門也三舉他校勝無盡意若有人受持至無量無邊福德之利持多名與持一人名之福等者由菩薩於娑婆界中得真實圓通為所修習故得一多平等二二番問答二初問次答今初無盡意菩薩白佛言至方便之力其事云何前答人名由菩薩以三輪冥應三業之感即以普門法而釋得名之所以此下約法顯人機縱無感特緣大士用隨體遍如月在天光亦隨遍故值冥伏之善於勝解現圓時即是心聲冥感水清月現之候是故現身而有三輪之顯應巧逗機宜現身說法而皆無私自成以答此問二答三初應機遊化二舉德勸供三結顯自在今初佛告無盡意菩薩至遊諸國土度脫眾生此下於每節中皆用應以現身說法六字以答三業之問則應以二字正大士意業鑒冥感之方便也所以能現身者由大士與佛如來同慈力故身成妙應入諸國土第此經與首楞所明之數與身互有多少開合之異者正見四八之說非是究竟必如下文以種種形游諸國土之結方可盡類今詳所現之身及所說法應各有四句謂一以一身應一機二以一身應多機三以多身應一機四以多身應多機則前三句約次第而第四一句約同時現也其所說之法亦應有四句准上可知今經所明但有初之一句餘三句悉含於結文矣要知文中所明之身誠太倉之一粒也今初且於佛身略示其槩十法界內最尊特者無踰佛身故於六道中非人天二處不堪投足又人與天品異業殊不啻恒沙則所見之佛身亦自勝劣多端故經有摩象之喻且如小教初發心人所見佛身應劣於初向初向漸次而上至於四果所見又劣於始矣況後諸教各有三賢十聖階差此一佛身既有種種次上之分餘可類推矣問且勿論大士之本只如現今示跡等覺位中其所現身果能亦被等覺否答亦被亦不被不被者鼓揚法化同為利生被者大海不讓細流故世尊尚不捨貫針之微福況其勝者乎四聖中略菩薩身合緣獨倫為一支弗身及示聲聞則皆以內秘外現以權引實也下皆例此六凡中初舉梵王者以彼有語言法能統上冠下為大千主故帝釋乃忉利主又同梵王常隨於佛故皆首舉自在乃欲界主大自在乃色界主意明二界頂天之身尚是所現況所統攝天大將軍統領鬼神毗沙門為四王之尊皆以勝現影劣現以上率下蓋風行草偃意也下亦准此王庶中不言輪王等者見小王身尚現而況大者此倒攝意也長者如前明具十德者居士能以道自居者宰官上能輔弼下能剖斷者婆羅門則以術數攝衛淨行人也入道四眾皆奉佛戒人也現婦女身化被內閫也童男童女乃保合太和不喪天真清節自居不求侵暴者八部中非人句應上至無色下及三塗在文含而未顯執金剛者梵語䟦闍羅波膩䟦闍羅云金剛波膩云手即手執金剛杵誓作千佛護法神也結能化身曰以種種形所化之境曰諸國土總顯廣多難思也能化之身上已略明若所化之土如會玄引大菩薩藏經說虗空中剎土多於大千世界微塵但由業行不同故不相閡又況土體染淨相盡本來自在能令見者若四聖則即一土而見四土若六凡亦於一境各別知見並不在普門攝化之外二舉德勸供四初承前勸供二奉命供養三不受勸受四回向勝田今初是故汝等應當一心至皆號之為施無畏者初句正勸供是觀下出勸供意是故下由前約普門法尋聲苦准首楞說則觀音名是古佛所授故觀音名遍十方界此下復約普門法於此界中耑濟急難故諸眾生以能施無畏之名加之歎美其德故施無畏者之稱又獨擅於娑婆矣二奉命供養無盡意菩薩白佛言至受此法施珍寶瓔珞以瓔珞之財供名法施者原從無盡中道妙慧之所生故又當體即是實相故三不受勸受時觀世音菩薩至人非人等故受是瓔珞不受者意謂汝既奉命作供我未承旨焉敢輙受況有至尊在前故却之重白愍我等者謂我為愍眾有施仁須愍眾有受故佛亦以愍眾為勸究普門法中了無捨受之相而亦不礙相即無相故不妨為物有受四回向勝田即時觀世音菩薩至一分奉多寶佛塔回諸妙因同趣勝果三結顯自在無盡意觀世音菩薩至遊於娑婆世界二偈文二初贊問二偈答今初爾時無盡意菩薩以偈問曰世尊妙相具我今重問彼佛子何因緣名為觀世音重問二字即雙含上問名問游意等欲起下文故首問緣二偈答二初經家敘二如來答今初具足妙相尊偈答無盡意相具由於德足故歎相即是美德此經家緝綴語也二如來答二初總前二答二結勸禮念初二初總示行願二就機別顯今初汝聽觀音行至心念不空過能滅諸有苦行願各有兩重謂善應是利他行侍佛是自利行願即初發之四弘及後歷侍諸佛續發之願也善應者若洪鐘之在架小大之聲悉隨其扣而皆出自無心普門之冥顯二應如之二就機別顯二初頌初答二頌次答今初假使興害意至念彼觀音力應時得消散共十二頌有重頌及孤起之別在文自了念彼之彼似非此彼之對蓋大難臨頭於求救時止有切念聖號之一心大士之悲救即我之心口更何有此彼之分佛言念彼即脫苦者乃述神速之應也須彌峰金剛山皆假設辭顯其高與堅最易損害人處也還著本人者殆枯其惡念於未蒙也古謂大士所以能遍救者以一切依正皆是大士妙色妙心一切眾生於聖色心而自為難其求救之感亦即大士之三業是故有感即應又前云化及蜫虫者即蚖蛇蝮蠍類也二頌次答二初承前正頌二重歎悲智今初眾生被困厄至生老病死苦以漸悉令滅初一頌承前結顯眾生心被三毒所鼓身被業縛所困故致苦惱來逼大士以煩惱即菩提之妙智流出同體大悲救自性之眾生具足下二頌略答次問其廣被處自在前文已具故二重歎悲智二初歎悲智體二歎悲智用今初真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰上半歎智下半歎悲以此二是觀心中首出之德故初中謂中道妙觀必從無妄真理流出故曰真又以此智性非染法故曰清淨本週法界故曰廣大乃即三即一普照三諦之觀體也下半顯此觀中復具二種殊勝被物之恩德是故眾生皆應恒常稱名而修瞻仰之行二歎悲智用無垢清淨光至念彼觀音力眾冤悉退散上頌是當體顯德此下則對物顯用故曰破暗除災滅焰等以顯悲智之用問據歎體則智有三義悲有二義今用中智復有無垢悲有雷雨等義何科唯云歎悲智耶答聖人萬德率以悲智為先若以智為門論德則一切皆智餘義如虗空以悲為門亦然諍訟一頌轉釋煩惱焰也謂世人事係公庭身臨戰陣心憂刑罰命慮兵殘今昔冤仇一時凑合此正煩惱熾然如烈𦦨處尚可致感而況於他二結勸禮念二初歎名勸念二歎德勸禮今初妙音觀世音至是故須常念念念勿生疑大士召德之名應有無量佛約五義為歎者且令見一班也然音是所觀之境由境智鎔融能所兩亡故即所觀以歎能觀而示唯心俾知心境但一如實相也初歎妙者謂由三觀三諦於一心一剎那中遮照同時不可思議可稱妙音二由尋聲拔苦可稱觀世音三由具足清白可稱梵音四由應不失時可稱海潮音五由高超九界故曰勝彼世間音又此五中隨舉一法即攝餘四及一切德悉皆趣之若眾生以念為法界則一切聖賢功德莫不同趣此外別無少法何況此大士耶苟能深信忍可截斷疑情念念無間何苦不脫何樂不階但貴不生疑惑故最後以一勿字剪之戒之二歎德勸禮觀世音淨聖至福聚海無量是故應頂禮圓滅諸染曰淨位極於茶曰聖此約斷德受稱也於苦下約恩德被物也如慈父母作依怙如如意珠具一切功德慈視大地如憐一子墮在苦處要而言之大士是福德聚難仰其高是智慧海難測其深故我以無妄之廣長勸諸眾生唯應志心頂禮凡有所求必獲如意三聞品獲益二初贊聞品者二結發心益今初爾時持地菩薩至當知是人功德不少說竟持地出為贊歎者由普門持經與持地行兩相等故謂持地自毗舍如來所得平心地後觀諸眾生若起若倒並由心地攝持與能趨普門者固蒙攝入即自背而投岐路者亦在無緣大悲攝取之內以向背起倒同一致故持地不贊普門人法而專贊能聞者正深於贊者也由普法殊勳經耳是以功德不少二結發心益佛說是普門品時至阿耨多羅三藐三菩提心由聞最上教悟最上理故發最上心效行此最上行而證最上果法此種妙心自無有法與之相等而能等者是為終實悟真理發菩提心人而入初住者四呪護持經陀羅尼品第二十六陀羅此翻總持謂總一切法持無量義也又總持惡不起善不失也然有一字陀羅尼多字及無字之別曼拏曪中以五種觀法持呪凡增益攝伏等事持之莫不如意又五種密部中各有根本枝末之分今呪自屬本部所攝觀係降伏字係多字於五不翻中即秘密不翻四例中即翻字不翻音例也此由上明深位菩薩始自亡身為法終至普門示現而流通之芳規已週茲恐初心菩薩身屬常倫才發真心願欲弘經自令魔宮震裂彼戀塵勞安肯坐視故伺其便僉來生惱倘不外仗神呪護持善根微弱輩不能不被其阻退品故次來文三初持經功德二神呪護持三聞品獲益今初爾時藥王菩薩即從座起至如說修行功德甚多二神呪護持五初藥王呪護二勇施呪護三多聞呪護四持國呪護五羅叉呪護初二初說呪二贊許今初爾時藥王菩薩白佛言至則為侵毀是諸佛已呪字是華言即呪禁呪願禱祝義也特以秘密不翻故以此字往翻之陀羅尼下又繫一呪字者華梵兼舉也其明呪神呪真言皆別稱也呪辭中有是鬼神王名稱其王名則部落不敢為非又有如軍中密號唱號相應無所訶問如不相應即執治罪又是諸佛密語如索仙陀婆餘無能解唯有智臣能於一名之呼以鹽水器馬各奉其當今於一呪遍有威力能令瘥病滅罪生善入道以是義故存梵不翻庶免偏廢與呪之與通乎萬世之下會中一說靡攝無遺具弘通之行者即在呪護之中呪中字悉宜以本音讀之即四種翻譯中翻字不翻音之一也又凡有切有反有音者可依之如逢本字旁加一口字者應以急口呼之二贊許時釋迦牟尼佛至於諸眾生多所饒益二勇施呪護爾時勇施菩薩白佛言至伺求其短無能得便富單那此云臭餓鬼能主熱病吉蔗此云所作即起屍鬼人及夜叉皆有此鬼鳩盤茶此云甕形舊云冬瓜以其陰藏如冬瓜之大行則置之肩上坐則踞之即魘魅鬼也即於佛前而說呪曰至則為侵毀是諸佛已三毗沙門呪護爾時毗沙門天王護世者至說是陀羅尼毗沙門此云多聞福德之名聞四方故主領夜叉羅剎天竺以北方為首次及東南西故先舉也即說呪曰至令百由旬內無諸衰患四持國呪護爾時持國天王至擁護持法華經者梵語提頭賴吒此云持國又翻安民乃乾闥婆及毗舍闍二部之主領為上升之元首下界之初天也即說呪曰至則為侵毀是諸佛已五羅剎女呪護二初呪誓二贊許今初爾時有羅剎女等至離諸衰患消眾毒藥毗陀羅赤色鬼犍陀黃色鬼烏摩勤伽烏色鬼阿䟦摩羅青色鬼阿棃樹形似蘭枝若墮地自然破為七分殺父殺母破和合僧為三逆罪擣蔴生虫壓油過之尤者以斗秤小大出入欺盜之尤者故震每銘其背二贊許佛告諸羅叉女至應當擁護如是法師凡愛者必護諸菩薩愛法必護法護法必護人諸佛為愍念眾生以陀羅尼護諸菩薩得以述而與之鬼女最惡能以呪護亦即善持法華者也三聞品獲益說是陀羅尼品時六萬八千人得無生法忍五轉邪持經妙莊嚴王本事品第二十七上以呪護靖諸外難魔絹已得隳裂茲恐末世弘經者境強智弱識被情牽若內弗蚤覺外乏善導一被所奪無可哀救故古注引莊嚴之往事以示警而經文全重在得善友提𢹂上始有轉邪之功經云此二子是我善知識為欲發起宿世善根饒益我故來生我家故以轉邪為本事文二初敘述本事二聞品獲益初二初正明本事二結會贊歎初三初總敘相值二轉邪方便三蒙轉得益今初爾時佛告諸大眾至及愍念眾生故說是法華經初明化主劫國彼佛下雙標能所二化是二子下標能化具德也久修下略示二嚴檀等五句釋有大福德般若一句釋有大智慧方便一句釋有大神力經欲具彰十度以顯正行故於六度後略標方便一度以該餘三蓋十度乃從六中所開出者如禪度中有願力智三開出願力二度般若中有道種智及一切種智如次開出方智二度意明能化位在等覺故作是說以修三十七為助道者由正修十度時亦復緣念四處以除四倒繼以四勤斷惡生善四種作意令善滿足而蒙其芽加以信等五法增長善芽令其成根而增五力始能破惡以七覺支於中決擇所修各歸厥派速令入道終以八種正道統攝諸品通至涅盤今總論之菩薩之道以首悟實相為體四無量為心六度為用道品為助乃成佛果而二子皆悉通達又禪度中已具攝一切三昧而另列七種者以於此七中更臻其妙故爾時下明彼佛說法之所以也欲引者緣王曾聞此經中被阻退已歷多時今則惡緣當謝善種將熟故得感佛作勝增上令聞妙法再發靈苗故華嚴有食少金剛畢究不銷之喻旨哉又下經云為欲發起宿世善根等二轉邪方便三初二子白母二母令往化三奉命往化今初時淨藏眼二子至而生此邪見家二子白往乃助發緣也二母令化父母告子言汝等至或聽我等往至佛所三奉命往化於是二子念其父故至令其父王心淨信解諸外道邪見充滿縱有至道在前亦必不受又以見地不明重外輕內故易被色聲所舞非覩神變莫奪所好況邪外神變並屬有漏若見漏盡人所現之希有迴視己能何其眇劣故為現通令生渴仰此所現通不必泥於十八瑜伽自有十八神變可該於此三已轉得益七初父信欲往二白母出家三雙白父母四化功已著五詣佛出家六歎述二子七贊佛自誓今初時父見子神力如是至欲見汝等師可共俱往歎未有者見非邪外可匹也因信其子故並信其師而求見也二白母出家於是二子從空中下至所以者何佛難值故三雙白父母於是二子白父母言至諸佛難值時亦難遇二喻一明難逢一明縱逢難具正見故古云龜魚之眼兩向不能正視縱遇浮木尤難見孔故值佛人非宿福慧深而且厚者不能了脫四化功已著彼時妙莊嚴王後宮至令心信解好樂佛法法華三昧能攝權歸實離諸惡趣三昧能破二十五有諸佛集三昧則能常不離佛三聖以妻子身而攝化者正先以欲鈎牽意也能信解不生好樂者亦不能速至菩提故雙舉也五詣佛出家於是妙莊嚴王至後得一切淨功德莊嚴三昧跏趺之佛從供養淨信之所生臺牀天衣皆受用應有之具佛身言第一微妙者以從第一真空之所流故亦是色空交徹相即無相難思之身故時雲雷下佛令出家與記也娑羅云堅固謂能以道法蔭庇法界也其王下奉命出家一遂二子所請一續往昔本願三昧曰淨功德者以邪染蕩除而真靜現前也六歎述二子即升虗空高七多羅樹至愍念邪見眾生令住正見初王稱歎二子之饒益爾時下雲雷如來重為述成也文中雖甚歎善知識能大饒益然非宿植善根者恐不能遇則宛轉飄零無可哀救古引四僧結契入山修道以一人行乞佐助而被惡緣所染事即指為莊嚴王足為後世藻鑑則凡垂手入廛者於逢增上境緣時應觀諸法如幻如夢否則被境所轉成誤墮矣足知理觀及善友洵缺一不可也七贊佛自誓妙莊嚴王即從虗空中下至說是語已禮佛而出初贊佛功德頻婆云相思果色丹而潤安隱快善從能隨教戒所行故具無量功德莊嚴作持也我從下自誓不隨心行等止持也又不隨心行則智行起矣二結會贊歎佛告大眾於意云何至諸天人民亦應禮拜初會通四人古指光照莊嚴相為妙音固可即於會中別有此一菩薩亦可是藥下重歎二菩薩者以能善弘經故二聞品獲益佛說是妙莊嚴王本事品時至於諸法中得法眼淨得法眼淨者以能決了豪華如幻如翳不被所故又若圓伏二障分別起則得入住成正定聚若圓斷二障分別起則登菩薩極喜地以經文渾涵故作二釋六勸發持經普賢菩薩勸發品第二十八此品遠承藥王等三聖弘通法式近踵明呪善友之力行者可以乘此按轡徐行直至道場無諸留難是故普賢居殿唯有勸進開發流通用廣妙行故此品來經初毫瑞圓現法界迷悟之流並不越乎一光之外故智首文殊法法皆從光中點出次復援古擬宜發明諸佛皆依一性而演一乘傍為助顯今佛使大會迴憶在昔全由根劣以致解異令其猛醒乃以三週七喻會歸法華三昧既蒙開顯而眾行自此可以契真故感普賢來儀最後勸發而世尊更為述成四法令得是經所謂得者即依教而獲理行果也是故此經以智創首用行結束正見非智無以照理非行無以克果之大旨則世尊為一類由小之大之機所有本懷悉是輔助揚化引攝成根進蒙記莂了此大事文三初總敘來儀二正陳勸發三聞品獲益今初爾時普賢菩薩至頭面禮釋迦牟尼佛右繞七帀無上佛果非行莫階故以普賢結成流通自在是菩薩之德相神通是菩薩之業用力言顯是即德相之業用也威德與名聞合舉者顯美實之賓莫不相稱也其所與諸大士皆具普賢道者此經首尾皆約東方言者其義有二一者東方有啟明之相所以毫瑞始東用表智輪若現必先破羣昏是以文殊首出以為眾除疑應之一由東是羣動之首故象駕東來用表欲階妙果者必自行門始慧行若發則六度咸趣始而以智照理終而以行成智克果佛國云理智行為身日月是也所經歷處悉有瑞應者同是無作妙德之所感生各現等者各以所得解脫於隨侍時而現即名弘經庶不空過二正陳勸發三初請受勸發二正與勸發三誓願勸發今初白佛言世尊至云何能得是法華經首楞謂此大士心聞洞十方者一約法身依真而住則十法界並不外於心聞若約報用稱體而週則無邊剎海不隔毛端亦可謂之心聞今曰遙聞者以大士勝應在彼赴感而來故曰遙聞若約菩薩之心聞不但已聞能詮所詮並聞此經廣說之意今復遠來重問云何能得者意在愍念未法共來聽受略說俾心要總持人以便勸進自行又復發起流通二正與勸發佛告普賢菩薩至於如來滅後必得是經起信信成就發心文與此相符彼云復次信成就發心者有三一者直心二者深心三者大悲心今初諸佛護念即彼直心但經約能護之人論約所護之法似有左右謂若能受持佛所護經則能正念真如開佛知見理觀鎔然佛因護法并護其人華嚴謂第八地聖人始蒙佛護今由經功殊勝雖初心行人亦得蒙護則外護成矣二植眾德本即彼深心亦但經約能發行之心論約心所護之行而有左右今謂眾德即善行所植之德本即菩提心以忘失菩提心修諸功德悉成魔業以此心是上求下化之樞鈕故能植此者則照理之內智成就三入正定聚論雖未列而意必含攝以信滿行成必入正定聚故第二剎那依定護慧則自利之妙行成矣四發救眾生心與彼大悲全同則前三是勸進自利第四為發起流通如來巧說以此四法該盡正通令此二分分而不分能得此者二利逾廣是謂略說法華也三誓願勸發二初願護人二願護法初五初護持誦思惟二護定期修習三表神通威力四示勝因近果五勸一心修持初三初總示受持二別示讀誦三別示思惟今初爾時普賢菩薩白佛言至諸惱人者皆不得便韋陀羅云善妙主魘禱鬼也二別示讀誦是人若行若立讀誦此經至亦為供養法華經故地藏十輪經建立三種定業輪今經與彼習誦業輪大同彼謂習誦大乘初中後夜精勤無怠心不散亂則能摧破一切惑業今因讀誦力銷磨翳障法眼清明故感普賢現身安慰魔不得便若約由聞乃能讀誦即是以聞所生慧摧碾惑業也即慧根中中品之證相也三別示思惟是人若坐思惟此經至得如是等陀羅尼坐則身在禪定由於定中思惟發生妙慧銷磨翳障等感現身教讀生喜雖亦與上中品相等今由轉復精進乃更得三昧及陀羅尼應是慧根中上品之證相也空觀是旋旋幻色歸真空也假觀是百千旋旋一真空出種種幻色也中觀是法音方便由色空無礙始令法音方便三一圓融二護定期修習二初現身說法二與呪自護今初世尊若後世後五百歲至而為說法示教利喜前文兩番現身皆緣平日持誦所感茲更以尅期修習示者欲顯此經有日劫相倍速證之神功也故古人遵此立儀修懺復約戒定慧三根各分三品以明九種證相於此期內若得一旋則是終之初住而劫超十千矣況更進者二與呪自護亦復與其陀羅尼呪至即於佛前而說呪曰陀羅尼呪者由陀羅尼是依理所發總持之妙慧亦即所詮之理法而呪是能詮之文句能所合舉故曰陀羅尼呪阿檀地一檀陀婆地至辛阿毗吉利地帝二十三表神通威力世尊若有菩薩至皆是普賢威神之力普賢體遍用恒稱體起用常加一切故令未聞未持者皆使聞持四示勝因近果二初舉勝因二示近果今初若有受持讀誦正憶念至為諸如來手摩其頭普賢為諸佛長子能以慧行莊嚴三世諸佛故一切賢聖所修之行皆從普賢得名今來居殿者欲顯普賢即是弘通之人其所有之行亦即弘通之行言當知是人者乃大士提起行者振惺法會勿以恒倫等視當知此人即是普賢以弘經之行即普賢之行故已曾於先佛所深種善根故於今生乃能弘通而為諸佛摩頂加被二示近果二初以書寫況顯二正明近果今初若但書寫是人命終至解其義趣如說修行但能書者尚得感生忉利況能受持等者二正明近果若有人受持讀誦至有如是等功德利益文點命終即往者正指近果也六種法師所修之行自有優劣故上文以書寫居首況出如說修行者茲復先明能解義趣者之近果且住內院不退位中意指此行之遠果非取草時其福不盡五勸一心修持是故智者應當一心自書至正憶念如說修行二願護法二初菩薩守護流布二如來贊述功德今初世尊我今以神通力故至廣令流布使不斷絕二如來贊述功德四初贊護經二護持名三述殊勝四示勸誡今初爾時釋迦牟尼佛至而能作是神通之願守護是經普賢全體即是妙法故以法流之用而護法流之源二護持名我當以神通力守護能受持普賢菩薩名者普賢道契佛心名能召德故持大士名者得感佛護三述殊勝三初示人勝二示因勝三示果勝今初普賢若有受持讀誦至為釋迦牟尼佛衣之所覆文中五見當知句者亦警惺現未得見此人者令生渴仰也意謂此經於無量國中乃至名字不可得聞何況得見受持必宿世具大善根始能弘通當知此人雖身生末世若能弘此即法身之妙典不獨得見普賢蒙其教讀加護則與生值佛世親見我身親從我口聞法親陳供養親蒙我贊善者等無有異又復當知是人既有如是勝因自能感我手摩其頭安慰其心自能感我以衣覆護不令魔便而況於他敢不共相守護二示因勝如是之人不復貪著世樂至能修普賢之行初明不為外境所轉者以有直心正念實相法故有福德培養力故次明不為內惑所惱者以智強故與無貪等善根相應故嫉妒被無嗔所治故諸慢缺染慧無依不起故少欲即無貪故三示果勝普賢若如來滅後至當坐天人大眾中師子法座上受持等果即當詣道場者緣末法中魔強法弱多諸留難此人能於煩惱大海中以大信力以大忍力以大念力高超諸衰妙演一乘是故感果極勝極速四示勸誡普賢若於後世至當起遠迎當如敬佛不貪資生者但患所以立也況得隨心所願次誡切勿輕毀等者免招生現二報也三聞品獲益說是普賢勸發品時至諸菩薩具普賢道得百千旋者終之初地具普賢道乃終教十地之後心也但舉初後者欲該中八也又但舉聖位者即該三賢矣佛世法會於一座內一聞聖法便可位登十地正見妙法之難思三總結流通佛說是經時至受持佛語作禮而去聞經竟先得歡喜益者即未來世諸佛也跋聖教東傳像法始著其緣弘演而受益者遍海內矣金陵自六朝來名藍櫛比義學繁興如我高祖雪浪大師紹天界無極老人之統承賢首二十三世之系闡揚法道續佛慧命次有一雨蘊璞碧空月潭諸曾祖輩繼出之後始逢普德勖𠁼祖翁御大願輪力弘教乘而賢首一宗一時海內同仰中興之光受業者指不勝屈惟上乘大師及門最後親炙未久而能韜光斂晦研究至賾翻貝葉於螺髻校藏目於半壑不避寒暄幾忘寢食祖翁遷化諸同人互相繼席沿至於師則補故增新凡常住未完之事莫不竭力舉行瀝瀝心血自非如說而行者何以及此悳昔慕江南慈恩一宗於丙辰歲負笈次哲大師之門時師開講鷄鳴學眾濟濟振厥祖風爰問南邨張居士曰勖大師廼三學該練可謂賢首再起得其傳者論學之長多推次公經詮之首則有雲雪二公而雪公既通內典復擅風雅先後護法如陳侍御涉江羅銀臺繼峯咸相交契討論內典悳自庚申歸吳門株守一隅每思我宗先輩無經不注即使法華疊出胡弗一祖本宗旨趣致令四依無所適從殊可浩歎今甲申秋八月初夜夢海日高昇寶筏得濟晨鐘甫撞大師忽懷香見訪誠為希有之徵而獲難遘之想也師示稿命校閱悳惟法華一經於一代教中能括如來用權調攝之本致最為難信難解昔普德祖翁講是經曾撫卷三歎剏立科文羅判七軸鈎玄索隱一洗陳習而師則纘述其旨駁近代之淆譌決千古之疑案俾賢上一源滴滴真乳如注甘露於中天架指南於岐路無片言隻字出自胸臆題曰拾遺蓋有以也科判懸談各一卷疏八卷讀是疏者當原先佛久默之本懷出前賢未發之底蘊庶不負普德二世之婆心云耳古吳永定後學海印了悳合十拜題
